      shareholder from gaining control and to keep the company mission-focused on the
      responsible development of AI for the long-term benefit of humanity. The Trust has
      board representation via multiple independent members. This structure limits
      investor return-extraction mechanisms compared to standard VC-backed companies.
  founding_date: "2021"
  hq: "San Francisco, CA"

