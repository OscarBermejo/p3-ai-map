notes:
  - Anthropic is a PRIVATE company. No 10-K/10-Q. Use financials_private.md sourcing rules.
  - PBC structure with Long-Term Benefit Trust — designed to resist commercial pressure diverging from safety mission.
  - AWS is primary training compute partner ($8B total investment, Project Rainier Trainium2 cluster).
  - Google Cloud partnership (Oct 2025): tens of billions deal, up to 1M TPUs, 1GW+ compute capacity by 2026.
  - Claude is available on Anthropic API, AWS Bedrock, Google Vertex AI, and Microsoft Foundry — multi-cloud inference advantage.
  - Revenue model: API pay-per-token + Claude.ai consumer/Pro subscriptions + enterprise contracts (Claude for Work, Claude Code Enterprise).
  - Constitutional AI (CAI) is Anthropic's primary safety/alignment methodology; 2026 constitution expanded to 23,000 words.
  - Targeting cash flow positive by 2028 (delayed from earlier 2027 target per The Information Feb 2026).
  - IPO reportedly targeted for October 2026 window at $60B+ raise (Tier 3 estimate; not confirmed by company).
