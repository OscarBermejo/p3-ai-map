slug: anthropic
legal_name: Anthropic, PBC

tickers: []  # Private company — no public equity ticker

summary: |
  Anthropic is a frontier AI safety company and the creator of the Claude model family.
  Founded in 2021 by Dario Amodei (CEO), Daniela Amodei (President), and other former
  OpenAI researchers, Anthropic sits at the models layer of the AI value chain: it trains
  frontier large language models under a safety-first research mandate and deploys them via
  API (Anthropic API), consumer products (Claude.ai), and enterprise agent tooling (Claude Code,
  Claude for Work). Anthropic is incorporated as a Public Benefit Corporation (PBC) with a
  Long-Term Benefit Trust that holds governance rights to prevent any single investor from
  gaining control. As of early 2026, Anthropic is the fastest-growing company in enterprise
  AI by ARR, with annualized revenue of approximately $14B (February 2026) and approximately
  $19B (March 2026) — a 19x expansion from ~$1B ARR in December 2024.

  Anthropic's primary training compute partner is Amazon Web Services (AWS), with a
  multi-billion dollar strategic investment ($8B total) and Project Rainier (500K+
  Trainium2 chips). A parallel multi-year agreement with Google Cloud provides access
  to up to 1 million TPUs. Anthropic deliberately maintains a multi-cloud inference
  architecture: Claude is available via the Anthropic API, AWS Bedrock, Google Vertex AI,
  and Microsoft Foundry — a structural advantage over competitors locked into single-cloud
  arrangements. Quantitative financials are not publicly disclosed; estimates from press
  reports are in financials/*.yaml.

