    notes: "Amazon's $8B total is a strategic investment and compute partnership, not a standard VC round with explicit post-money valuation. The prior traditional round (Series D, Sep 2023) had a $18.1B post-money valuation."
    sources: []

  last_round_date: "2024-11-22"
