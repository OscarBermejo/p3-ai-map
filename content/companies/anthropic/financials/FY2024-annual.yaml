extended_metrics:
  total_funding_raised_usd:
    value: null
    notes: >
      As of December 31, 2024, total raised was approximately $8B–$12B:
      Seed/A ($124M) + B ($580M) + C ($450M) + D ($1.25B) + Amazon initial ($1.25B per D round) +
      Amazon additional (Nov 2024 $4B = $8B total including initial). CBInsights and press
      suggest ~$9B–$11B in equity raised as of Dec 2024 before Series E (Mar 2025).
    sources:
      - url: https://hiringhello.com/blog/from-seed-to-380b-anthropic-complete-investment-journey-2021-to-february-2026
        kind: ir_html
        description: "Tier 2: Funding history; Amazon $8B total by Nov 2024."
        retrieved_at: "2026-03-29"

  last_round_amount_usd:
    value: 4000000000  # $4B — Amazon additional investment, November 2024 (total $8B Amazon commitment)
    notes: "Amazon increased its total commitment to $8B in November 2024, designating AWS as Anthropic's 'primary cloud and training partner.' This was the largest single investment event closest to the FY2024 period end."
    sources:
      - url: https://techcrunch.com/2024/11/22/anthropic-raises-an-additional-4b-from-amazon-makes-aws-is-primary-cloud-partner/
        kind: news_article
        description: "TechCrunch: Amazon additional $4B investment; AWS designated primary cloud and training partner."
        retrieved_at: "2026-03-29"

