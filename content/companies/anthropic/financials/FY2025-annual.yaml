extended_metrics:
  # ── Funding and valuation ─────────────────────────────────────────────────
  total_funding_raised_usd:
    value: null  # Range $61.5B–$67B depending on source and methodology
    notes: >
      As of February 2026 (Series G), CBInsights reports $61.455B total raised;
      hiringhello.com reports $67B+ across 25 rounds including strategic compute deals.
      The discrepancy likely reflects different treatment of infrastructure commitments
      (Amazon $8B strategic investment, Google tens-of-billions compute deal, Microsoft
      Foundry commitments) vs. pure equity. Conservative equity-only estimate: ~$50B.
      Total includes: Series G ($30B, Feb 2026) + Series F ($13B, Sep 2025) +
      Series E ($3.5B, Mar 2025) + Amazon ($8B total, 2023–2024) + Series D ($1.25B) +
      Series C ($450M) + Series B ($580M) + Seed/A ($124M) + other.
    sources:
      - url: https://www.cbinsights.com/company/anthropic/financials
        kind: ir_html
        description: "CBInsights: $61.455B total raised across 25 funding rounds."
        retrieved_at: "2026-03-29"
      - url: https://hiringhello.com/blog/from-seed-to-380b-anthropic-complete-investment-journey-2021-to-february-2026
        kind: ir_html
        description: "Tier 2: hiringhello.com: Anthropic complete investment journey — $67B+ across 25 rounds."
        retrieved_at: "2026-03-29"

  last_round_amount_usd:
    value: 30000000000  # $30B — Series G, February 12, 2026
    notes: "Led by GIC (Singapore sovereign wealth) and Coatue. This is the round closest to the FY2025 period end; it closed after fiscal year-end but is the most relevant valuation anchor."
    sources:
      - url: https://www.anthropic.com/news/anthropic-raises-30-billion-series-g-funding-380-billion-post-money-valuation
        kind: ir_html
        description: "Tier 1 (official company release): Anthropic Series G — $30B at $380B post-money valuation, led by GIC and Coatue, Feb 12, 2026."
        retrieved_at: "2026-03-29"

  last_round_valuation_usd:
    value: 380000000000  # $380B post-money — Series G, Feb 2026
    notes: "Post-money valuation at Series G (Feb 2026). Previous round: Series F (Sep 2025) at $183B — $380B represents a 2.1x step-up in approximately 5 months."
    sources:
      - url: https://reuters.com/technology/anthropic-valued-380-billion-latest-funding-round-2026-02-12/
        kind: news_article
        description: "Reuters: Anthropic Series G — $380B valuation confirmed."
        retrieved_at: "2026-03-29"

  last_round_date: "2026-02-12"
  last_round_type: series_g

  # ── Prior round for FY2025 period context ──
  series_f_amount_usd:
    value: 13000000000  # $13B — Series F, September 2025
    notes: "Series F at $183B post-money valuation. Closest primary equity round to Dec 31, 2025 fiscal year-end."
    sources:
      - url: https://www.anthropic.com/news/anthropic-raises-30-billion-series-g-funding-380-billion-post-money-valuation
        kind: ir_html
        description: "Anthropic Series G announcement references prior Series F context."
        retrieved_at: "2026-03-29"

  arr_usd:
    value: 14000000000  # $14B ARR as of February 2026 — Tier 1 (voluntary company release in Series G announcement)
    notes: >
      $14B run-rate as of February 2026 confirmed in Anthropic's own Series G press release
      (Tier 1 voluntary disclosure). Estimated year-end 2025 ARR approximately $10B–$12B
      (interpolating from ~$1B ARR Dec 2024 → $14B Feb 2026 with reported ~10x annual growth).
      $7B FY2025 recognized revenue is stored in standard revenue field.
      By March 2026, ARR reached approximately $19B (AI Business Weekly, Tier 2).
    sources:
      - url: https://www.anthropic.com/news/anthropic-raises-30-billion-series-g-funding-380-billion-post-money-valuation
        kind: ir_html
        description: "Tier 1: Anthropic official Series G release — $14B run-rate revenue, growing over 10x annually."
        retrieved_at: "2026-03-29"

  monthly_burn_rate_usd:
    value: null  # ~$250M/month estimated for FY2025 based on ~$3B annual cash burn
    notes: >
      TechEconomics (Tier 2) reports Anthropic burned ~$3B in cash in 2025 while generating
      $7B revenue. Implies ~$250M/month average cash burn. However, burn rate was likely
      back-half weighted as revenue accelerated in H2 2025. Gross margins 40–50% suggest
      operating losses are funded by investor capital rather than operating cash flows.
      Cash flow positive delayed to 2028. Standard field null — $3B annual burn is Tier 2 estimate.
    sources:
      - url: https://techeconomics.substack.com/p/anthropic-just-raised-30-billion
        kind: news_article
        description: "Tier 2: TechEconomics — ~$3B cash burn in 2025; gross margins 40-50%; cash flow positive target 2028."
        retrieved_at: "2026-03-29"

  cash_runway_months:
    value: null
    notes: >
      Not calculable without cash balance. Series F ($13B, Sep 2025) + Series G ($30B, Feb 2026) =
      $43B raised in approximately 6 months — provides substantial liquidity well past any reasonable
      runway calculation at current burn rates. Conservative estimate: 10+ years at $3B annual burn,
      but capital will be deployed into compute infrastructure and hiring well before exhaustion.
    sources: []

  headcount:
    value: 2500  # ~2,500 employees as of early 2026 — Tier 2
    notes: "Multiple sources report ~2,500 employees at Anthropic as of early 2026, versus OpenAI's ~4,500. Anthropic is significantly more capital-efficient on a revenue-per-employee basis."
    sources:
      - url: https://www.machinebrief.com/article/inside-anthropic-30b-series-g-what-380b-buys-you
        kind: news_article
        description: "Machine Brief: Anthropic ~2,500 employees as of early 2026."
        retrieved_at: "2026-03-29"

  revenue_per_employee_usd:
    value: 2800000  # Derived: $7B / 2,500 = $2.8M per employee
    notes: >
      Derived estimate: FY2025 revenue $7B / ~2,500 headcount = ~$2.8M per employee.
      For comparison, OpenAI at ~4,500 headcount on $13B revenue = ~$2.89M/employee.
      The ratio is nearly identical despite Anthropic being ~2× smaller by headcount,
      suggesting comparable per-capita productivity. Both companies have exceptional
      revenue-per-employee ratios relative to the tech sector — driven by the high
      leverage of AI API revenue on small engineering headcount. OpenAI's SBC run-rate
      (~$2.5B in H1 2025 alone) distorts the true compensation picture; Anthropic's SBC
      is not disclosed but likely comparable at this funding scale.
    sources: []

