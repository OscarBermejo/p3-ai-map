# ─── Company-level context ────────────────────────────────────────────────────

api_platform:
  platform_name:
    value: "Anthropic Claude API"
    notes: "Also available via AWS Bedrock (Amazon), Google Vertex AI (Google), and Microsoft Foundry (Microsoft Azure). Anthropic operates a multi-cloud deployment architecture — a structural difference from OpenAI's Azure-exclusive API arrangement."
    sources: []
  deployment_options:
    value: ["Anthropic API (direct)", "AWS Bedrock", "Google Vertex AI", "Microsoft Foundry"]
    notes: "Multi-cloud strategy: each platform has different pricing (see third-party pricing pages). Regional endpoint premium of 10% applies on AWS and Google starting with Claude 4.5+ models."
    sources:
      - url: https://docs.anthropic.com/en/about-claude/pricing
        kind: vendor_page
        description: "Anthropic pricing page: deployment options listed with third-party platform links."
        retrieved_at: "2026-03-29"
  enterprise_features:
    value: ["SOC 2 Type II", "HIPAA (Business Associate Agreement available)", "no training on API inputs", "SSO/SAML", "audit logs", "data residency (US-only inference via inference_geo parameter, 1.1× surcharge)", "Model Context Protocol (MCP) for enterprise integrations", "CLAUDE.md project context files", "Claude Code Enterprise deployment"]
    notes: "Data residency pricing available for Claude Opus 4.6+ models via inference_geo parameter. MCP server integration allows connecting Claude to internal enterprise tools (CI/CD, Jira, GitHub, databases, APIs)."
    sources: []
  sla_uptime:
    value: null
    notes: "Vendor-stated uptime SLA not publicly documented. Check status.anthropic.com."
    sources: []

compute_dependency:
  primary_training_infrastructure:
    value: "Amazon Web Services (AWS) — Project Rainier (Trainium2)"
    notes: >
      AWS is Anthropic's designated 'primary cloud and training partner' (per Nov 2024 agreement).
      Project Rainier is operational with nearly 500K Trainium2 chips; scaling to 1M+ chips by
      end-2025. Total Amazon investment: $8B. Annapurna Labs (AWS custom silicon division) is
      co-developing future Trainium generations with Anthropic. This relationship is Anthropic's
      compute foundation for frontier model training.
    sources:
      - url: https://www.aboutamazon.com/news/aws/aws-project-rainier-ai-trainium-chips-compute-cluster
        kind: vendor_page
        description: "Amazon: Project Rainier — 500K Trainium2 chips operational; scaling to 1M+ by end-2025."
        retrieved_at: "2026-03-29"
      - url: https://techcrunch.com/2024/11/22/anthropic-raises-an-additional-4b-from-amazon-makes-aws-is-primary-cloud-partner/
        kind: news_article
        description: "TechCrunch: Amazon $4B additional investment; AWS primary cloud and training partner designation."
        retrieved_at: "2026-03-29"
  primary_inference_infrastructure:
    value: "Multi-cloud: Anthropic direct + AWS Bedrock + Google Vertex AI + Microsoft Foundry"
    notes: >
      Anthropic operates inference across all four platforms without single-cloud exclusivity.
      Google Cloud deal (Oct 2025): access to up to 1M TPUs with 1GW+ compute capacity by 2026.
      This multi-cloud inference architecture reduces single-partner dependency risk compared to
      OpenAI's Azure-exclusive stateless API arrangement.
    sources:
      - url: https://stg-aws01pub.cnbc.com/2025/10/23/anthropic-google-cloud-deal-tpu.html
        kind: news_article
        description: "CNBC: Anthropic-Google Cloud deal — 1M TPUs, 1GW+ compute capacity."
        retrieved_at: "2026-03-29"
  infrastructure_independence:
    value: medium
    notes: >
      Anthropic is dependent on AWS (primary training) and Google (significant training/inference),
      but the multi-cloud arrangement and the Trainium2/TPU diversification provide meaningful
      hardware independence compared to single-cloud competitors. However, 'independence' is
      limited — both AWS and Google are major Anthropic investors and infrastructure partners,
      creating alignment-of-interest risk if either partner's compute strategy changes.
      Unlike OpenAI's Stargate (building independent compute infrastructure), Anthropic is
      deepening its cloud provider dependencies while gaining more favorable terms.
    sources: []

research_profile:
  orientation:
    value: frontier_lab
    notes: "Anthropic's primary mission is the responsible development of AI for the long-term benefit of humanity — a frontier safety lab that commercializes via Claude products. Safety research (Constitutional AI, interpretability) is core alongside capabilities research."
    sources: []
  openness:
    value: proprietary
    notes: "All production models are proprietary — weights not released. Anthropic publishes safety research (Constitutional AI papers, model cards, system cards) but does not release model weights. Contrast with Meta (open weights Llama) or Mistral."
    sources: []
  safety_approach:
    value: "Constitutional AI (CAI) + RLHF + Responsible Scaling Policy (RSP). The 2026 CAI constitution expanded to 23,000 words (from 2,700 in 2023). RSP establishes safety thresholds that trigger additional safeguards before deploying more capable models. Interpretability research (led by co-founder Chris Olah) aims to understand model internals — a differentiating research agenda from OpenAI and Google."
    notes: "Constitutional AI allows Claude to critique its own outputs against a set of principles, reducing dependency on human feedback for safety alignment. The RSP creates a governance commitment that, if broken, would require public explanation."
    sources:
      - url: https://en.wikipedia.org/wiki/Constitutional_AI
        kind: news_article
        description: "Constitutional AI background; 2026 constitution expanded to 23,000 words."
        retrieved_at: "2026-03-29"

