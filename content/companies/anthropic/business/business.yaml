    vendor: anthropic
    model_family: Claude 4
    architecture_type: dense_transformer
    weights_access: proprietary
    status: ga
    release_date: "2026-02-05"
    knowledge_cutoff: null  # Not disclosed by Anthropic

    capabilities:
      context_window_tokens:
