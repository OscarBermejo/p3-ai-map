            description: "Artificial Analysis: Claude Opus 4.6 context window 1M tokens."
            retrieved_at: "2026-03-29"
      max_output_tokens:
        value: null
        notes: "Max output tokens not publicly disclosed by Anthropic."
        sources: []
      modalities_in:
        value: [text, image, tool_result]
        notes: "Text and image input confirmed. No audio or video input."
        sources:
          - url: https://artificialanalysis.ai/models/claude-opus-4-6
            kind: independent_eval
            description: "Artificial Analysis: Opus 4.6 supports text and image input."
            retrieved_at: "2026-03-29"
      modalities_out:
        value: [text, code]
        notes: null
        sources: []
      tool_use:
        value: strong
        notes: "Parallel tool calling and complex agentic workflows supported. Computer use available (via computer use API). Opus 4.6 is Anthropic's recommended model for complex multi-tool agent workflows."
        sources: []
      computer_use:
        value: yes
        notes: "Computer use (GUI/browser control) available via beta API. Claude 4.x models support the computer_use_20250429 tool."
        sources:
          - url: https://docs.anthropic.com/en/about-claude/pricing
            kind: vendor_page
            description: "Anthropic pricing page: computer use tool available for Claude 4.x models."
            retrieved_at: "2026-03-29"
      structured_output:
        value: yes
        notes: null
        sources: []
      fine_tuning_available:
        value: no
        notes: "Fine-tuning not available for Claude Opus 4.6; proprietary weights."
        sources: []

    benchmarks:
      quality_index:
        value: 46
        notes: >
          Artificial Analysis Intelligence Index v4.0 (Non-reasoning, High Effort mode).
          Score: 46; Rank: #1/63 among comparable proprietary models in the >$1/M price tier.
          The index blends 10 evaluations: GDPval-AA, τ²-Bench Telecom, Terminal-Bench Hard,
          SciCode, AA-LCR, AA-Omniscience, IFBench, Humanity's Last Exam, GPQA Diamond, CritPt.
          Note: LinkedIn/Artificial Analysis also cited a score of 53 for Opus 4.6 in the
          full combined index (including reasoning model comparisons). The 46 is from the
          direct Artificial Analysis model page; treat as the most reliable single number.
          Recheck quarterly — Artificial Analysis index composition updated February 2026.
        sources:
          - url: https://artificialanalysis.ai/models/claude-opus-4-6
            kind: independent_eval
            description: "Artificial Analysis: Claude Opus 4.6 Intelligence Index score 46, rank #1/63."
            retrieved_at: "2026-03-29"
      chatbot_arena_elo:
        value: null
        notes: "Not extracted from current sources; check lmarena.ai for current ELO."
        sources: []
      gpqa_diamond:
        value: null
        notes: "GPQA score for Opus 4.6 not found in current sources. Claude Opus 4.5 (prior model) scored 87% on GPQA — Opus 4.6 expected higher."
        sources: []
      swe_bench_verified:
        value: null
        notes: "Claude Opus 4.5 (prior generation) scored 80.9% on SWE-bench Verified — the first model to exceed 80% and outperform human engineers on this benchmark. Opus 4.6 performance expected to be similar or higher."
        sources: []
      math_500:
        value: null
        notes: "Claude Opus 4.5 scored 95.2% on MATH — expected similar for Opus 4.6."
        sources: []
      mmlu_pro:
        value: null
        notes: null
        sources: []
      mmmu:
        value: null
        notes: null
        sources: []

    pricing:
      snapshot_date: "2026-03-29"
      input_per_million_tokens:
        value: 5.00
        notes: null
        sources:
          - url: https://docs.anthropic.com/en/about-claude/pricing
            kind: vendor_page
            description: "Anthropic official pricing page: Claude Opus 4.6 $5.00/$25.00 per MTok."
            retrieved_at: "2026-03-29"
      output_per_million_tokens:
        value: 25.00
        notes: "Significantly cheaper than Claude Opus 4.1 ($75/M output) and comparable to Claude Sonnet 4.6 at 1.67× the output price. Anthropic's 4.6 generation represents a dramatic price reduction at the Opus tier."
        sources: []
      context_caching_input:
        value: 0.50
        notes: "Cache hit price: $0.50/MTok (10% of standard input). 5-min cache write: $6.25/MTok; 1-hour cache write: $10.00/MTok. Prompt caching is critical for Opus 4.6 agentic workloads with large system prompts."
        sources: []
      batch_input_per_million_tokens:
        value: 2.50
        notes: "Batch API: 50% discount on input ($2.50/MTok vs $5.00/MTok standard)."
        sources: []
      hosted_reference_price:
        value: null
        notes: "Proprietary model — no self-hosted option."
        sources: []

    latency:
      snapshot_date: "2026-03-29"
      median_ttft_ms:
        value: 1970  # 1.97 seconds = 1,970 ms (Anthropic native API)
        notes: "Artificial Analysis: Opus 4.6 TTFT 1.97s on Anthropic API; 2.02s on Amazon; 2.04s on Google; 2.25s on Azure. Latency is above average for the price tier (median: 1.47s). Not suited for hard real-time interactive applications."
