# ─── Model catalog ────────────────────────────────────────────────────────────
# Current active model lineup as of March 2026.
# Claude 4.6 series (Feb 2026) is the current generation: Opus 4.6 is the flagship,
# Sonnet 4.6 is the coding/agentic workhorse (powers Claude Code).
# Claude 4.5 series (Opus Nov 2025; Sonnet/Haiku earlier 2025) are still active in production.
# Claude Haiku 3.5 is legacy but remains widely deployed for budget workloads.
# Deprecated: Claude 3.7 Sonnet, Claude Opus 3.

products:

