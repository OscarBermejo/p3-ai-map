          - url: https://artificialanalysis.ai/models/claude-opus-4-6
            kind: independent_eval
            description: "Artificial Analysis: Claude Opus 4.6 TTFT 1.97s (Anthropic), 2.02s (Amazon), 2.04s (Google), 2.25s (Azure)."
            retrieved_at: "2026-03-29"
      output_tokens_per_second:
        value: 40.7
        notes: "Artificial Analysis: 40.7 t/s (Anthropic API); 43.8 t/s (Amazon); 42.0 t/s (Google); 42.3 t/s (Azure). Notably slow at rank #41/63. High verbosity (11M tokens generated in Intelligence Index eval) partially explains throughput constraints."
        sources:
          - url: https://artificialanalysis.ai/models/claude-opus-4-6
            kind: independent_eval
            description: "Artificial Analysis: Claude Opus 4.6 output speed 40.7 t/s (Anthropic); Amazon fastest at 43.8 t/s."
            retrieved_at: "2026-03-29"

    derived_efficiency:
      quality_per_output_dollar:
        value: 1.84  # Derived: 46 / 25.00 = 1.84
        notes: "Derived: quality_index (46) / output_per_million_tokens ($25.00) = 1.84 quality points per output dollar. This is the lowest ratio in the current Claude lineup — Opus 4.6 is the highest quality but lowest price-performance ratio. Use Sonnet 4.6 (ratio 2.93) for cost-sensitive workloads. Recompute if pricing changes."
        sources: []
      arena_elo_per_output_dollar:
        value: null
        notes: "Arena ELO unavailable; cannot compute."
        sources: []

