      As of 2025-12-31 (10-Q): sum of disclosed operating data center MW — Childress TX ~650, Canal Flats BC ~30, Mackenzie BC ~80, Prince George BC ~50.
      Issuer states over 80% of operating data center capacity is in the United States.
