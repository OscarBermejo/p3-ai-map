        description: "Form 10-Q accession 0001878848-26-000015; period ended 2025-12-31 — operating MW by site."
        retrieved_at: "2026-03-22"
  contracted:
    value: null
    notes: |
      No issuer-disclosed aggregate “MW under contract but not online” separate from secured grid/LOA MW. Sweetwater 1 (~1,400 MW) and Sweetwater 2 (~600 MW) in development; Horizon 1–4 liquid-cooled IT load up to 200 MW combined at Childress (10-Q).
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1878848/000187884826000015/iren-20251231.htm
        kind: sec_10q
        description: "Form 10-Q accession 0001878848-26-000015 — development MW narrative."
        retrieved_at: "2026-03-22"
  secured:
    value: 4500
    notes: |
      Seven sites with executed grid connection agreements or LOAs ~4,500 MW total power capacity (10-Q). Separate ~1,600 MW grid-connected power rights for new Oklahoma site.
      Feb 2026 PR: secured grid-connected power >4.5 GW; ~1.6 GW Oklahoma campus narrative.
