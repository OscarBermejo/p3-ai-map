      Dell — GPU supply ~USD 5.8bn, four tranches in 2026 from Mar 2026 (10-Q). Mar 2026 PR: B300 procurement scaling fleet to 150k GPUs; ~USD 3.5bn incremental capex for orders in H2 2026 (post-shipment payment terms).
