central_questions:
  - "IREN has the power, the contract, and the GPUs on order — but the market is no longer giving credit for announced scale. The real question now is whether Q3-Q4 AI Cloud revenue proves the economics work, or whether this stays a story where the footnotes matter more than the headlines."

sections:
  - id: the_headline_vs_the_footnote
    title: "The most important thing about IREN is the gap between its headlines and its footnotes"
    body: |
      Every material IREN disclosure in the past six months has had a headline that advances the AI platform narrative and a footnote that qualifies it. The March 2026 8-K says the 150,000 GPU fleet will support "over $3.7 billion" of AI Cloud annualized run-rate by end-2026. Footnote (1) says that figure is "illustrative," based on "internal assumptions" about GPU models, utilization, pricing, term, and counterparty, and is "not fully contracted."

      The $9.7 billion Microsoft contract sounds transformative. The 10-Q discloses it is structured with ~20% prepayment before each tranche delivery, spread across four phased deployments. That is a meaningful commitment — but it is also a contract that has barely begun generating revenue. Q2 FY26 AI Cloud Services revenue was **$17.3 million** against **$184.7 million** total. That is 9.4% of revenue from the business the entire narrative is built around.

      This is not an indictment of the strategy. It is a statement about where the company actually is. The market priced IREN as a near-certainty AI infrastructure winner after the Microsoft announcement in November 2025, then repriced it 23.8% lower in February 2026 when the Q2 earnings miss and the absence of a second deal reminded investors that announced scale and realized economics are not the same thing.

  - id: dilution_is_the_real_bear_thesis
    title: "The dilution debate is not about whether IREN needs capital — it's about whether shareholders will own enough of the upside"
    body: |
      The $6 billion ATM program filed in March 2026 is the single most polarizing feature of the IREN story. At ~$14 billion market cap, it represents ~43% dilution capacity. The prior $1 billion ATM was tapped through 66.7 million shares. Jim Chanos is short. A 2x leveraged short ETF has been launched against the stock.

      Bulls argue this is Amazon-style infrastructure investment — build ahead of demand, fund it however you can, and the revenue curve will dwarf the dilution. EMJ Capital's Eric Jackson explicitly makes this comparison, noting that the Microsoft deal uses less than 10% of IREN's total power capacity.

      Bears argue this looks more like AMC Entertainment's serial dilution — a company issuing equity into retail enthusiasm while the underlying economics remain unproven. The Q2 FY26 EPS miss (-$0.52 vs -$0.24 expected) and the operating loss of **$116.4 million** on **$184.7 million** of revenue make the point: the company is losing money while asking for permission to sell $6 billion of stock.

      The honest answer is that both sides are partly right. IREN's power portfolio (4.5 GW secured, 810 MW operational) is a real asset that does not exist in most AI infrastructure competitors at this scale. But the asset only creates shareholder value if the revenue that flows through it grows faster than the share count. The next two quarters will determine whether the ATM is a bridge to a platform or a bridge to more dilution.

  - id: competitive_position_is_deteriorating_on_deal_flow
    title: "IREN's competitive position is strong on power but weakening on deal flow"
    body: |
      The neocloud landscape has shifted rapidly in the past six months. When IREN signed the $9.7 billion Microsoft deal in November 2025, it was one of the largest hyperscaler commitments to a neocloud. By March 2026, Nebius has signed **$27 billion with Meta** and **$17.4 billion with Microsoft** — a combined **$44+ billion** in contracted hyperscaler deals. CoreWeave has **250,000+ GPUs deployed** generating **~$5 billion** in annual revenue. IREN has one anchor customer and **$17.3 million** in quarterly AI Cloud revenue.

      Where IREN genuinely wins is power infrastructure. The 4.5 GW secured portfolio — with 18% utilization — provides scaling runway that most competitors cannot match without years of permitting and grid negotiation. The vertical integration model (own, build, operate) gives cost control. Debt burden (~$3.84 billion) is dramatically lower than CoreWeave (~$18.8 billion).

      But the market is not waiting for power portfolios to convert. It is rewarding companies that are signing deals and deploying GPUs today. The Bernstein note after Q2 earnings explicitly identified the missing second deal as the selloff catalyst — not the earnings miss itself. This is telling: the market wants proof that the power moat translates into customer diversification, and right now IREN has not delivered that proof.

      The Sweetwater 1 substation energization (targeted Q2 2026) is the critical near-term milestone. If it lands on schedule, IREN has ~1,400 MW of fresh capacity to sell to a second customer. If it slips, the gap between IREN's deal-flow narrative and its peers' deal-flow reality widens further.

  - id: bitcoin_mining_bridge_is_underappreciated
    title: "The market has forgotten that Bitcoin mining is still 90% of the revenue — and that matters"
    body: |
      IREN's Q2 FY26 segment breakdown shows **$167.4 million** from Bitcoin Mining and **$17.3 million** from AI Cloud Services. The entire current cash-generating ability of the company comes from mining. Operating cash flow was **$71.7 million** — essentially all from the legacy business.

      This creates a dependency that almost no AI-focused coverage discusses. If Bitcoin price drops materially during the 12-18 months it takes for AI Cloud revenue to ramp, IREN's ability to fund the transition from internal cash flow weakens. The company would become more dependent on the ATM, convertible notes, and GPU financing — exactly the instruments that already concern the market.

      The flip side is that Bitcoin mining provides something most neoclouds lack: an existing revenue stream that funds operations while the AI business scales. CoreWeave is burning cash. Nebius lost $100.4 million on $146.1 million in revenue. IREN's mining economics are imperfect but real. The risk is not that mining is bad — it is that the market has priced the AI story without adequately weighing the mining bridge's sensitivity to crypto prices.

  - id: what_would_change_the_thesis
    title: "Three things that would change how to read this company"
    body: |
      **1. A second hyperscaler deal ($5B+ TCV).** This is the single most important catalyst. It would validate the power moat thesis, diversify away from Microsoft concentration, and likely trigger a meaningful re-rating. Sweetwater 1 energization creates the capacity to sell; the question is whether management converts it. Every quarter without a second deal announcement increases the risk that IREN's power portfolio is valuable in theory but undermonetized in practice.

      **2. AI Cloud revenue exceeding $100M in a quarter.** This would prove that GPU deployment is translating into real economics at a meaningful scale. Q2 FY26 was $17.3M. The gap between $17M and the illustrative ~$925M quarterly run-rate implied by the $3.7B target is enormous. Even a $100M quarter would not close it, but it would show the unit economics are working.

      **3. ATM usage disclosure.** How aggressively management taps the $6B ATM in the next two quarters will signal how they view the tradeoff between dilution and speed. Heavy usage at current prices (~$35) would confirm the bear thesis on dilution. Minimal usage would suggest the capital structure is already adequate for near-term deployment — and would be the strongest signal that management believes in the economics.

  - id: conclusion
    title: "How to read IREN right now"
    body: |
      IREN is a company where the underlying assets are real but the market narrative has gotten ahead of the demonstrated economics. The 4.5 GW power portfolio, the $9.7B Microsoft contract, the 150,000 GPU fleet target, and the ~$9.3B in secured financing are not fiction — they are filed, disclosed, and material. But the Q2 FY26 income statement shows a company that is still 90% Bitcoin mining by revenue, losing $116.4M from operations, and reporting $17.3M in AI Cloud revenue against guidance that implies $3.7B+ annualized.

      The market correctly identified this gap in February 2026, driving the stock down 23.8%. Sell-side analysts remain overwhelmingly bullish (13 Buy, 4 Hold, 1 Sell; median target $71.69 vs ~$35 current), but the 106% implied upside is itself a signal of how divided the market is on execution probability. The retail community has turned bearish, unfavorably comparing IREN's single $9.7B deal to Nebius's $44B+ in hyperscaler contracts.

      **The most likely path forward:** The next two quarters will be dominated by execution milestones — Sweetwater 1 energization, B300 GPU deployment at Mackenzie and Childress, and the first full quarters where the Microsoft ramp should start generating visible AI Cloud revenue. If AI Cloud revenue reaches $50-100M per quarter by Q4 FY26, the narrative shifts from "transition story" to "early-stage platform with proof of conversion." If it stays below $30M while the ATM is being tapped, the market will increasingly treat IREN as a capital-consuming build story that is falling behind faster-moving peers.

      **The information asymmetry the market is most likely mispricing:** The gap between the illustrative $3.7B ARR headline and the "not fully contracted" footnote. Most coverage cites the big number without the qualifier. The next two quarters of actual AI Cloud revenue will close this gap one way or the other — and that is the single most important data point to watch.

      **What remains unknown:** Detailed AI Cloud unit economics (revenue per GPU, margin per deployed cluster), the timing and terms of a second hyperscaler contract, exact ATM usage plans, and whether Bitcoin mining revenue stability holds through the transition period. These are not small gaps — they are the gaps that determine whether IREN's current share price is a bargain or fair value for the execution risk.

disclosure_gaps: |
  This narrative is strongest on capital formation, competitive dynamics, and the gap between
  announced scale and realized economics. Key limitations:
  - Detailed AI Cloud unit economics (revenue/GPU, margin/cluster) are not publicly disclosed
  - FY2025-Q3 (Jan-Mar 2025) and FY2025 10-K (Apr-Jun 2025) are filed on EDGAR but not yet
    in this repo — adding them would improve trend analysis for the mining-to-AI transition
  - Earnings transcript was reviewed via secondary summaries, not the full primary transcript
  - Sell-side research was summarized from aggregator statistics, not individual reports
  - Competitive comparisons rely on publicly available metrics; CoreWeave and Nebius financial
    detail is limited by their respective disclosure levels

