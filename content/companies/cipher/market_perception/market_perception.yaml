      summary: "AWS (15-year, $5.5B) and Fluidstack with Google backstop (10-year, $3.8B) are blue-chip, long-duration contracts. The AWS deal is unusually long for the sector. The Google backstop on the Fluidstack lease provides credit protection that few HPC landlords can show."
