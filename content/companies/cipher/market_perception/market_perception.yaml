# ── Consensus narrative ─────────────────────────────────────────────────────────
consensus_narrative:
  summary: >
    The market sees Cipher as the most aggressive bitcoin-miner-to-HPC-infrastructure
    pivot, having gone from zero contracted AI hosting to ~$9.3B in hyperscaler deals
    (AWS $5.5B + Fluidstack/Google $3.8B) in a matter of months. The corporate rebrand
    to Cipher Digital (Feb 2026) is symbolic of the intended identity shift. But revenue
    is still almost entirely mining (~$60M/quarter), the company has accumulated ~$3.2B
    of debt to fund the transition, and the first meaningful hosting rent doesn't arrive
    until late 2026 at the earliest. The debate is whether this is a well-timed infrastructure
    play or a leveraged bet that has outrun its revenue by two years.

  bull_thesis:
    view: >
      Cipher controls one of the largest power-and-land portfolios among former bitcoin
      miners: 4.2 GW across 10 sites, plus a 3.4 GW pipeline. It has converted this into
      two tier-1 hyperscaler contracts (AWS 15-year, Fluidstack/Google 10-year with Google
      backstop) totaling ~$9.3B of contracted revenue. Black Pearl (300 MW, AWS) and
      Barber Lake (168 MW, Fluidstack/Google) are under construction with 95% of long-lead
      equipment secured. HPC revenue is projected to reach ~$127M in 2026 and ~$739M by
      2027. The Colchis JV adds up to 1 GW of future capacity. Morgan Stanley has the
      highest target at $38, reflecting the bull case for the infrastructure portfolio.
    key_assumptions:
      - "Black Pearl Phase I rent commences Q4 2026, full ramp Q1 2027"
      - "Barber Lake delivers 168 MW to Fluidstack by September 2026"
      - "HPC revenue reaches ~$739M by 2027, exceeding mining revenue"
      - "~$3.2B of debt is serviceable from hyperscaler lease cash flows"
      - "Additional hyperscaler contracts close from the 3.4 GW+ pipeline"
    sources:
      - url: https://www.trefis.com/stock/cifr/articles/592335/cipher-digital-stock-9-0-ai-pivot-gains-traction-at-morgan-stanley-conf/2026-03-05
        kind: curated_platform
        description: "Curated platform: Trefis — Cipher Digital AI pivot gains traction at Morgan Stanley conference."
        retrieved_at: "2026-03-28"
      - url: https://finviz.com/news/264465/cipher-minings-aihpc-expansion-takes-shape-is-the-shift-paying-off
        kind: curated_platform
        description: "Curated platform: FinViz — Cipher Mining's AI/HPC expansion analysis."
        retrieved_at: "2026-03-28"

  bear_thesis:
    view: >
      Cipher went from zero debt to ~$3.2B in roughly one year. Annual interest obligations
      (~$245M) exceed the company's entire FY2025 revenue ($224M). The $2B senior secured
      notes at 6.125% and $1.3B convertible notes create a debt wall that must be serviced
      before any hosting revenue arrives. Q4 2025 showed -$54M OCF, -$300M operating loss,
      and -$734M net loss. CEO insider selling ($631K in March) and 119% annualized
      volatility signal fragility. The stock at ~$7-8 trades at ~31x P/S on a mining
      revenue base while the HPC story remains entirely pre-revenue.
    key_assumptions:
      - "Construction delays or interconnection issues at Black Pearl/Barber Lake could strand capital"
      - "~$245M annual interest exceeds current revenue — no room for execution slips"
      - "Bitcoin mining economics deteriorate post-halving, weakening the cash flow bridge"
      - "Additional capital needed for the remaining 3.4 GW pipeline"
      - "Hyperscaler counterparties could renegotiate or slow absorption of contracted capacity"
    sources:
      - url: https://www.ainvest.com/news/cipher-2b-note-offering-catalyst-hpc-transition-debt-overhang-2602/
        kind: curated_platform
        description: "Curated platform: ainvest — '$2B Note Offering: A Catalyst for HPC Transition or a Debt Overhang?'"
        retrieved_at: "2026-03-28"
      - url: https://www.ainvest.com/news/cipher-mining-hpc-pivot-hype-cycle-2602/
        kind: curated_platform
        description: "Curated platform: ainvest — 'The HPC Pivot or Just a Hype Cycle?'"
        retrieved_at: "2026-03-28"

  embedded_assumptions:
    - assumption: "Hyperscaler demand for third-party HPC capacity persists through the multi-year lease terms"
      notes: "AWS and Google committed to decade-plus leases, but both build their own data centers as well. These leases may represent hedging during a scarcity period rather than permanent outsourcing."
      sources: []
    - assumption: "Cipher can execute construction on schedule across multiple sites simultaneously"
      notes: "95% of long-lead equipment is secured, which is genuine progress. But simultaneous Black Pearl and Barber Lake construction with a lean team and new corporate identity creates execution surface area."
      sources:
        - url: https://finviz.com/news/264465/cipher-minings-aihpc-expansion-takes-shape-is-the-shift-paying-off
          kind: curated_platform
          description: "Curated platform: FinViz — equipment procurement and construction progress."
          retrieved_at: "2026-03-28"
    - assumption: "Bitcoin mining provides a cash flow bridge until HPC revenue arrives"
      notes: "Mining revenue was $224M in FY2025 but OCF was -$208M for the full year. The mining business is not cash-generative enough to bridge the transition alone — the bridge is debt, not mining cash flow."
      sources: []

  narrative_shift:
    direction: mixed
    summary: >
      Sentiment is split. The stock gained ~150% from its lows on the strength of the
      AWS and Fluidstack/Google contracts, the rebrand, and the infrastructure pipeline.
      But the $2B secured notes offering (Feb 2026) caused a 5% pre-market drop, and
      the Q4 $734M net loss spooked some investors even as shares rose 6% on the day.
      The market is giving credit for the pipeline but remains nervous about the debt
      load and the gap between contracted revenue and actual cash flow.
    prior_consensus: "Speculative bitcoin miner with some power assets and optionality on AI hosting."
    sources:
      - url: https://www.coindesk.com/markets/2026/02/24/cipher-digital-rebrands-as-it-pivots-from-bitcoin-mining-to-hpc-shares-slide
        kind: curated_platform
        description: "Curated platform: CoinDesk — rebrand coverage and HPC pivot framing."
        retrieved_at: "2026-03-28"

# ── Key debates ─────────────────────────────────────────────────────────────────
key_debates:
  - id: debt_serviceability
    question: "Can Cipher service ~$3.2B of debt ($245M+ annual interest) on a ~$224M revenue base before HPC rent arrives?"

    bull_case:
      argument: "The debt is purpose-built for specific projects with contracted tenants. The $2B Black Pearl notes are secured against the AWS lease — essentially project finance against a 15-year hyperscaler commitment. The $1.3B convertible notes at 0% coupon have zero cash interest cost. Cash and bitcoin liquidity ($754M) provides a runway through 2026 until HPC rent commences. By 2027 the HPC revenue alone ($739M projected) should cover all interest costs."
      evidence: "Black Pearl $2B notes at 6.125% = ~$122M annual interest. $1.3B convertible at 0% = zero cash interest. Combined with mining cash flow and $754M liquidity. AWS lease and Fluidstack/Google contracts totaling $9.3B provide the cash flow to repay."
      sources:
        - url: https://marketchameleon.com/articles/b/2026/2/3/cifr-announces-2-billion-senior-notes-black-pearl-facility
          kind: curated_platform
          description: "Curated platform: Market Chameleon — Black Pearl notes structure and terms."
          retrieved_at: "2026-03-28"

    bear_case:
      argument: "FY2025 operating cash flow was -$208M. Mining revenue ($224M) cannot cover the interest burden alone. The 0% convertible has zero cash interest but creates dilution risk (404M shares outstanding, convertible terms not fully disclosed). The $2B secured notes at 6.125% carry a completion guarantee — if Black Pearl construction delays, Cipher is on the hook. And the remaining 3.4 GW pipeline will require additional billions of financing. The debt-to-equity ratio at year-end was already 4:1 ($3.2B debt vs $806M equity)."
      evidence: "Debt/equity 4:1. OCF -$208M FY2025. Interest expense on $2B notes alone = $122M/year. Share count up from ~302M to ~405M in FY2025 (34% dilution)."
      sources:
        - url: https://www.ainvest.com/news/cipher-2b-note-offering-catalyst-hpc-transition-debt-overhang-2602/
          kind: curated_platform
          description: "Curated platform: ainvest — debt overhang analysis."
          retrieved_at: "2026-03-28"

    resolution_evidence: "Black Pearl Phase I rent commencement in Q4 2026. If AWS lease payments begin on schedule, the debt becomes project-financed against real cash flow. If construction delays push commencement into 2027, the interest-revenue gap widens."
    current_lean: neutral
    lean_reasoning: "The structure is intelligently designed — project finance against hyperscaler leases — but the margin of error is thin. A single quarter of construction delay changes the math significantly."

  - id: mining_bridge_viability
    question: "Is bitcoin mining a viable cash flow bridge or a deteriorating legacy business?"

    bull_case:
      argument: "Mining provides ~$60M/quarter revenue and keeps the lights on while HPC is built. Bitcoin's post-halving price recovery supports mining profitability. The mining fleet (207 MW) can be wound down as HPC capacity comes online, reducing capex. Some sites (like the Odessa facility) may be repurposed for HPC."
      evidence: "Q4 2025 revenue $59.7M. Mining operations remain operational at ~207 MW."
      sources: []

    bear_case:
      argument: "FY2025 operating cash flow was -$208M on $224M of mostly mining revenue. Post-halving difficulty adjustments and rising energy costs mean mining is cash-flow-negative at the operating level. The mining fleet requires ongoing maintenance capex. It's not a bridge — it's a cost center being subsidized by debt."
      evidence: "OCF was negative in every quarter of FY2025. Mining hash rate and difficulty adjustments post-2024 halving."
      sources:
        - url: https://finance.yahoo.com/news/cipher-mining-cifr-pivot-toward-111900240.html
          kind: curated_platform
          description: "Curated platform: Yahoo Finance — Q4 financial analysis highlighting losses."
          retrieved_at: "2026-03-28"

    resolution_evidence: "Q1-Q2 2026 mining OCF. If mining generates positive operating cash flow as a standalone segment, the bridge thesis holds. If not, the transition is entirely debt-funded with no internal cash cushion."
    current_lean: bear
    lean_reasoning: "The numbers don't support the bridge narrative. Full-year OCF was -$208M. Mining is contributing revenue but not positive cash flow. The bridge is debt, not mining."

  - id: miner_vs_neocloud_identity
    question: "Is Cipher transitioning into a real infrastructure platform or just a leveraged power arbitrage?"

    bull_case:
      argument: "The rebrand to Cipher Digital signals permanent identity shift. $9.3B in contracted hyperscaler revenue, two blue-chip tenants (AWS, Google backstop), 4.2 GW portfolio, and construction underway at multiple sites. This is no longer optionality — it's committed capital and signed contracts. The pipeline (3.4 GW more) positions Cipher as a power-rich data center developer."
      evidence: "Legal name changed. $9.3B contracted. 95% of long-lead equipment secured. Construction active at Black Pearl and Barber Lake."
      sources:
        - url: https://www.ainvest.com/news/cipher-digital-surges-6-28-hpc-pivot-360m-volume-ranks-363rd-2603/
          kind: curated_platform
          description: "Curated platform: ainvest — HPC pivot momentum."
          retrieved_at: "2026-03-28"

    bear_case:
      argument: "Cipher doesn't operate a managed platform, cloud software, or GPU fleet. It's building shells — physical data center capacity leased to hyperscalers on long-term terms. This is closer to a power REIT or industrial landlord than a technology company. The premium valuation implied by 'AI infrastructure' doesn't match landlord economics. And the bitcoin mining base is still 100% of current revenue."
      evidence: "Business profile: offers_managed_platform = false. No GPU fleet. Revenue 100% mining. HPC model is tenant lease, not platform."
      sources:
        - url: https://www.sec.gov/Archives/edgar/data/1819989/000181998926000009/cifr-20251231.htm
          kind: sec_10k
          description: "Form 10-K — business model: data center owner/operator, not cloud platform."
          retrieved_at: "2026-03-28"

    resolution_evidence: "Whether Cipher develops any software or managed-service layer on top of the physical infrastructure. If it remains a pure landlord, the correct valuation framework is data center REIT, not AI infrastructure. If it adds services, the multiple could expand."
    current_lean: bear
    lean_reasoning: "The disclosed business model is clearly landlord/lease, not platform. The market may be giving AI-infrastructure multiples to what is fundamentally a construction-and-lease business."

