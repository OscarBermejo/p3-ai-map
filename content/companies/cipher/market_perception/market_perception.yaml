      relevance: "Another bitcoin miner pivoting to HPC hosting. Filed for bankruptcy and emerged in 2024. Signed CoreWeave as anchor tenant. Useful comp for transition speed and debt management post-restructuring."
      sources: []
    - slug: null
      name: Riot Platforms (RIOT)
      relevance: "Large bitcoin miner that has been slower to pivot to HPC. Provides a 'what if Cipher had not pivoted' comparison baseline."
