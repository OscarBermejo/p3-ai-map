      sources: []

# ── Information asymmetries ─────────────────────────────────────────────────────
information_asymmetries:
  - id: mining_is_not_a_bridge
    title: "Bitcoin mining is not a cash flow bridge — the bridge is debt"
    market_believes: "Cipher's mining operations provide a cash flow bridge until HPC revenue arrives."
    evidence_suggests: "FY2025 operating cash flow was -$208M on $224M of revenue. Q4 2025 OCF was -$54M on $60M revenue. Mining is cash-flow-negative at the operating level. The actual bridge is the $628M of cash raised through debt and equity issuance, not mining profitability."
    gap_reason: "The presence of mining revenue creates the appearance of a live business funding the transition. The OCF number, buried deeper in the financials, tells a different story."
    closing_catalyst: "Disclosure of segment-level cash flow for mining vs HPC when hosting revenue begins. If mining OCF is separately reported as negative, the narrative shifts."
    confidence: high
    sources:
      - url: https://data.sec.gov/api/xbrl/companyfacts/CIK0001819989.json
        kind: sec_companyfacts_json
        description: "XBRL — FY2025 OCF -$208M, Q4 OCF -$54M."
        retrieved_at: "2026-03-28"

  - id: net_loss_is_mostly_non_cash
    title: "The $734M Q4 net loss is mostly non-cash — but the operating loss is real"
    market_believes: "Cipher lost $734M in Q4 2025, which sounds catastrophic."
    evidence_suggests: "The $734M net loss includes large non-cash items (mark-to-market on bitcoin holdings, D&A ramp from construction, SBC). The operating loss of $301M is more informative but still includes significant non-cash charges. Gross profit was actually $35.5M on $59.7M revenue — a 59% gross margin. The underlying mining business isn't unprofitable at the gross level; the losses come from below-the-line items and the massive overhead of transitioning."
    gap_reason: "Headlines focus on net loss. The GAAP structure forces non-cash items into the P&L, making operational performance look worse than it is."
