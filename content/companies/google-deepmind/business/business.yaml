# Google DeepMind — Models Layer Business Profile
# Scope: Gemini model family, Imagen, Veo; Google AI Studio + Vertex AI platform.
# Out of scope: Google Cloud infrastructure capacity, TPU hardware, Search/Workspace AI features.
# Profile reflects product availability as of 2026-03-30.

layer: models
profile_version: 1
as_of: "2026-03-30"

# ─── Model catalog ────────────────────────────────────────────────────────────
# Models listed in reverse recency order (newest first).
# For context_window_tokens >200K, pricing tiers differ — see pricing notes.

products:

