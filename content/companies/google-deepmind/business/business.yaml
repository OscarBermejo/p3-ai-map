# ─── Company-level context ────────────────────────────────────────────────────

api_platform:
  platform_name:
    value: "Google AI Studio / Vertex AI"
    notes: >
      Two-tier access: (1) Google AI Studio — developer-focused, pay-per-token REST API
      with a free rate-limited tier. (2) Vertex AI — Google Cloud enterprise platform
      with MLOps tooling, VPC isolation, custom data residency, HIPAA/BAA compliance.
      Both expose the same Gemini model versions via different SDKs.
    sources:
      - url: "https://ai.google.dev"
        kind: vendor_docs
        description: "Google AI Studio developer portal"
        retrieved_at: "2026-03-30"
      - url: "https://cloud.google.com/vertex-ai/docs/generative-ai/overview"
        kind: vendor_docs
        description: "Vertex AI Generative AI overview"
        retrieved_at: "2026-03-30"
  deployment_options:
    value:
      - "Google AI Studio (direct API)"
      - "Vertex AI (Google Cloud enterprise)"
      - "Gemini for Google Workspace (embedded in productivity suite)"
    notes: "No third-party cloud hosting of Gemini (no Bedrock or Azure equivalents); Google distributes exclusively through its own platforms."
    sources: []
  enterprise_features:
    value:
      - "SOC 2 Type II"
      - "ISO/IEC 27001"
      - "HIPAA BAA (via Vertex AI)"
      - "Data Processing Addendum"
      - "No training on customer data (default)"
      - "VPC Service Controls"
      - "Customer-managed encryption keys (CMEK)"
      - "Audit logging via Cloud Audit Logs"
      - "Regional data residency options"
      - "SSO/SAML via Google Identity"
    notes: "Enterprise features are Vertex AI-only; Google AI Studio has minimal enterprise controls."
    sources:
      - url: "https://cloud.google.com/vertex-ai/docs/generative-ai/security-compliance"
        kind: vendor_docs
        description: "Vertex AI security and compliance documentation"
        retrieved_at: "2026-03-30"
  sla_uptime:
    value: "99.9%"
    notes: "Vertex AI API SLA. Google AI Studio does not carry an SLA."
    sources:
      - url: "https://cloud.google.com/terms/sla"
        kind: vendor_docs
        description: "Google Cloud SLA — Vertex AI"
        retrieved_at: "2026-03-30"

compute_dependency:
  primary_training_infrastructure:
    value: "Google TPU v5 / v7 Ironwood (proprietary, internally owned)"
    notes: >
      Gemini 2.5 and 3.x models were trained on Google's TPU v5 and v7 Ironwood clusters,
      entirely within Google's own data centers. Google does not pay Azure, AWS, or any
      external hyperscaler for training compute. TPU v7 Ironwood (announced I/O 2025) is
      Google's largest training chip to date — 9,216 chips per pod, 42 exaFLOPS per pod.
      This is a structural cost advantage: training cost is amortized over Google's hardware
      capex rather than cloud provider margins.
    sources:
      - url: "https://blog.google/products/google-cloud/ironwood-tpu-google-io-2025/"
        kind: vendor_blog
        description: "Google TPU v7 Ironwood announcement (Google I/O 2025)"
        retrieved_at: "2026-03-30"
  primary_inference_infrastructure:
    value: "Google TPU v6e Trillium (proprietary, internally owned)"
    notes: >
      Gemini inference runs on TPU v6e Trillium clusters in Google's data centers.
      TPU v6e Trillium delivers 4.7x better cost-per-performance than NVIDIA H100/H200
      for LLM inference (Google-reported), with 67% lower power per unit of compute.
      This contrasts sharply with OpenAI (inference on Azure NVIDIA GPUs, paying
      hyperscaler rates) and Anthropic (inference on AWS GPUs).
      The structural implication: Google's inference margin floor is structurally below
      its competitors' — enabling sustained aggressive pricing on Gemini Flash models
      ($0.10–$0.40/M tokens) that OpenAI or Anthropic cannot profitably match
      without cross-subsidy from other revenue streams.
    sources:
      - url: "https://cloud.google.com/blog/products/compute/trillium-tpu-is-ga"
        kind: vendor_blog
        description: "Google TPU v6e Trillium GA announcement"
        retrieved_at: "2026-03-30"
  infrastructure_independence:
    value: high
    notes: >
      HIGH. Google owns its training and inference compute end-to-end (TPU design,
      data center construction, networking). It is the only frontier AI lab with this
      level of vertical integration. OpenAI has LOW independence (Azure-exclusive);
      Anthropic has LOW (AWS-exclusive). Meta has MEDIUM (owned data centers but runs
      on NVIDIA GPUs). Google and xAI (Colossus cluster) are the only frontier labs
      approaching full independence; Google's scale advantage (>$91B FY2025 capex)
      makes this the most durable structural cost moat in the model layer.
    sources: []

research_profile:
  orientation:
    value: hybrid
    notes: >
      Google DeepMind is a frontier lab (Transformer co-invention 2017, AlphaFold,
      AlphaCode, AlphaStar, Gemini) that also ships production products (Gemini API,
      Google Search AI Mode, Workspace AI features). The tension between frontier
      research and product deployment is the central narrative challenge — the
      innovator's dilemma analyzed in the structural analysis and narrative files.
    sources: []
  openness:
    value: proprietary
    notes: >
      Gemini models are fully proprietary — no weights released. Google has not
      pursued an open-weights strategy for its frontier models (unlike Meta with
      Llama). Google Gemma (a separate smaller model family) is open-weights but
      is excluded from this profile (it is not a product of the Google DeepMind
      commercial models team in the same way).
    sources: []
  safety_approach:
    value: >
