extended_notes:
  q3_2025_eu_dma_fine:
    description: >
      Q3 2025 G&A ($7,393M) includes a $3,500M accrual for a European Commission
      Digital Markets Act (DMA) fine relating to Google Search self-preferencing.
      Normalized G&A would be ~$3,893M; normalized SGA ~$11,098M.
      Operating income would be ~$34,728M on a normalized basis (vs $31,228M reported).

  google_cloud_segment:
    description: |
      Google Cloud is the closest commercial proxy for AI model/API traction available
      in Alphabet's public disclosures. Gemini API revenue, Vertex AI AI-specific revenue,
      and model-level margins are NOT separately disclosed by Alphabet.
    q3_2025:
      revenue_usd: 15157000000
      revenue_yoy_pct: 34.0
      prior_year_revenue_usd: 11353000000  # Q3 2024
      operating_income_usd: 3594000000
      operating_margin_pct: 23.7
      prior_year_operating_margin_pct: 17.1  # Q3 2024
      note: >
        Both revenue and OI direct from Q3 2025 earnings release segment table.
        Margin expansion to 23.7% (+6.6 ppts YoY) is a continuation of the AI workload
        scale economics trend. Management noted that Gemini API usage and Vertex AI
        AI Agents were primary drivers of Google Cloud revenue acceleration.
    google_cloud_cumulative_2025_ytd:
      revenue_millions_ytd: 41041  # Q1 $12,260M + Q2 $13,624M + Q3 $15,157M
      operating_income_millions_ytd: 8602  # Q1 $2,182M + Q2 $2,826M + Q3 $3,594M
    non_disclosed_items:
      - "Gemini API revenue — not broken out in any Alphabet filing"
      - "Vertex AI AI-specific revenue — not separately reported"
      - "Model-level gross margin or contribution margin — not disclosed"
      - "Number of active Gemini API customers — not disclosed"

