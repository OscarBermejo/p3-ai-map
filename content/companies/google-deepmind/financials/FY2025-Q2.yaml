extended_notes:
  google_cloud_segment:
    description: |
      Google Cloud is the closest commercial proxy for AI model/API traction available
      in Alphabet's public disclosures. Gemini API revenue, Vertex AI AI-specific revenue,
      and model-level margins are NOT separately disclosed by Alphabet.
    q2_2025:
      revenue_usd: 13624000000
      revenue_yoy_pct: 32.0
      prior_year_revenue_usd: 10320000000  # Q2 2024
      operating_income_usd: 2826000000
      operating_margin_pct: 20.7
      prior_year_operating_margin_pct: 11.3  # Q2 2024
      note: >
        Both revenue and operating income direct from Q2 2025 earnings release segment table.
        Margin expansion (+9.4 ppts YoY) driven by AI workload scale economies and
        efficiency gains in infrastructure. AI Overviews integration and Gemini API growth
        cited by management as primary drivers of Google Cloud acceleration.
    non_disclosed_items:
      - "Gemini API revenue — not broken out in any Alphabet filing"
      - "Vertex AI AI-specific revenue — not separately reported"
      - "Model-level gross margin or contribution margin — not disclosed"
      - "Number of active Gemini API customers — not disclosed"

