platform:
  offers_managed_platform:
    value: true
    notes: |
      OCI provides a full managed cloud platform with 200+ services. AI-specific
      offerings include OCI Generative AI (hosting models from Cohere, Meta,
      xAI/Grok), OCI AI Infrastructure (GPU superclusters), OCI Data Science,
      OCI Vision/Speech/Language, and Oracle Database with AI Vector Search.
      OCI Superclusters scale up to 131,072 NVIDIA Blackwell GPUs with
      Acceleron RoCE networking (52 Pbps, sub-2µs latency). DGX Cloud available
      on OCI. Deployment options include public cloud, Dedicated Region
      (on-premises), Cloud@Customer, OCI Alloy (partner-operated), and
      sovereign cloud.
    sources:
      - url: https://www.oracle.com/cloud/
        kind: product_page
        description: "Oracle Cloud homepage: 200+ services overview."
        retrieved_at: "2026-03-29"
      - url: https://blogs.oracle.com/cloud-infrastructure/oracle-nvidia-gtc-2026-key-announcements
        kind: vendor_blog
        description: "Oracle-NVIDIA GTC 2026: supercluster, Acceleron networking, Vera Rubin."
        retrieved_at: "2026-03-29"
  summary:
    value: |
      Hyperscale cloud platform (OCI) with full IaaS/PaaS/SaaS stack. Primary AI
      infrastructure differentiators: (1) OCI Superclusters — bare-metal GPU clusters
      scaling to 131,072 Blackwell GPUs with ultra-low-latency RDMA networking;
      (2) Zettascale10 architecture connecting hundreds of thousands of GPUs across
      data centers for multi-zettaFLOPS AI training; (3) Multicloud strategy with
      low-latency interconnects to AWS, Azure, GCP (Oracle Database@Azure/AWS/GCP);
      (4) Distributed cloud deployment via Dedicated Region, Cloud@Customer, Alloy;
      (5) 1:1 Core Factor BYOL licensing (50% savings vs. AWS/Azure); (6) native
      Exadata and RAC for Oracle Database workloads.
    notes: |
      Key differentiation vs. AWS/Azure/GCP: purpose-built bare-metal GPU
      infrastructure, Acceleron custom networking fabric, native Oracle Database
      support, and price/performance advantage on Oracle workloads. Multicloud
      database revenue grew 531% YoY in Q3 FY2026.
    sources:
      - url: https://pretius.com/blog/oci-azure-aws
        kind: press
        description: "OCI vs Azure vs AWS strategic positioning analysis, 2026."
        retrieved_at: "2026-03-29"
      - url: https://www.oracle.com/apac/cloud/compute/gpu/
        kind: product_page
        description: "OCI GPU compute: bare metal, superclusters up to 131,072 GPUs."
        retrieved_at: "2026-03-29"

