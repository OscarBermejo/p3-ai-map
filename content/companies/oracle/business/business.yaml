deals_and_contracts:
  summary:
    value: |
      OpenAI — $300B, 5-year cloud computing contract; compute services beginning 2027. Includes Stargate JV (with SoftBank, MGX) in Abilene, TX; 1.2 GW facility using OCI Zettascale10 architecture. One of the largest cloud contracts in history.
      Meta — ~$20B multiyear cloud infrastructure deal (announced Sep 2025) for AI model training and inference. Final commitment may grow larger.
      xAI — Partnership to deliver Grok models via OCI Generative AI service (announced Jun 2025). Grok 3 and Grok 3 mini available on OCI. Infrastructure deal terms not separately disclosed.
      NVIDIA — Deep partnership: OCI deploys NVIDIA Blackwell at scale, co-developed Acceleron networking. Next-gen OCI Supercluster planned on NVIDIA Vera Rubin platform. OCI available on DGX Cloud.
      TikTok USDS — 15% equity stake (~$2B value) and board seat in TikTok US JV. Oracle hosts all U.S. user data and serves as trusted security partner.
      Stargate JV — $500B joint venture with SoftBank, OpenAI, and MGX announced Jan 2025 at White House. Initial $100B commitment; up to $500B over four years. ~20 data centers planned.
    notes: null
