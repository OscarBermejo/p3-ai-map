  online:
    value: null
    notes: |
      Cloud infrastructure (IaaS) revenue: $4.9B in Q3 FY2026 (three months
      ended Feb 28, 2026), up 84% YoY. Implies ~$19.6B annualized IaaS run rate.
      Total cloud revenue (IaaS + SaaS): $8.9B in Q3 FY2026, up 44% YoY.
      AI infrastructure revenue specifically grew 243% YoY.
