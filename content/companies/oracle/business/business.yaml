    value: null
    notes: |
      Oracle does not disclose a single aggregate "online MW" figure for its
      cloud data centers. During Q3 FY2026 the company deployed 400 MW of
      incremental data center capacity. OCI operates 50+ public cloud regions
      across 28 countries. The Stargate / Abilene TX facility has ~200 MW
      operational as of 2025 with the balance of 1.2 GW coming online through
      2026.
    sources:
      - url: https://www.oracle.com/ae/news/announcement/q3fy26-earnings-release-2026-03-10/
        kind: ir_html
