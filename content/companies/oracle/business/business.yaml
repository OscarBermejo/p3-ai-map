integration:
  model:
    value: lease_equip_own
    notes: |
      Oracle does NOT own the data center buildings; it leases facility space and
      owns the equipment (servers, GPUs, networking) deployed within them. As of
      Nov 30, 2025, Oracle had $248B in lease commitments for data centers
      running 15-19 years (up 148% from Aug 2025). Of this, $10B was for cloud
      capacity arrangements. The company's significant PP&E ($83.6B as of
      Feb 2026) reflects owned compute/networking equipment, not buildings.
      For some contracts, customers bring their own hardware (GPUs) and Oracle
      operates the infrastructure around it.
    sources:
      - url: https://www.cnbc.com/2025/12/11/oracle-lease-commitments-increase-almost-150percent-to-accommodate-ai-demand.html
        kind: press
        description: "CNBC: Oracle lease commitments $248B, up 148%; Oracle owns equipment, leases facilities."
        retrieved_at: "2026-03-29"
      - url: https://www.nextplatform.com/2026/02/02/oracles-financing-primes-the-openai-pump/
        kind: press
        description: "Next Platform: Oracle does not own data centers, owns equipment within them."
        retrieved_at: "2026-03-29"
  summary:
    value: |
      Hybrid infrastructure model: Oracle leases data center facility space under
      long-term commitments ($248B in lease obligations) and owns/operates the
      compute, networking, and storage equipment within those facilities. For
      large AI deals, a bring-your-own-hardware model is common — customers
      purchase GPUs and Oracle provides the facility, networking, and management
      layer. Capital expansion funded primarily through debt ($134.6B total debt
      as of Feb 2026) and customer prepayments, distinguishing Oracle from cash-
      rich hyperscalers (AWS, Azure, GCP) that self-fund from operations.
    notes: null
    sources:
      - url: https://www.cnbc.com/2026/03/09/oracle-is-building-yesterdays-data-centers-with-tomorrows-debt.html
        kind: press
        description: "CNBC analysis: Oracle's debt-funded infrastructure model vs. cash-rich hyperscalers."
        retrieved_at: "2026-03-29"

