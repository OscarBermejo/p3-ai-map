  disclosure_quality:
    summary: "Oracle discloses less operational granularity than both hyperscaler peers and CoreWeave on key dimensions. The RPO headline ($553B) is impressive but the per-customer, per-contract, and per-timeline breakdown is largely absent from filings."
    comparison:
      - dimension: "Financial granularity"
        oracle: "Reports total cloud revenue (IaaS + SaaS combined) and separately breaks out cloud infrastructure revenue. Does NOT disclose AI infrastructure revenue as a separate line item in the 10-Q (only mentions it in press releases/calls as a growth rate). Segment margins not disclosed by cloud sub-category. Multi-cloud database revenue growth cited as a rate (531%) but no absolute dollar figure."
        aws: "Reports AWS segment revenue and operating income separately. Cloud revenue is the segment, so granularity is high. Does not break out AI-specific revenue. Operating margins disclosed at segment level (~30%+)."
        coreweave: "Single revenue line (GPU cloud). RPO disclosed with time-period breakdown ($66.8B total, $4.3B within 12 months). Customer concentration disclosed (Microsoft ~62%). Adjusted EBITDA reconciliation detailed."
        assessment: "Oracle's disclosure is adequate at the aggregate level but lacks the sub-segment and contract-level granularity needed to independently model AI infrastructure economics. The 16% margin from leaked internal documents vs 32% from Q3 reporting illustrates how the lack of disclosure creates information asymmetry."
      - dimension: "Operational transparency"
        oracle: "No aggregate GPU count disclosed. No site-level MW breakdown. Headline capacity figures (10 GW secured, 400 MW deployed in Q3) without detailed site/timeline mapping. BYOC contract terms not individually disclosed."
        aws: "Discloses region count and expansion plans. No GPU count. Data center capacity not disclosed in MW terms. Less operationally transparent than Oracle on capacity metrics."
        coreweave: "250K+ GPUs, 33 data centers, 850 MW operational, 3.1 GW contracted. More operationally transparent than Oracle on deployed infrastructure."
        assessment: "Oracle provides headline capacity metrics but no site-level breakdown. CoreWeave is more transparent on operational scale. AWS discloses less on capacity but doesn't need to — the scale is assumed."
      - dimension: "Guidance specificity"
        oracle: "FY2027 revenue target $90B (specific). Q4 revenue growth 19-20% (specific). Capex $50B (specific). AI infrastructure margin >30% (specific and tested at 32%). However, RPO-to-revenue conversion timeline is not disclosed."
        aws: "No specific forward revenue guidance (Amazon doesn't guide by segment). Capex disclosed at Amazon level, not AWS level."
        coreweave: "Revenue backlog with time-period breakdown. Specific revenue guidance from IPO materials."
        assessment: "Oracle provides more specific forward guidance than AWS (which provides none at segment level). But the critical missing piece — RPO conversion timeline — is the one metric investors need most."
      - dimension: "Management deflections"
        oracle: "On the Q3 FY2026 call, management led with delivery metrics (400 MW, 90% on schedule) and shifted tone from aspirational to execution-focused. Larry Ellison dismissed SaaS disruption concerns ('applies to others, not us'). Morgan Stanley's concern about GPUaaS accretiveness was not directly rebutted with specific margin data. The 16% internal margin (DCD report) was not addressed on the call. No detailed breakdown of RPO by customer was provided."
        aws: "Amazon management routinely deflects questions about AWS-specific margin decomposition, citing 'competitive reasons.'"
        coreweave: "IPO roadshow and subsequent calls address analyst questions directly. Customer concentration acknowledged."
        assessment: "Oracle management is more forthcoming than in previous years but still avoids the hardest questions: RPO conversion timeline by customer, AI infrastructure margin decomposition, and the gap between internal margin data and reported margins."
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1341439/000119312526100148/orcl-ex99_1.htm
        kind: sec_8k
        description: "Oracle Q3 FY2026 8-K Exhibit 99.1 — financial statements and disclosure baseline."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/Archives/edgar/data/1769628/000176962826000094/coreweave4q25earningspress.htm
        kind: sec_8k
        description: "CoreWeave Q4 2025 earnings — disclosure comparison baseline."
        retrieved_at: "2026-03-29"

  switching_costs:
    summary: "Switching costs vary dramatically by workload type. Oracle Database workloads have extremely high switching costs (data gravity, licensing). AI GPU infrastructure has moderate switching costs during contract term but low costs after — especially under BYOC where the customer owns the hardware."
    lock_in_factors:
      - "Multi-year contracts with prepayment structures (OpenAI $300B/5yr, Meta ~$20B)"
      - "Oracle Database data gravity — migrating away from Oracle DB is a multi-year, multi-million dollar project"
      - "BYOL licensing advantage (1:1 vs 2:1 core factor) creates cost lock-in for Oracle DB customers on OCI"
      - "Acceleron networking fabric integration with OCI superclusters"
      - "Multi-cloud interconnects (OCI-Azure, OCI-AWS) create architectural dependencies"
    switching_enablers:
