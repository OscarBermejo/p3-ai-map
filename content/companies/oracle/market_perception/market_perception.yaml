# ── Information asymmetries ─────────────────────────────────────────────────────
information_asymmetries:
  - id: ai_margin_gap
    title: "Internal AI infrastructure margins (16%) vs reported Q3 margins (32%) — market has no way to reconcile"
    market_believes: "Oracle's AI infrastructure business achieves 30-32% gross margins, as reported in Q3 FY2026 and guided by management."
    evidence_suggests: "Internal documents reviewed by The Information (reported by DCD) show Oracle's average gross profit margin on AI cloud deals was 16%, with margins varying between 10-20%. In one three-month period (ending Aug 2025), Oracle generated $900M in AI server rental revenue with $125M gross profit (14%). The company posted losses on Blackwell chip rentals specifically. The gap between 16% (internal) and 32% (Q3 reported) could reflect: (a) genuine improvement as utilization ramps, (b) different contract mixes, or (c) different margin definitions. Without segment-level disclosure, investors cannot determine which."
    gap_reason: "Oracle does not disclose AI infrastructure as a separate P&L line item in filings. The 32% is from earnings call commentary; the 16% is from leaked internal documents. Neither has enough context to fully evaluate. This is the single most important number for Oracle's AI thesis and it is effectively undisclosed."
    closing_catalyst: "Filing-level segment disclosure of AI infrastructure revenue and cost of revenue. Or sustained quarterly reporting of AI margins that establishes a consistent trend above 30%."
    confidence: high
    sources:
      - url: https://www.datacenterdynamics.com/en/news/internal-documents-show-oracles-average-profit-margin-for-ai-cloud-deals-was-16-report/
        kind: specialist_analysis
        description: "Specialist analysis: DCD — internal Oracle AI cloud margin documents (16% average)."
        retrieved_at: "2026-03-29"
      - url: https://www.computerweekly.com/news/366636165/Oracle-expects-to-increase-OCI-margins-by-30-40
        kind: curated_platform
        description: "Curated platform: Computer Weekly — Oracle expects to increase OCI margins to 30-40%."
        retrieved_at: "2026-03-29"

  - id: off_balance_sheet_leverage
    title: "Total fixed obligations ($134.6B debt + $248B leases = $383B) dwarf equity ($39B) — true leverage is 10:1"
    market_believes: "Oracle's debt load is $134.6B, which is high but manageable given $23.5B trailing OCF and the investment-grade rating."
    evidence_suggests: "The $248B in off-balance-sheet data center lease obligations (disclosed in the Nov 2025 10-Q) represent a second, larger layer of fixed commitments. These leases run 15-19 years with estimated ~$14.6B annual payments — approximately 63% of trailing OCF. Total fixed obligations of ~$383B against $39B stockholders' equity = 9.8:1 leverage ratio. Bloomberg Opinion called this the AI bubble's 'next bombshell.' The lease commitments are long-duration (15-19 years) while AI customer contracts are typically 3-5 years, creating a structural duration mismatch."
    gap_reason: "Lease obligations are disclosed in the 10-Q footnotes but are not on the balance sheet until they commence. Market conversations and analyst reports focus on the $134.6B of on-balance-sheet debt. The $248B lease figure received press attention (CNBC, Bloomberg) but has not been fully incorporated into valuation frameworks."
    closing_catalyst: "Leases commence and appear on the balance sheet (2026-2028). At that point, the true obligation burden becomes visible in reported leverage ratios. A credit rating agency specifically citing lease obligations as a factor would also close the gap."
    confidence: high
    sources:
      - url: https://www.cnbc.com/2025/12/11/oracle-lease-commitments-increase-almost-150percent-to-accommodate-ai-demand.html
        kind: curated_platform
        description: "Curated platform: CNBC — Oracle lease commitments $248B, up 148%."
        retrieved_at: "2026-03-29"
      - url: https://www.bloomberg.com/opinion/articles/2025-12-16/ai-bubble-oracle-delivers-next-bombshell-with-248-billion-rent
        kind: curated_platform
        description: "Curated platform: Bloomberg Opinion — '$248B rent' as structural risk."
        retrieved_at: "2026-03-29"

  - id: openai_concentration
    title: "54% of $553B RPO is tied to OpenAI — a single private company with unproven ability to fund $300B"
    market_believes: "Oracle has $553B in contracted revenue (RPO) providing multi-year visibility. The backlog is diversified across major AI customers."
    evidence_suggests: "The $300B OpenAI contract represents 54% of total RPO. OpenAI's annualized revenue is estimated at $12-16B. Even at aggressive 50% annual growth, OpenAI would need to spend multiples of its entire revenue on Oracle compute to fulfill the contract. The Stargate JV (SoftBank, OpenAI, MGX) provides a funding mechanism, but SoftBank's commitment is contingent and MGX's contribution is not well-defined. If OpenAI's trajectory changes — slower revenue growth, strategic pivot, or loss of competitive position — the $300B contract is at risk. Oracle's stock fell 55%+ after the OpenAI deal was announced, suggesting the market initially priced this as a risk rather than an asset."
    gap_reason: "RPO is reported as a single aggregate number ($553B) without customer-level breakdown in filings. The OpenAI concentration is known from press reports but not formally disclosed in SEC filings with the specificity needed for modeling. Investors cannot independently assess the probability-weighted value of the backlog."
    closing_catalyst: "OpenAI IPO or public financial disclosure that reveals cash generation capacity. Or: Oracle providing RPO breakdown by time period and customer tier (not asking for customer names, just concentration metrics)."
    confidence: high
    sources:
      - url: https://finance.yahoo.com/news/oracle-corporation-orcl-slid-due-132245510.html
        kind: curated_platform
        description: "Curated platform: Yahoo Finance — 'Oracle Slid Due to Concerns Around the OpenAI Concentration.'"
        retrieved_at: "2026-03-29"
      - url: https://www.fool.com/investing/2026/03/18/oracles-backlog-potential-windfall-or-ticking-time/
        kind: curated_platform
        description: "Curated platform: Motley Fool — OpenAI concentration risk analysis."
        retrieved_at: "2026-03-29"

  - id: byoc_model_misunderstanding
    title: "Market conflates BYOC capital efficiency with traditional cloud economics — these are structurally different businesses"
    market_believes: "Oracle's cloud infrastructure business is comparable to AWS/Azure — high-growth cloud with improving margins as it scales."
    evidence_suggests: "Under the BYOC model, Oracle does not own the GPUs — customers buy them and Oracle operates the facility. This means: (a) Oracle's revenue per GPU is structurally lower (fee for operations, not full compute rental), (b) switching costs are lower (customer can move their hardware), (c) the margin ceiling is lower (landlord margins, not platform margins). $29B of BYOC contracts at ~16% margins generates ~$4.6B in gross profit. The same $29B at AWS-like 30%+ operating margins would generate $8.7B+. The BYOC model solves Oracle's financing problem but creates a fundamentally different economic profile than what 'cloud infrastructure company' implies."
    gap_reason: "Oracle reports BYOC and traditional cloud infrastructure as a single blended revenue line. The market applies cloud infrastructure multiples to the total, but a significant and growing portion is landlord-economics revenue that deserves different valuation treatment."
    closing_catalyst: "Oracle disclosing BYOC vs traditional cloud infrastructure revenue split, or a period where blended margins stabilize at a level that reveals the true mix."
    confidence: medium
    sources:
      - url: https://www.implicator.ai/oracles-best-quarter-in-15-years-it-came-with-an-identity-crisis/
        kind: curated_platform
        description: "Curated platform: Implicator — Oracle's 'identity crisis' between hyperscaler and cloud landlord."
        retrieved_at: "2026-03-29"

  - id: securities_fraud_litigation
    title: "Active securities fraud class action may surface internal documents about capex representations and AI revenue timing"
    market_believes: "The class action is ambulance-chasing litigation that follows any significant stock decline and is immaterial."
