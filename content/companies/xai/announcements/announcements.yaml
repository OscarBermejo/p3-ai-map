  - date: "2024-09-01"
    category: infrastructure
    title: "Colossus Phase 1 online — 100,000 H100 GPU supercluster built in 122 days"
    summary: >
      xAI brought Colossus Phase 1 online in Memphis, Tennessee — a 100,000 H100 GPU
      supercluster built in a converted Electrolux factory in 122 days, described as the
      world's most powerful AI training system at the time. Power draw: ~250 megawatts,
      supported by 35 gas turbines (420 MW capacity) and 208 Tesla Megapacks for battery
      backup. Networking: NVIDIA Spectrum-X Ethernet at 95% throughput efficiency vs 60%
      on traditional Ethernet. Musk announced plans to double to 200K GPUs within 90 days
      by adding 50K H100 and 50K H200 GPUs. The 122-day build time was cited as the fastest
      construction of a supercomputer of this scale ever achieved.
    significance: high
    sources:
      - url: https://www.tomshardware.com/tech-industry/artificial-intelligence/xai-colossus-supercomputer-with-100k-h100-gpus-comes-online-musk-lays-out-plans-to-double-gpu-count-to-200k-with-50k-h100-and-50k-h200
        kind: news_article
        description: "Tier 2 (Tom's Hardware): Colossus 100K H100 online, expansion plans to 200K."
        retrieved_at: "2026-03-30"
      - url: https://introl.com/blog/xai-memphis-colossus-100000-gpu-supercomputer-infrastructure
        kind: ir_html
        description: "Tier 2: Detailed Colossus Phase 1 infrastructure breakdown."
        retrieved_at: "2026-03-30"

  - date: "2024-03-17"
    category: product_launch
    title: "Grok 1 open-sourced under Apache 2.0 — 314B MoE model"
    summary: >
      xAI open-sourced the weights of Grok 1 under an Apache 2.0 license — a 314B parameter
      mixture-of-experts model with 25% active parameters per forward pass, 8K context window.
      The release made xAI the first frontier AI lab to release a large MoE model as open weights.
      The decision was notable as it came one week after Elon Musk had filed a lawsuit against
      OpenAI alleging breach of its founding mission to develop open AI for humanity's benefit —
      positioning the Grok 1 release as a contrast to OpenAI's proprietary strategy. The model
      was not state-of-the-art at release (trailing GPT-4 and Claude 3) but established xAI's
      open-weights credential. All subsequent Grok releases (Grok 2, 3, 4) have been fully
      proprietary with no open-weights release.
    significance: medium
    sources:
      - url: https://x.ai/blog/grok-os
        kind: vendor_page
        description: "Tier 1 (xAI official): Grok 1 open-source announcement. Apache 2.0, 314B MoE."
        retrieved_at: "2026-03-30"
