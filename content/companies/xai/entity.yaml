notes:
  - xAI is a PRIVATE company (SpaceX subsidiary). No 10-K/10-Q. Use financials_private.md sourcing rules.
  - Elon Musk's multi-company structure creates significant related-party complexity: xAI trains on X data, runs on SpaceX's future satellite infrastructure, and uses Tesla's Dojo as a supplemental compute resource.
  - The Colossus supercluster in Memphis is a key asset — 555K+ GPUs as of Jan 2026, ~2GW power capacity, world's largest single-site AI training facility.
  - xAI acquired X (Twitter) in March 2025 at a $33B X valuation/$80B xAI valuation (all-stock). Revenue figures post-March 2025 include X advertising and subscription revenue.
  - SpaceX acquired xAI in February 2026 for $250B (xAI valuation in the deal). Combined SpaceX+xAI deal size was $1.25T — largest M&A transaction in history.
  - Grok 4 Heavy was the first AI model to exceed 50% on Humanity's Last Exam (HLE), a graduate-level multi-domain reasoning benchmark.
  - Revenue model: xAI API (pay-per-token) + SuperGrok consumer subscriptions ($30/month; $300/month Heavy tier) + X advertising + X Premium subscriptions (~$1B ARR as of Feb 2026).
  - Burn rate approximately $1B/month; targeting profitability by 2027 per management.
  - Multiple xAI co-founders departed following SpaceX acquisition (Jimmy Ba, Tony Wu); Guodong Zhang and Toby Pohlen took expanded roles.
