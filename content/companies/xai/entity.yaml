slug: xai
legal_name: xAI Corp

tickers: []  # Private company — no public equity ticker; wholly-owned subsidiary of SpaceX Inc. as of February 2026

summary: |
  xAI is Elon Musk's frontier AI research and deployment company, founded in March 2023 and
  headquartered in Palo Alto, CA. In the AI value chain, xAI sits at the models layer: it
  trains frontier large language models (the Grok family) and deploys them via API (xAI API),
  consumer products (Grok on X, SuperGrok subscriptions), and enterprise API. xAI is notable
  for three structural differences from other models-layer competitors: (1) it owns and operates
  the world's largest privately held AI training supercluster — Colossus — with 555,000+ GPUs
  in Memphis, Tennessee as of January 2026; (2) it acquired X (formerly Twitter) in March 2025
  in an all-stock deal, giving Grok exclusive access to real-time social graph and X post data
  as a training and context signal; and (3) in February 2026, xAI was itself acquired by SpaceX
  in a landmark $1.25 trillion deal — the largest M&A transaction in history — making xAI a
  wholly-owned subsidiary of SpaceX.

  As of March 2026, xAI's Grok 4.20 is among the leading frontier models (Artificial Analysis
  Intelligence Index: 48/63). Grok 4 Heavy was the first model to exceed 50% on Humanity's Last
  Exam (HLE). Revenue is complex to interpret: standalone xAI API/subscription ARR was ~$100M
  at end-2024; combined with X's advertising and subscription revenue, the combined entity
  exited 2025 at ~$3.8B ARR. The company burns approximately $1B per month and targets
  profitability by 2027. Quantitative financials are not publicly disclosed; estimates from
  press reports are in financials/*.yaml.

corporate_structure:
  type: private
  parent: "SpaceX Inc. (wholly-owned subsidiary as of February 2026)"
  prior_structure: "Independent private company from founding (March 2023) through February 2026"
  merger_note: >
    xAI was acquired by SpaceX in February 2026 in a triangular merger structure. SpaceX
    valued at $1T, xAI at $250B — total combined deal value $1.25T (largest M&A transaction
    in history). xAI operates as a wholly-owned subsidiary, keeping its debts, liabilities,
    and contracts legally separate from SpaceX's balance sheet. xAI shareholders received
    0.1433 SpaceX shares per xAI share (tax-free reorganization). Prior to this, xAI had
    acquired X (formerly Twitter) in March 2025 at $33B X / $80B xAI valuations in an
    all-stock deal, folding X's ~600M monthly active users and social data assets into xAI.
  founding_date: "2023-03-09"
  hq: "Palo Alto, CA (offices); Memphis, TN (Colossus supercomputer facility)"

