api_platform:
  platform_name:
    value: "xAI API"
    notes: null
    sources:
      - url: https://x.ai/api
        kind: vendor_page
        description: "Tier 1 (xAI official): xAI API platform page."
        retrieved_at: "2026-03-30"
  deployment_options:
    value: ["xAI API (direct)", "Azure AI (Grok 3 via Microsoft, announced 2025)"]
    notes: "xAI API is the primary deployment channel. Unlike OpenAI/Anthropic, xAI is NOT natively available on AWS Bedrock or Google Vertex AI as of March 2026. An Azure partnership for Grok 3 was announced in 2025. Server-side tool pricing charged separately ($5/1K calls for web/X search; $5 for code execution)."
    sources:
      - url: https://docs.x.ai/docs/models
        kind: vendor_page
        description: "Tier 1 (xAI): API deployment options and server-side tool pricing."
        retrieved_at: "2026-03-30"
  enterprise_features:
    value: ["structured outputs", "tool use/function calling", "image generation", "video generation", "code execution (server-side)", "X/web search (server-side)"]
    notes: "Enterprise features are growing but behind OpenAI and Anthropic in SOC2, HIPAA BAA, SSO/SAML, and enterprise contract infrastructure."
    sources: []
  sla_uptime:
    value: null
    notes: "Not publicly disclosed as of March 2026."
    sources: []

compute_dependency:
  primary_training_infrastructure:
    value: "Owned — xAI's Colossus supercluster, Memphis TN"
    notes: >
      xAI is unique among frontier AI labs in that it OWNS its primary training compute rather
      than relying on a hyperscaler partner. Colossus (Memphis) reached 555,000+ GPUs across
      three facilities (Colossus 1, Colossus 2, and 'MACROHARDRR') with ~2GW total power
      capacity by January 2026. GPU mix: 150K H100 + 50K H200 + 30K GB200 (Colossus 1+2 as
      of Dec 2025). Trained Grok 4 on 200K H100 GPUs. Funded through Series B, C, and E
      capital plus debt financing ($12.5B Apollo/Diameter Capital facility Jan 2026).
      xAI plans to expand to 1 million GPUs.
    sources:
      - url: https://introl.com/blog/xai-colossus-2-gigawatt-expansion-555k-gpus-january-2026
        kind: ir_html
        description: "Tier 2: Colossus expansion to 555K+ GPUs, ~2GW, January 2026."
        retrieved_at: "2026-03-30"
  primary_inference_infrastructure:
    value: "Mixed — owned Colossus + Azure (Grok 3 partnership)"
    notes: "xAI serves inference primarily from its own Memphis infrastructure. Azure partnership provides additional distribution channel for enterprise customers."
    sources: []
  infrastructure_independence:
    value: high
    notes: >
      xAI has the highest compute independence of any frontier AI lab — it owns and operates
      its own supercluster rather than renting from AWS, Azure, or GCP. This is a double-edged
      structural position: (1) it eliminates cloud partnership leverage risk (e.g., if Amazon
      were to withdraw from Anthropic, Anthropic would face existential compute disruption —
      no such risk at xAI); (2) it requires enormous sustained capital investment (~$12.5B
      debt facility just for 2026 expansion); (3) the owned-compute model means depreciation
      and financing costs are on xAI's balance sheet rather than treated as variable opex.
      Post-SpaceX acquisition, satellite-based solar-powered data centers in LEO are the
      long-term compute vision.
    sources: []

research_profile:
  orientation:
    value: frontier_lab
    notes: "xAI's primary mission is 'to accelerate human scientific discovery.' Research orientation is frontier capability — achieving maximum intelligence per model generation. No explicit safety-first mandate analogous to Anthropic or OpenAI's stated missions."
    sources:
      - url: https://x.ai/company
        kind: vendor_page
        description: "Tier 1 (xAI company page): Mission statement."
        retrieved_at: "2026-03-30"
  openness:
    value: proprietary
    notes: "xAI's commercial models (Grok 2, 3, 4) are fully proprietary. Grok 1 was open-sourced in March 2024 (Apache 2.0). No subsequent open-weights releases as of March 2026 — the company has moved entirely to a proprietary commercial model."
    sources: []
  safety_approach:
    value: "RLHF + usage policies. Minimal public safety methodology disclosure. No equivalent to Anthropic's Constitutional AI, OpenAI's o-series safety framework, or Google's Responsibility framework. xAI's Grok is notably more permissive on certain content types vs. competitors."
    notes: "xAI does not publish a safety/alignment methodology document equivalent to Anthropic's or OpenAI's. Grok models have historically had fewer content restrictions than Claude or GPT, which is a product positioning choice as much as a safety architecture choice."
    sources: []

commercial_traction:
  business_model:
    value: [api_pay_per_token, subscription_chatbot, enterprise_contracts]
    notes: >
      Three primary revenue streams: (1) xAI API (pay-per-token) for developers; (2) SuperGrok
      consumer subscriptions ($30/month standard, $300/month Heavy tier — the latter for Grok 4
      Heavy access); (3) X Premium subscriptions ($3–$40/month — these fund access to Grok on X).
      Post-X merger, ad revenue from X's advertising platform is also part of the combined revenue.
      The SuperGrok Heavy tier ($300/month) is a novel high-ASP consumer tier with no direct
      equivalent at OpenAI or Anthropic for single-user access to frontier-class reasoning compute.
    sources: []
  notable_deployments:
    value:
      - "X (formerly Twitter) — Grok natively integrated for all ~600M monthly active users"
      - "SuperGrok Heavy — exclusive access to Grok 4 Heavy (10x compute per query) for $300/month"
      - "Aurora (xAI's self-driving AI for Tesla vehicles) — reportedly uses xAI training infrastructure"
    notes: "X integration is the largest single distribution advantage in the industry — no other AI model company has direct embedded access to a 600M MAU social platform at the product level."
    sources:
      - url: https://techcrunch.com/2026/01/06/xai-says-it-raised-20b-in-series-e-funding/
        kind: news_article
        description: "Tier 2 (TechCrunch): ~600M monthly active users across X and Grok as of early 2026."
        retrieved_at: "2026-03-30"
  api_ecosystem:
    value: early
    notes: >
      xAI's API ecosystem is early relative to OpenAI and Anthropic. The developer ecosystem
      (third-party integrations, frameworks, SDK breadth) is significantly thinner. Not yet
      available on AWS Bedrock or Google Vertex AI — the primary enterprise distribution channels
      that Anthropic and OpenAI benefit from. Azure partnership partially addresses this for
      Microsoft enterprise customers. Growing, but significant gap vs. OpenAI.
    sources: []

roadmap:
  next_generation:
    value: "Grok 5 — expected H2 2026 or 2027; no confirmed release timeline"
    notes: >
      Musk has signaled continued rapid model improvements. xAI's compute expansion to 1M GPUs
      in Memphis positions for a much larger training run than Grok 4. The SpaceX acquisition
      introduces a long-term roadmap element: satellite solar-powered data centers in LEO as
      next-generation AI compute infrastructure. No confirmed Grok 5 specifications or timeline.
    sources: []
  release_cadence:
    value: "~6-12 months for major versions; minor iterations within quarters (Grok 3 Feb 2025 → Grok 4 Jul 2025 → Grok 4.1 Nov 2025 → Grok 4.20 early 2026)"
    notes: null
    sources: []
  roadmap_credibility:
    value: strong
    notes: >
      xAI has demonstrated exceptional execution speed on infrastructure build-out (Colossus
      Phase 1 in 122 days, doubled in 92 days). Model releases have been consistent with Musk's
      stated timelines. The shift from Grok 3 (below-frontier) to Grok 4 (frontier-tier, first
      >50% HLE) in 5 months demonstrated dramatic capability improvement. However, organizational
      volatility (co-founder departures post-SpaceX acquisition) introduces some execution risk.
    sources: []

