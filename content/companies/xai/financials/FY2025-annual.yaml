  notes: >
    FY2025 was xAI's transformative year: Grok 3 (February), X acquisition (March), Grok 4
    (July), Grok 4.1 Fast (November). Revenue is further complicated by the X merger —
    the combined entity's financials blend two fundamentally different businesses (AI API/
    subscriptions vs. social media advertising). No audited or reliable P&L data is available.
    The most important anchors are: end-2025 combined ARR ~$3.8B, standalone xAI API ARR
    ~$500M, and burn rate ~$1B/month. Quality rating 'low'.

extended_metrics:
  total_funding_raised_usd:
    value: null  # Complex: $12.135B through 2024 + undisclosed debt rounds Jul/Oct 2025 + $20B equity + $12.5B debt (Jan 2026)
    notes: >
      Total equity funding as of December 31, 2025 (before Series E in Jan 2026):
      $12.135B (through Series C). Two debt rounds in July and October 2025 also occurred;
      amounts not publicly disclosed. The full $20B Series E closed January 6, 2026 (just
      after year-end). Total cumulative funding as of ~January 2026 was ~$45B-50B including
      debt ($12.5B from Apollo/Diameter Capital).
    sources:
      - url: https://techcrunch.com/2026/01/06/xai-says-it-raised-20b-in-series-e-funding/
        kind: news_article
        description: "Tier 2 (TechCrunch): Series E $20B closed January 6, 2026 at $230B valuation."
        retrieved_at: "2026-03-30"

  last_round_amount_usd:
    value: 20000000000  # $20B Series E, January 2026 (equity component)
    notes: "Series E closed January 6, 2026. $20B equity (upsized from original $15B target) plus $12.5B debt from Apollo Global Management and Diameter Capital."
    sources:
      - url: https://www.reuters.com/business/musks-xai-raises-20-billion-upsized-series-e-funding-round-2026-01-06/
        kind: news_article
        description: "Tier 1 (Reuters): Series E $20B closed January 6, 2026. Upsized from $15B target. Investors: Valor Equity Partners, Stepstone, Fidelity, Qatar Investment Authority, MGX, Baron Capital, NVIDIA (strategic), Cisco Investments (strategic)."
        retrieved_at: "2026-03-30"

  last_round_valuation_usd:
    value: 230000000000  # $230B post-money valuation at Series E
    notes: >
      $230B post-money valuation at January 2026 Series E (Reuters, Business Insider, TechCrunch —
      Tier 2 consensus). Two weeks later, SpaceX acquired xAI at a $250B implied xAI valuation
      ($1.25T combined deal). The step-up from $230B to $250B in two weeks reflects the merger
      premium and combined synergies.
    sources:
      - url: https://www.reuters.com/business/musks-spacex-merge-with-xai-combined-valuation-125-trillion-bloomberg-news-2026-02-02/
        kind: news_article
        description: "Tier 2 (Reuters): SpaceX acquires xAI at $250B xAI valuation. Combined deal $1.25T. Largest M&A transaction in history."
        retrieved_at: "2026-03-30"

  last_round_date: "2026-01-06"
  last_round_type: series_e

  arr_usd:
    value: null  # ~$3.8B combined ARR (xAI API + X subscriptions + X ads) at end-2025 — Tier 2 estimate; field null
    notes: >
      Sacra research (Tier 2) estimates combined ARR of ~$3.8B at end-2025 after the X merger.
      This includes: X advertising revenue (~$2B+ annualized estimate), X Premium subscriptions
      (~$1B ARR confirmed as of Feb 2026 by Nikita Bier per The Information), and xAI standalone
      API/SuperGrok (~$500M ARR). The rapid jump from $100M standalone ARR (end-2024) to $3.8B
      combined (end-2025) is driven more by the X revenue consolidation than organic xAI growth.
      Standalone xAI API ARR of ~$500M represents the "pure AI model company" revenue trajectory
      and the figure most comparable to Anthropic or OpenAI's API revenue.
    sources:
      - url: https://sacra.com/c/xai/
        kind: ir_html
        description: "Tier 2 (Sacra): xAI ~$3.8B combined ARR end-2025; ~$500M standalone."
        retrieved_at: "2026-03-30"

  monthly_burn_rate_usd:
    value: null  # ~$1B/month — Tier 2 estimate; field null
    notes: >
      The Information (Tier 2) reports xAI burning approximately $1B/month. At $1B/month,
      FY2025 gross burn was ~$12B. Net burn after revenue is lower but still very large —
      even at $3.8B ARR combined exit run rate ($317M/month), the net burn would be
      approximately $683M/month. This is the highest monthly burn rate of any private AI lab.
    sources:
      - url: https://www.theinformation.com/briefings/musks-xai-burning-1-billion-month
        kind: ir_html
        description: "Tier 2 (The Information): xAI burning ~$1B/month, targeting profitability 2027."
        retrieved_at: "2026-03-30"

  cash_runway_months:
    value: null
    notes: >
      Not precisely calculable. Following the January 2026 Series E ($20B equity) and $12.5B
      debt facility, xAI has substantial liquidity. At $1B/month gross burn minus ~$317M/month
      in combined revenue, net burn is ~$683M/month. $32.5B in combined equity+debt financing
      since inception (including Series E) would theoretically provide 47 months of runway at
      net burn rates — but the company is simultaneously deploying capital into GPU infrastructure,
      making runway less relevant than growth trajectory and financing access.
    sources: []

  headcount:
    value: null
    notes: >
      xAI headcount not officially disclosed. Estimates from LinkedIn and press suggest 1,500–3,000
      employees as of end-2025, growing rapidly post-X integration. Combined entity (xAI+X) is
      larger; X employed ~1,500 people post-Musk's layoffs in 2022–2023.
    sources: []

  revenue_per_employee_usd:
    value: null
    notes: "Not calculable with precision: both revenue and headcount uncertain."
    sources: []
