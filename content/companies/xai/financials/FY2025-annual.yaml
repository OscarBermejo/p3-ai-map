sources:
  - url: https://sacra.com/c/xai/
    kind: ir_html
    description: >
      Tier 2 (Sacra research): xAI exited 2025 at approximately $3.8B combined ARR (post-X merger).
      On a standalone basis (xAI API + SuperGrok, excluding X ad/subscription revenue), xAI exited
      2025 at ~$500M ARR. The gap between $500M standalone and $3.8B combined reflects X's advertising
      and subscription contributions post-merger. Sacra also notes 38x year-over-year ARR growth
      from ~$100M at end-2024 to ~$3.8B combined at end-2025.
    covers: []
    retrieved_at: "2026-03-30"

  - url: https://www.theinformation.com/briefings/musks-xai-burning-1-billion-month
    kind: ir_html
    description: >
      Tier 2 (The Information): xAI burn rate approximately $1B/month in 2025/early 2026.
      Management targeting profitability by 2027. At $1B/month, FY2025 gross burn was approximately
      $12B — implying substantial net cash consumption even after revenue.
    covers: []
    retrieved_at: "2026-03-30"

  - url: https://www.techmeme.com/260212/p18
    kind: news_article
    description: >
      Tier 2 (The Information via Techmeme): X subscriptions hit $1B ARR by February 2026.
      Reported by Nikita Bier at xAI all-hands. X subscription revenue includes X Premium
      tiers ($3–$40/month). Managed by ~30 people including 25 engineers.
    covers: []
    retrieved_at: "2026-03-30"

  - url: null
    kind: documentation
    description: >
      revenue: No full-year 2025 recognized revenue figure available from any public source.
      The best estimates come from ARR run-rate data:
      - End-2025 combined ARR: ~$3.8B (Sacra, Tier 2). Full-year recognized revenue is lower than
        exit ARR because revenue ramp was weighted to H2 2025 following Grok 4 launch (July 2025)
        and X integration deepening. Working estimate for full-year 2025 combined recognized revenue:
        $1.5B–$2.5B, with the wide range reflecting uncertainty about when X revenue contributions
        were consolidated. Standard field null per protocol.
    covers: [revenue]
    retrieved_at: "2026-03-30"

  - url: null
    kind: documentation
    description: >
      All P&L, cash flow, and balance sheet fields: not disclosed. Key context for structural
      analysis: (1) Burn rate of ~$1B/month implies ~$12B FY2025 gross cash burn. (2) Colossus
      expansion from 200K to 555K+ GPUs in 2025 was capex-intensive — the majority of debt rounds
      (July and October 2025) were directed at infrastructure financing. (3) The X acquisition
      (March 2025) added X's operating losses/costs to the combined entity; X's ad revenue
      partially offsets these but the full cost structure is unknown. (4) As of January 2026
      the $12.5B debt facility from Apollo/Diameter Capital was secured — likely to finance
      ongoing GPU procurement and infrastructure expansion toward 1M GPUs.
    covers: [cost_of_revenue, gross_profit, research_and_development, selling_general_administrative,
             depreciation_and_amortization, operating_income, interest_expense, interest_income,
             other_income_expense_net, income_tax_expense_benefit, net_income, operating_cash_flow,
             stock_based_compensation, capital_expenditures_cash, investing_cash_flow_net,
             financing_cash_flow_net, cash_and_equivalents, current_assets, current_liabilities,
             property_plant_equipment_net, total_assets, total_liabilities, long_term_debt,
             current_portion_of_long_term_debt, total_debt, stockholders_equity]
    retrieved_at: "2026-03-30"

