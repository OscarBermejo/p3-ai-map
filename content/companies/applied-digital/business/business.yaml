          kind: ir_html
          description: "Applied Digital press release: $2.15B notes offering completed March 2026."
          retrieved_at: "2026-03-29"
    - value: "2025-10 — Oracle 15-year lease for 200 MW at Polaris Forge 2; ~$5B prospective revenue."
      sources:
        - url: https://ir.applieddigital.com/news-events/press-releases
          kind: ir_html
          description: "Applied Digital press release: Oracle lease announcement Oct 2025."
          retrieved_at: "2026-03-29"
    - value: "Q2 FY2026 — 100 MW energized at Polaris Forge 1 for CoreWeave on schedule."
      sources:
        - url: https://ir.applieddigital.com/news-events/press-releases
          kind: ir_html
          description: "Q2 FY2026 earnings release: Polaris Forge 1 ready-for-service milestone."
          retrieved_at: "2026-03-29"
    - value: "2026-01 — Delta Forge 1 groundbreaking (430 MW campus, southern U.S.); initial operations mid-2027."
      sources:
        - url: https://ir.applieddigital.com/news-events/press-releases
          kind: ir_html
