# Applied Digital Corporation — infrastructure business profile (profile_version 4).

layer: infrastructure
profile_version: 4

as_of: "2025-11-30"

capacity:
  online:
    value: 100
    notes: |
      ~100 MW energized at Polaris Forge 1 (ELN-02 building, Ellendale, ND) for CoreWeave as of Q2 FY2026. Additionally, legacy Data Center Hosting facilities provide energized capacity for crypto mining customers (Garden City, TX and Jamestown, ND).
    sources:
      - url: https://ir.applieddigital.com/news-events/press-releases
        kind: ir_html
        description: "Primary source: Applied Digital Q2 FY2026 earnings release — 100 MW energized on schedule at Polaris Forge 1."
        retrieved_at: "2026-03-29"
  contracted:
    value: 500
    notes: |
      Polaris Forge 1: total 400 MW under ~15-year lease with CoreWeave (~$11B prospective lease revenue over term). ELN-02 (100 MW) operational; ELN-03 and remaining buildings under construction.
      Polaris Forge 2: 200 MW under 15-year lease with Oracle (~$5B prospective revenue over term). Groundbreaking Aug 2025; initial capacity expected 2026.
    sources:
      - url: https://ir.applieddigital.com/news-events/press-releases
        kind: ir_html
        description: "Primary source: Applied Digital press releases — CoreWeave 400 MW lease at Polaris Forge 1; Oracle 200 MW lease at Polaris Forge 2."
        retrieved_at: "2026-03-29"
  secured:
    value: ">3500"
    notes: |
      Active pipeline of ~3.5 GW of utility power across multiple sites. Extended pipeline exceeds 5 GW per management commentary. Includes Delta Forge 1 (430 MW campus, southern U.S., groundbreaking Jan 2026).
    sources:
      - url: https://ir.applieddigital.com/news-events/press-releases
        kind: ir_html
        description: "Primary source: Applied Digital investor presentations and press releases — 3.5 GW active pipeline, 5+ GW extended pipeline."
        retrieved_at: "2026-03-29"

