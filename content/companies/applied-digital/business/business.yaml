deals_and_contracts:
  summary:
    value: |
      CoreWeave — 15-year lease at Polaris Forge 1, Ellendale, ND; 400 MW total; ~$11B prospective lease revenue over term. 100 MW energized Q2 FY26; remaining under construction.
      Oracle — 15-year lease at Polaris Forge 2, Ellendale, ND; 200 MW; ~$5B prospective revenue over term. Groundbreaking Aug 2025; initial capacity expected 2026. Funded by $2.15B senior notes (Mar 2026).
      Macquarie — up to $5.0B preferred equity facility for data center development. $900M drawn as of Nov 30, 2025; additional $337.5M post-quarter.
      $2.35B Senior Secured Notes (9.25%, due 2030) — issued Q2 FY26 for Polaris Forge 1 construction and SMBC loan repayment.
      $2.15B Senior Secured Notes (6.75%, due 2031) — issued Mar 2026 for Polaris Forge 2 Oracle build.
    notes: null
    sources:
      - url: https://ir.applieddigital.com/news-events/press-releases
        kind: ir_html
        description: "Primary source: Applied Digital press releases and SEC filings for deal terms."
        retrieved_at: "2026-03-29"
  highlights:
