central_questions:
  - "Applied Digital is making a bet that building and owning hyperscale AI data centers for the world's largest cloud companies — not renting them, not operating GPUs inside them, but owning the physical infrastructure underneath — creates a 15-year recurring revenue stream worth many times the construction cost. The $16B in contracted leases says the demand is real. The $5B in debt says the execution window is narrow. The question is whether the construction-to-lease transition happens fast enough to justify the capital structure."

sections:
  - id: the_landlord_model
    title: "What Applied Digital actually is — and why it looks different from every other AI infrastructure company"
    body: |
      Applied Digital is not a GPU cloud company. It is not a compute provider. It is a data center landlord — a company that builds, owns, and leases purpose-built AI-optimized facilities to hyperscalers under long-term triple-net style leases. The tenant (CoreWeave, Oracle) brings and owns the GPUs. Applied Digital provides the power, cooling, and physical shell.

      This distinction is fundamental to reading every financial metric that follows. APLD's model is structurally closer to a data center REIT (Digital Realty, QTS) than to GPU-cloud peers like CoreWeave, IREN, or Nebius. But it is pre-revenue-ramp REIT — a developer still building its first campuses, funded by high-yield debt, and not yet generating the recurring lease cash flow that justifies REIT-like multiples.

      **The three-segment structure (as of Q2 FY2026):**
      - **HPC Hosting** ($85.0M revenue): The core business. Build AI factory campuses and lease to hyperscalers. This is where the $16B in contracted revenue sits. But within this $85M, only ~$12M was recurring lease revenue — the remaining ~$73M was one-time tenant fit-out (construction management) revenue.
      - **Data Center Hosting** ($41.6M revenue): Legacy crypto mining facility leasing. Cash-flow positive but facing secular decline from Bitcoin halving effects and network difficulty.
      - **Cloud Services** (classified as discontinued operations): GPU-as-a-service being spun out into ChronoScale via merger with EKSO Bionics. APLD retains 80%+ ownership but the revenue and operations leave the consolidated P&L.

      After the ChronoScale spinout, Applied Digital becomes a pure-play AI data center developer-landlord. The market must then value it entirely on facility-lease economics — the quality of the tenants, the terms of the leases, the cost of the facilities, and the pace at which contracted capacity converts to cash flow.

  - id: structural_cost_analysis
    title: "The cost structure math: why the numbers look alarming but tell a construction story, not a broken-business story"
    body: |
      **All-in operating cost ratio (Q2 FY2026):**

      (cost of revenue + SGA + D&A) / revenue = (100,553 + 56,993 + 8,586) / 126,589 = 166,132 / 126,589 = **131.2%**

      Applied Digital spent $1.31 for every $1.00 of revenue. Superficially alarming. But decomposing the WHY matters:

      | Cost line | Q2 FY26 ($M) | % of Revenue | What drives it |
      |-----------|-------------|-------------|----------------|
      | Cost of revenue | $100.6M | 79.4% | Dominated by HPC Hosting construction costs (fit-out) passed through to revenue — this line includes construction labor, materials, and subcontractor costs that are matched by the $73M fit-out revenue. The underlying lease cost structure is much lower. |
      | SGA | $57.0M | 45.0% | Includes $29.1M of stock-based compensation (SBC). Cash SGA is ~$27.9M (22.0% of revenue). The SBC load reflects the buildout-phase hiring surge and performance-based awards. |
      | D&A | $8.6M | 6.8% | Remarkably low relative to $2.0B in PP&E. Applied Digital capitalizes interest during construction, and many assets are still under construction (not yet depreciating). As campuses come online, D&A will rise — but so will revenue. |

      **Why the cost ratio is not what it appears:** The 79.4% cost-of-revenue ratio is inflated by construction pass-through economics. In the fit-out model, APLD acts as construction manager for the tenant — it incurs costs and receives revenue that roughly offset. Strip out the estimated fit-out economics (~$73M revenue and ~$70M+ in matched costs), and the underlying lease business shows a much healthier margin profile. The $12M in lease revenue against the remaining operating costs is where the true lease economics will emerge.

      **Gross margin trajectory:**
      - FY2025-Q3: 7.1% ($3.8M / $52.9M) — pre-HPC ramp, crypto mining dominated
      - FY2026-Q1: 13.4% ($8.6M / $64.2M) — early HPC Hosting contribution
      - FY2026-Q2: 20.6% ($26.0M / $126.6M) — fit-out revenue boosting gross profit

      The gross margin is improving but is still obscured by the mix of fit-out (lower margin) and lease (higher margin) revenue. The true test comes when fit-out revenue declines and lease revenue dominates.

      **Path to operating breakeven:** At the current SGA run-rate of $57M/quarter and assuming D&A grows to ~$30M/quarter as Polaris Forge 1 is fully depreciated, APLD needs ~$87M/quarter in gross profit to break even on operations. At a 60% lease gross margin (reasonable for infrastructure), this implies ~$145M/quarter in lease revenue — achievable if Polaris Forge 1 reaches full operation (~$175M/quarter implied by the $700M+ annual rent estimate for 400 MW).

  - id: cash_flow_and_capital_structure
    title: "The funding bridge: $5B in debt, $1.9B in cash, and a narrow window to reach lease cash flow"
    body: |
      **Cash flow decomposition (Q2 FY2026):**
      - Net income: $(14.5M) — includes $12.1M income from discontinued operations and $29.1M SBC
      - OCF: $(15.8M) — negative despite positive SBC add-back; driven by working capital timing related to construction activity
      - Capex: $552.1M — massive PP&E investment for Polaris Forge campus construction
      - FCF: $(567.9M) — deeply negative, entirely expected during heavy buildout
      - Financing cash flow: $2,766.6M — driven by $2.35B senior notes issuance

      **Capital structure stress test (as of Nov 30, 2025):**

      | Metric | Value | Context |
      |--------|-------|---------|
      | Cash | $1,913M | Record level — funded by $2.35B notes |
      | Total debt | $2,607M | LongTermNotesPayable $2,594M + NotesPayableCurrent $13M |
      | Net debt | $694M | Modest given the asset base |
      | PP&E (net) | $2,001M | Tangible collateral backing the debt |
      | Macquarie preferred equity drawn | ~$900M | Additional non-equity capital not in "debt" |
      | Annual interest expense (notes) | ~$350M | $2.35B × 9.25% + est. earlier notes |
      | Stockholders' equity | $1,450M | |

      **The interest coverage gap is the critical math:** Annualized recurring lease revenue is ~$48M (Q2's $12M × 4). Annual interest on the notes alone is ~$350M. The gap: **$302M annually that must be closed by lease revenue ramp.** This is the single most important number for understanding APLD's risk profile.

      **What-if: capital markets close for 12 months.** At the current cash position ($1.9B) and quarterly burn rate (~$570M including capex), APLD has ~3.4 quarters (10 months) of runway without any external financing. This is tight but not catastrophic — the Macquarie facility has additional capacity, and the contracted leases themselves could support asset-backed borrowing. The company is not dependent on equity markets for survival, but construction pace would slow if debt markets closed.

      **Capex intensity:** Capital expenditures of $552M in Q2 represent 436% of revenue — extreme by any metric. But this is construction-phase spending, not recurring capex. Once Polaris Forge 1 and 2 are built, maintenance capex should drop to a fraction of current levels. The relevant question is: what is the capex per MW of contracted capacity, and how does that compare to the lifetime lease revenue?

      **Capex per contracted MW:** Total PP&E of $2.0B against 600 MW contracted = ~$3.3M per MW in current PP&E. If total buildout capex reaches ~$5B for 600 MW (rough estimate including remaining construction), that's ~$8.3M per MW. Against a $16B total contract value (TCV), the implied payback on capital is ~2.2x over the lease term — reasonable for infrastructure, though the 15+ year duration means the return on invested capital is modest on an annualized basis.

  - id: the_revenue_quality_problem
    title: "Fit-out revenue is real money but not recurring — and the transition is the whole thesis"
    body: |
      The single most important analytical distinction in APLD's financials is between **fit-out revenue** and **lease revenue** within the HPC Hosting segment.

      **Q2 FY2026 HPC Hosting breakdown ($85.0M):**
      - Tenant fit-out / construction management: ~$73M (86% of segment)
      - Recurring lease revenue: ~$12M (14% of segment)

      Fit-out revenue is legitimate — APLD is being paid to build facilities to tenant specifications, and the margin is positive. But it is inherently **non-recurring**: once a building is completed, the fit-out revenue stops and transitions to lease revenue. The question is not whether this transition happens (it will, by the nature of construction completion) but **at what pace and margin.**

      **The implied lease economics at full operation:**
      - CoreWeave: 400 MW × ~$11B over 15 years = ~$733M annual lease revenue = ~$183M/quarter
      - Oracle: 200 MW × ~$5B over 15 years = ~$333M annual lease revenue = ~$83M/quarter
      - Combined full-operation lease revenue: ~$267M/quarter or ~$1.07B annually

      Against estimated operating costs at full scale (D&A ~$120M/year on owned assets, cash SGA ~$120M/year, facility operating costs ~$150M/year — roughly $390M), the implied NOI is ~$680M annually. This is directionally consistent with management's >$1B NOI target within five years (which includes additional pipeline beyond the current 600 MW).

      **What the market needs to watch:** The quarterly transition from fit-out to lease revenue. If lease revenue grows by $15-20M per quarter as each Polaris Forge building is energized, the thesis is on track. If lease revenue stalls at $12-15M while fit-out revenue declines, the stock will face a revenue dip that tests investor patience.

  - id: peer_comparison
    title: "Where Applied Digital fits in the AI infrastructure landscape — and why raw comparisons mislead"
    body: |
      Comparing APLD to IREN, CoreWeave, or Cipher Mining without adjusting for business model differences is meaningless. These companies occupy different parts of the infrastructure value chain.

      **APLD vs. IREN — the landlord vs. the operator:**
      - IREN builds, owns, AND operates GPU compute clusters. It captures the full stack of value: facility + compute + managed services. Its D&A is massive ($99.2M/quarter) because it owns GPUs that depreciate over 3-5 years.
      - APLD builds and owns ONLY the facility. The tenant owns and operates the compute. APLD's D&A is low ($8.6M/quarter) because its assets are long-lived infrastructure (20-40 year buildings, land, power infrastructure).
      - IREN's cost ratio of 143.9% (Q2 FY26) and APLD's of 131.2% are not comparable — IREN's includes GPU depreciation that APLD never incurs. Adjusting for business model, APLD's "facility-only" cost ratio is likely much lower than it appears once fit-out pass-through is stripped out.

      **APLD vs. CoreWeave — the landlord vs. the tenant:**
      - CoreWeave is APLD's customer, not its competitor. CoreWeave leases the facility and operates GPUs inside it.
      - CoreWeave's revenue per MW is much higher (it sells compute services at GPU-cloud pricing), but its costs include APLD's lease payment plus GPU procurement. APLD captures a thinner margin per MW but with lower risk (contracted lease income vs. volatile cloud pricing).

      **APLD vs. data center REITs (Digital Realty, QTS):**
      - The business model is most analogous to data center REITs, but APLD lacks: (1) investment-grade credit rating, (2) diversified tenant base, (3) operational track record at scale, and (4) REIT tax structure.
      - Digital Realty's cost of debt is 3-5%; APLD's is 6.75-9.25%. This 300-600 bps spread is the "pre-REIT penalty" — the price of being early-stage. If APLD achieves investment-grade and converts to a REIT structure, the cost-of-capital arbitrage alone would be transformative.

      **Disclosure quality comparison:**
      - APLD discloses segment revenue but does NOT separately break out fit-out vs. lease revenue in the income statement — this must be extracted from earnings commentary.
      - IREN provides GPU fleet counts (though aggregated) and segment revenue (Mining vs. AI Cloud).
      - CoreWeave discloses backlog and remaining performance obligations.
      - APLD's disclosure of per-deal economics is limited to headline TCV and MW — it does not break out per-MW pricing, lease escalation terms, or tenant fit-out margins.

  - id: thesis_destruction
    title: "Testing the bull and bear cases with math"
    body: |
      **Bull case: "APLD is a future REIT trading at construction-phase prices."**

      Weakest assumption: That the 15-year lease economics produce NOI margins comparable to established REITs.

      Test: Digital Realty operates at ~45% NOI margin. If APLD achieves $1.07B annual lease revenue (from 600 MW at full operation) at a 45% NOI margin, implied NOI = $482M. Against $5B+ in total capital invested (debt + preferred equity), the yield on capital is ~9.6% — barely above the blended cost of debt (~8%). This means the bull case requires either: (a) NOI margins above 45%, (b) lease revenue above $1.07B (pricing power or escalation), or (c) lower cost of capital through refinancing or REIT conversion. Management's >$1B NOI target implies 63%+ NOI margins — significantly above REIT comps, suggesting either structural cost advantages (low-cost North Dakota power) or aggressive guidance.

      What would falsify it: If Polaris Forge 1 achieves full operation but NOI margins land below 40%, the capital structure becomes untenable at current debt costs. Track actual operating costs per MW once facilities are fully operational.

      **Bear case: "APLD is an over-leveraged construction company that will be diluted into oblivion."**

      Weakest assumption: That the contracted leases do not reliably convert to cash flow.

      Test: The CoreWeave and Oracle leases are signed, long-term contracts with major counterparties. CoreWeave — while newly public and leveraged — is backed by a $2B Nvidia investment and growing rapidly. Oracle is investment-grade. The probability of both tenants defaulting simultaneously is low. The more realistic bear scenario is not lease default but **construction delay** — if Polaris Forge 1 takes 6-12 months longer to reach full operation, the interest coverage gap widens by $175-350M, potentially forcing dilutive equity raises. But even this scenario does not "break" the thesis; it delays it.

      The bears are right that current recurring revenue cannot service the debt. They are wrong that this is a permanent condition. The construction phase is finite and the leases are signed. The risk is in the timing, not the direction.

  - id: conclusion
    title: "How to read Applied Digital right now"
    body: |
      Applied Digital is a construction-phase AI data center developer making the transition from building to operating. The company has done the hardest part — securing $16B in contracted lease revenue with two major hyperscalers under 15-year terms, accessing $5B+ in debt and preferred equity financing, and energizing its first 100 MW on schedule. What remains is execution: completing construction, transitioning from fit-out revenue to recurring lease income, and demonstrating that the facility-lease economics produce the margins needed to service the capital structure.

      **What the company is doing well:**
      - Secured two marquee hyperscaler tenants (CoreWeave, Oracle) that provide 15+ years of revenue visibility — this is the kind of demand validation that most infrastructure developers never achieve
      - Energized 100 MW at Polaris Forge 1 on schedule — the first operational proof point
      - Proprietary liquid cooling technology (PUE 1.18) provides genuine differentiation in a market moving rapidly toward liquid-cooled AI workloads
      - Strategic North Dakota location offers structural cost advantages (low power costs, natural cooling 200+ days/year)
      - The ChronoScale spinout simplifies the equity story into a pure-play data center landlord

      **Where the genuine risks lie:**
      - **Interest coverage gap:** ~$350M annual interest vs. ~$48M annualized recurring lease revenue. This gap must close within 12-18 months. This is the single biggest risk — not because the contracts aren't signed, but because construction timing determines when lease revenue starts flowing.
      - **Customer concentration:** Two tenants represent all future contracted revenue. CoreWeave counterparty risk is real, given CoreWeave's own leveraged balance sheet.
      - **Construction execution:** Any material delay at Polaris Forge 1 or 2 extends the cash burn period and widens the interest coverage gap.
      - **Cost of capital penalty:** 9.25% and 6.75% coupon rates are 300-600 bps above investment-grade REIT peers. Until APLD achieves investment-grade and/or REIT conversion, every dollar of debt is significantly more expensive than it needs to be.

      **Where the consensus appears off:**
      - The market prices headline revenue ($127M) without adequately distinguishing the $12M in recurring lease revenue from the $73M in one-time fit-out. The real revenue run-rate for the landlord business is much smaller than the headline suggests.
      - Conversely, most bear analysis focuses on current losses and debt without recognizing that the 15-year contracted leases provide revenue visibility that is unusual for any company, let alone one at this stage. The business model is closer to a utility or infrastructure concession than a tech company.

      **What to watch:**
      - **Recurring lease revenue per quarter** — the most important metric. Target: $50M+ by Q4 FY2026.
      - **Polaris Forge 1 MW energized** — each building that comes online converts fit-out to lease. Target: 200+ MW by mid-2026.
      - **Third hyperscaler lease announcement** — de-risks customer concentration. Delta Forge 1 is the likely venue.
      - **Interest coverage ratio** — when gross lease revenue exceeds quarterly interest expense (~$88M), the capital structure thesis is validated.

      **What remains unknown:**
      - Per-MW lease economics at actual operating scale (not projected)
      - True operating cost structure for a fully operational Polaris Forge campus
      - Whether APLD can achieve investment-grade credit and lower its cost of capital
      - The timeline and terms for additional pipeline conversion beyond the current 600 MW

disclosure_gaps: |
  Per-building economics: APLD does not separately disclose fit-out revenue vs. lease revenue in the income statement — this critical split must be extracted from earnings commentary and management presentations. Per-MW pricing: Lease rate per MW, escalation terms, and tenant improvement allowances are not disclosed at a level that enables independent modeling of per-campus economics. Macquarie preferred equity terms: The cost and governance terms of the Macquarie facility are not fully disclosed, making it difficult to assess the true all-in cost of capital. FY2025-Q4 financials: The 10-K period had significant reclassifications from discontinued operations that make XBRL-derived quarterly figures unreliable; filing-level reconciliation is needed for this quarter.

