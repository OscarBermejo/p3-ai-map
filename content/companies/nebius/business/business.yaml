# Nebius Group N.V. — infrastructure business profile (profile_version 4: + guidance).
# Updated from Form 6-K accession 0001104659-26-013946 (Ex.99.2 shareholder letter, 2026-02-12) and
# 0001104659-26-026163 (Ex.99.1 NVIDIA partnership PR, 2026-03-11). Form 20-F accession 0001558370-25-005991
# retained where superseded metrics are absent (GPU total, Item 4 site names).

layer: infrastructure
profile_version: 4

as_of: "2025-12-31"

capacity:
  online:
    value: 170
    notes: |
      Issuer letter (Feb 2026): “~170 MW of **active power**” at year-end 2025 vs 100 MW target. Letter defines **active power** as power consumed by IT equipment (distinct from **connected** and **contracted** power). Supersedes 20-F “~45 MW connected” as of 2025-03-31 for a current scalar.
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000110465926013946/tm266173d1_ex99-2.htm
        kind: sec_6k
        description: "Form 6-K accession 0001104659-26-013946, Ex.99.2 — Letter to shareholders (2026-02-12), active power YE 2025."
        retrieved_at: "2026-03-22"
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000155837025005991/nbis-20241231x20f.htm
        kind: sec_20f
        description: "Form 20-F accession 0001558370-25-005991 — prior ~45 MW connected as of 2025-03-31 (superseded for online scalar)."
        retrieved_at: "2026-03-22"
  contracted:
    value: null
    notes: |
      Issuer discloses aggregate **contracted power** (>2 GW, see capacity.secured) and **connected** targets (800 MW–1 GW by end of 2026); no separate filed scalar for “MW under contract but not yet connected” isolated from those buckets.
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000110465926013946/tm266173d1_ex99-2.htm
        kind: sec_6k
        description: "Form 6-K accession 0001104659-26-013946, Ex.99.2 — power definitions and capacity narrative."
        retrieved_at: "2026-03-22"
  secured:
    value: 2000
    notes: |
      Issuer: “secured **more than 2 GW** of **contracted power**” (letter footnote: power secured by contracts). Expects **>3 GW contracted power by end of 2026**; on track for **800 MW–1 GW connected power** by end of 2026. MW value uses **2,000** as the disclosed “>2 GW” floor; not additive to **active** MW. Mar 2026 NVIDIA PR cites partnership enabling “**more than 5 gigawatts**” of NVIDIA systems **by end of 2030** — different horizon/metric; see deals_and_contracts.
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000110465926013946/tm266173d1_ex99-2.htm
        kind: sec_6k
        description: "Form 6-K accession 0001104659-26-013946, Ex.99.2 — contracted/connected power targets."
        retrieved_at: "2026-03-22"
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000110465926026163/tm268532d1_ex99-1.htm
        kind: sec_6k
        description: "Form 6-K accession 0001104659-26-026163, Ex.99.1 — NVIDIA partnership PR (2026-03-11), >5 GW systems by 2030."
        retrieved_at: "2026-03-22"

