deals_and_contracts:
  summary:
    value: |
      **2026-03-11:** NVIDIA ~$2bn private placement (pre-funded warrant); strategic partnership to scale full-stack AI cloud — PR cites “more than 5 gigawatts” of NVIDIA systems capacity **by end of 2030** (see capacity.secured notes). **2026-02-12 letter:** first tranche of capacity to **Microsoft** delivered Nov 2025; remaining on track; **Meta** contracted tranches delivered on time; five new locations deployed in 2025 and nine additional secured; Europe first to deploy NVIDIA HGX B300 in Nov 2025 per letter. **2024-12:** Accel, Nvidia, Orbis **$700m** strategic equity (20-F narrative).
    notes: null
