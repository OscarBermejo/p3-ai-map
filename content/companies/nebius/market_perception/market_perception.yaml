        kind: curated_platform
        description: "Curated platform: FinViz — Reddit sentiment trajectory from euphoria to panic to recovery."
        retrieved_at: "2026-03-26"

# ── Key debates ─────────────────────────────────────────────────────────────────
key_debates:
  - id: capex_fundability
    question: "Can Nebius fund $16-20B of capex in 2026 and $54.5B through 2028 without destroying shareholder value?"

    bull_case:
      argument: "60% of 2026 capex is internally funded via customer prepayments and cash generation. The $4.3B convertible close, $2B NVIDIA investment, and access to ATM equity provide multiple funding levers. Meta and Microsoft prepayments create a self-reinforcing cycle where customer capital funds the infrastructure those customers need."
      evidence: "Q4 2025 operating cash flow was $834M, boosted by $1.57B deferred revenue. Post-period: $4.3B convertibles + $2B NVIDIA = $6.3B of fresh capital. Management says 60% self-funded."
      sources:
        - url: https://static3.seekingalpha.com/article/4875310-nebius-dont-let-the-capex-scare-you
          kind: curated_platform
          description: "Curated platform: Seeking Alpha — capex funding analysis and 60% self-funding claim."
          retrieved_at: "2026-03-26"

    bear_case:
      argument: "A $34.5B funding gap exists for the $54.5B capex plan through 2028. Operating cash flow is heavily shaped by prepayment timing, not recurring profitability. Net loss was $249.6M in Q4 despite $834M OCF. If capital markets tighten or customer prepayments slow, partially built infrastructure becomes stranded capital."
      evidence: "$54.5B total capex through 2028 minus identifiable funding sources = ~$34.5B gap per analyst estimates. Free cash flow was -$1.23B in Q4 2025."
      sources:
        - url: https://seekingalpha.com/article/4882650-nebius-demand-is-there-and-capex-is-to-watch
          kind: curated_platform
          description: "Curated platform: Seeking Alpha — capex funding gap and FCF analysis."
          retrieved_at: "2026-03-26"

    resolution_evidence: "H1 2026 capex execution and cash flow. If Nebius deploys $8-10B of capex while maintaining cash position through prepayments and debt, the funding model gains credibility. If cash balance deteriorates faster than revenue scales, the gap becomes the story."
    current_lean: bull
    lean_reasoning: "The pace of capital formation — $6.3B raised in March alone, on top of ~$46B in customer commitments — suggests Nebius has unusual access to capital for this stage. The risk is real but the momentum is extraordinary."

  - id: valuation_vs_trajectory
    question: "Is Nebius worth ~$50B+ market cap on $228M of quarterly revenue?"

    bull_case:
      argument: "You don't value a company scaling from $1.25B ARR to $7-9B ARR at trailing multiples. The contracted deal book ($46B+), NVIDIA partnership, and sold-out capacity justify pricing on forward economics. At $8B ARR with 40% EBITDA margins, Nebius would trade at ~15x forward EBITDA — reasonable for a high-growth infrastructure platform."
      evidence: "ARR guidance $7-9B by end-2026. Adjusted EBITDA margin target 40%. ~$46B contracted deals provide revenue visibility."
      sources:
        - url: https://www.benzinga.com/trading-ideas/movers/26/03/51286320/nebius-rewrites-expectations-next-stop-200
          kind: curated_platform
          description: "Curated platform: Benzinga — forward valuation framework post-Meta deal."
          retrieved_at: "2026-03-26"

    bear_case:
      argument: "At ~$100/share and ~$50B+ market cap, NBIS trades at ~70x trailing revenue and near 200x earnings. The contracted deals are multi-year with execution risk. If growth disappoints by even 20%, the stock reprices violently. History is full of capital-intensive infrastructure plays that looked cheap on forward multiples and expensive on actuals."
      evidence: "Q4 2025 net loss $249.6M. P/S ~70x trailing. Stock already -31% from 52-week high despite the deal flow."
      sources:
        - url: https://ts2.tech/en/nebius-group-n-v-nbis-stock-outlook-for-2026-how-microsoft-and-meta-deals-are-shaping-this-ai-infrastructure-high-flier/
          kind: curated_platform
          description: "Curated platform: TS2 — valuation analysis showing extreme trailing multiples."
          retrieved_at: "2026-03-26"

    resolution_evidence: "Q1-Q2 2026 revenue trajectory. If quarterly revenue jumps from $228M toward $500M+, the valuation normalizes rapidly. If revenue stays below $400M, the trajectory thesis weakens."
    current_lean: bull
    lean_reasoning: "The contracted deal book and sold-out capacity provide unusual forward visibility for a company at this stage. The valuation is extreme on trailing metrics but the growth vector is supported by signed commitments, not projections."

  - id: neocloud_durability
    question: "Is the neocloud model a durable business or a temporary scarcity trade?"

    bull_case:
      argument: "Neoclouds are purpose-built for AI workloads with better performance-per-dollar than legacy hyperscaler infrastructure. Nebius's vertically integrated model (own power, own racks, own networking) creates cost advantages. The software layer (Aether, Token Factory) adds stickiness. This is not a commodity — it's a platform."
      evidence: "Nebius was first in Europe to deploy NVIDIA HGX B300 (Nov 2025). Custom server rack design and InfiniBand networking. Aether 3.0/3.5 platform releases. Tavily acquisition for agentic search."
      sources:
        - url: https://investor.wedbush.com/wedbush/article/finterra-2026-2-23-the-ai-factory-reborn-a-deep-dive-into-nebius-group-nbis-and-the-2026-ai-infrastructure-landscape
          kind: specialist_analysis
          description: "Specialist analysis: Wedbush/Finterra deep dive — 'The AI Factory Reborn' on neocloud model durability."
          retrieved_at: "2026-03-26"

    bear_case:
      argument: "The neocloud model works in scarcity. When GPU supply normalizes (Blackwell ramp, Rubin launch, multiple neoclouds scaling), the performance-per-dollar advantage narrows. Hyperscalers have deeper pockets and existing customer relationships. CoreWeave already faces revenue delays from third-party capacity bottlenecks. The model is structurally dependent on GPU depreciation economics that may not hold."
      evidence: "CoreWeave finances GPUs at 9-11% interest, using chips as collateral. If utilization drops below 80%, margins turn negative. Neocloud margins are untested at scale in a supply-abundant environment."
      sources:
        - url: https://fusioncapital.substack.com/p/the-neocloud-wars-why-coreweave-is
          kind: specialist_analysis
          description: "Specialist analysis: Fusion Capital — 'The Neocloud Wars: Why CoreWeave is Betting on Debt, but Nebius is Building the New AWS.'"
          retrieved_at: "2026-03-26"

    resolution_evidence: "2027-2028 neocloud margins as GPU supply expands. If Nebius maintains 40%+ EBITDA margins as capacity grows and scarcity eases, the platform thesis wins. If margins compress toward 20% or below, it was a scarcity trade."
    current_lean: bull
    lean_reasoning: "The software platform differentiation (Aether, Token Factory, serverless AI), early Vera Rubin deployment, and 20 years of cloud engineering DNA give Nebius more durability potential than pure GPU resellers. But this is the longest-term and most uncertain question."

