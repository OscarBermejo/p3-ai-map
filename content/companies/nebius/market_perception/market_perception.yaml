# ── Consensus narrative ─────────────────────────────────────────────────────────
consensus_narrative:
  summary: >
    The market sees Nebius as the most validated neocloud story in AI infrastructure after
    a remarkable March 2026: $27B Meta deal, $2B NVIDIA investment, $4.3B convertible notes
    raise, and a gigawatt-scale factory approval. Consensus has shifted from "interesting
    Yandex spinoff" to "potential new AWS for AI." But the stock trades at extreme multiples
    (~70x revenue) and the capital requirements are staggering ($16-20B capex in 2026 alone),
    creating deep disagreement on whether the valuation is justified by the trajectory.

  bull_thesis:
    view: >
      Nebius is building the infrastructure layer of AI at a pace and scale that makes it
      a potential utility-like platform. ~$46B in contracted hyperscaler deals (Microsoft
      $17.4B + Meta $27B), NVIDIA strategic backing ($2B investment + 5 GW partnership),
      ARR guidance of $7-9B by end-2026 (up from $1.25B at year-end 2025), and 20 years
      of cloud engineering DNA from Yandex. The company is "sold out" of capacity — demand
      exceeds supply. The neocloud model (purpose-built for AI, vertically integrated, own
      power) is structurally superior to legacy hyperscaler bolt-ons for frontier workloads.
    key_assumptions:
      - "ARR reaches $7-9B by end-2026 from $1.25B at year-end 2025 (5.6-7.2x growth)"
      - "Connected power ramps to 800 MW-1 GW by end-2026 from ~170 MW"
      - "$16-20B capex in 2026 is fundable through prepayments, debt, and equity"
      - "Multi-year hyperscaler contracts convert to delivered capacity on schedule"
      - "Software layer (Aether, Token Factory, Tavily) creates differentiation beyond raw compute"
    sources:
      - url: https://seekingalpha.com/article/4877486-nebius-high-stakes-capex-meets-massive-ai-infrastructure-potential
        kind: curated_platform
        description: "Curated platform: Seeking Alpha — 'High-Stakes CapEx Meets Massive AI Infrastructure Potential.'"
        retrieved_at: "2026-03-26"
      - url: https://www.benzinga.com/trading-ideas/movers/26/03/51286320/nebius-rewrites-expectations-next-stop-200
        kind: curated_platform
        description: "Curated platform: Benzinga — 'Nebius Rewrites Expectations — Next Stop $200?' post-Meta deal analyst reaction."
        retrieved_at: "2026-03-26"

  bear_thesis:
    view: >
      Nebius trades at ~70x trailing revenue and ~200x earnings on a business that burned
      $1.23B of free cash flow in Q4 2025 alone. The $16-20B capex plan for 2026 requires
      continuous access to capital markets. A $34.5B funding gap exists for the $54.5B
      capex plan through 2028. Governance risk from founder Arkady Volozh's super-voting
      control and the Yandex legacy. The neocloud model is structurally dependent on GPU
      scarcity — when supply normalizes, margins compress and differentiation erodes.
    key_assumptions:
      - "Valuation requires flawless multi-year execution to justify current price"
      - "Capital markets access could tighten, stranding partially built infrastructure"
      - "GPU scarcity will ease by 2027-2028, compressing neocloud margins"
      - "Customer concentration in Microsoft and Meta creates dependency risk"
      - "Founder-controlled governance structure limits minority shareholder protection"
    sources:
      - url: https://ts2.tech/en/nebius-group-n-v-nbis-stock-outlook-for-2026-how-microsoft-and-meta-deals-are-shaping-this-ai-infrastructure-high-flier/
        kind: curated_platform
        description: "Curated platform: TS2 — detailed valuation analysis showing extreme multiples and governance concerns."
        retrieved_at: "2026-03-26"
      - url: https://seekingalpha.com/article/4882650-nebius-demand-is-there-and-capex-is-to-watch
        kind: curated_platform
        description: "Curated platform: Seeking Alpha — 'Demand Is There, But CapEx Is The Key Variable.'"
        retrieved_at: "2026-03-26"

  embedded_assumptions:
    - assumption: "The neocloud model has durable structural advantages over hyperscalers for AI workloads"
      notes: "This is the foundational bet. If hyperscalers close the performance gap for AI workloads, the neocloud premium evaporates. Currently supported by demand exceeding supply and customer willingness to sign multi-year deals."
      sources:
        - url: https://www.networkworld.com/article/4011187/neoclouds-roll-in-challenge-hyperscalers-for-ai-workloads.html
          kind: curated_platform
          description: "Curated platform: Network World — 'Neoclouds roll in, challenge hyperscalers for AI workloads.'"
          retrieved_at: "2026-03-26"
    - assumption: "GPU scarcity persists long enough for Nebius to build a moat"
      notes: "Current demand exceeds supply (Nebius was 'sold out' in Q4 2025). But NVIDIA is expanding production (Blackwell, Rubin), and multiple neoclouds are scaling simultaneously. The window may be 18-24 months."
      sources: []
    - assumption: "60% of 2026 capex is self-funded through internal cash and prepayments"
      notes: "Management claim from shareholder letter. Remaining 40% requires external capital — convertible notes ($4.3B closed), equity, and potentially more. Sensitive to deployment timing."
      sources:
        - url: https://static3.seekingalpha.com/article/4875310-nebius-dont-let-the-capex-scare-you
          kind: curated_platform
          description: "Curated platform: Seeking Alpha — capex funding breakdown analysis."
          retrieved_at: "2026-03-26"

  narrative_shift:
    direction: more_bullish
    summary: >
      Dramatic bullish shift in March 2026. The Meta $27B deal (March 16), NVIDIA $2B
      investment (March 11), gigawatt-scale factory approval (March 3), and $4.3B convertible
      close (March 20) transformed the narrative from "interesting AI infrastructure startup"
      to "validated large-scale platform." Reddit sentiment recovered from bearish 35 (post
      Q4 miss Feb 15) to 72 (March 10) and likely higher post-Meta deal. Analyst targets
      raised across the board.
    prior_consensus: "Promising but unproven AI infrastructure play with execution uncertainty and Yandex legacy questions."
    sources:
