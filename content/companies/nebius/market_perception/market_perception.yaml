# ── Information asymmetries ─────────────────────────────────────────────────────
information_asymmetries:
  - id: prepayment_driven_cash_flow
    title: "Operating cash flow is driven by prepayments, not recurring profitability"
    market_believes: "Nebius generated $834M in operating cash flow in Q4 2025, proving the business model generates real cash."
    evidence_suggests: "The $834M OCF was heavily shaped by +$1.57B in deferred revenue (customer prepayments) offset by -$632.8M in accounts receivable, alongside large D&A. Net loss was still $249.6M. Strip out the prepayment timing and the underlying cash economics are not yet self-sustaining."
    gap_reason: "OCF is a headline number that looks strong without decomposing the components. The prepayment structure is disclosed but the magnitude of its contribution to cash flow is easy to miss."
    closing_catalyst: "A quarter where OCF remains strong without a comparable surge in deferred revenue would prove the underlying economics are real, not just timing."
    confidence: high
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/1513845/000110465926013946/tm266173d1_ex99-1.htm
        kind: sec_6k
        description: "Form 6-K Ex.99.1 — Q4 2025 cash flow statement showing deferred revenue and AR components."
        retrieved_at: "2026-03-26"

  - id: meta_deal_optionality
    title: "The Meta $27B deal is $12B committed + $15B conditional — not $27B guaranteed"
    market_believes: "Nebius signed a $27B deal with Meta, its largest contract ever."
    evidence_suggests: "The official announcement says $12B of dedicated capacity (committed) plus up to $15B of 'additional available compute capacity' that Meta can purchase 'across certain upcoming clusters.' The $15B is optional. The headline is the ceiling, not the floor."
    gap_reason: "Headlines use the total ($27B) because it's more impressive. The $12B committed + $15B optional structure is disclosed but not emphasized in most coverage."
    closing_catalyst: "Meta exercising (or not) the optional capacity in 2027-2028 will show whether the $27B was realistic or optimistic."
    confidence: high
    sources:
      - url: https://group.nebius.com/newsroom/nebius-signs-new-ai-infrastructure-agreement-with-meta
        kind: company_web
        description: "Primary source: official Nebius announcement — '$12 billion of dedicated capacity' + 'up to $15 billion' optional."
        retrieved_at: "2026-03-26"

  - id: software_layer_economics_unknown
