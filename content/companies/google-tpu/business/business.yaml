# Google TPU — chips layer business profile.
# See content/_meta/business_templates/chips.yaml for field definitions and source tiers.
#
# This profile covers Google's Tensor Processing Unit (TPU) product line only.
# It does NOT cover Gemini models, Gemini API, Vertex AI model catalog, or Google Search.
# Cross-references to google-deepmind are explicitly noted where TPUs serve as the
# training/inference substrate for Gemini.
#
# Spec sourcing notes:
#   - Google publishes TPU specs through official product pages, Cloud blog posts, and
#     Google Cloud Next keynote/session materials — these are Tier 1 sources.
#   - MLPerf submissions are Tier 1/2 where available.
#   - Google does NOT publish transistor counts, die sizes, or detailed memory specs
#     for TPUs (unlike NVIDIA's published datasheets). Those fields are left null or
#     estimated from third-party analysis (labeled Tier 3).
#   - TPU performance is often quoted in internal benchmarks (e.g. "2x faster than v5e")
#     rather than absolute FLOPS — this is noted where it applies.

layer: chips
profile_version: 1

as_of: "2026-03-30"

# ─── Product catalog ────────────────────────────────────────────────────────────
# Note on TPU naming: Google uses the pattern TPU v{n} or product code names.
# v5e = fifth-generation edge/efficiency variant; v6e = sixth-generation "Trillium";
# v7 = seventh-generation "Ironwood" (inference-first, announced April 2025).
# "e" suffix = efficiency / cost-optimized variant; "p" suffix = performance variant.

products:

  # ── TPU v5e ────────────────────────────────────────────────────────────────────
  - name: "TPU v5e"
    vendor: google-tpu
    generation: "v5 (fifth generation)"
    status: production
    launch_date: "2023-Q3"

    architecture:
      process_node:
        value: null
        notes: >
          Google does not publicly disclose the process node for TPU v5e. Third-party
          estimates (SemiAnalysis, 2023) suggest TSMC 7nm-class or 5nm. Not confirmed.
        sources: []
      transistor_count:
        value: null
        notes: "Not disclosed by Google for any TPU generation."
        sources: []
      die_size_mm2:
        value: null
        notes: "Not disclosed by Google."
        sources: []
      memory_type:
        value: "HBM2e"
        notes: >
          Google confirmed HBM2e for v5e in the TPU v5e announcement blog post.
          v5p uses HBM3; v5e is the cost-optimized inference variant.
        sources:
          - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
            kind: vendor_blog
            description: "Google Cloud blog: Introducing Cloud TPU v5e (August 2023)."
            retrieved_at: "2026-03-30"
      memory_capacity_gb:
        value: 16
        notes: "16 GB HBM2e per chip. Each v5e TensorCore has 16 GB."
        sources:
          - url: "https://cloud.google.com/tpu/docs/v5e"
            kind: vendor_documentation
            description: "Google Cloud TPU v5e documentation."
            retrieved_at: "2026-03-30"
      memory_bandwidth_tb_s:
        value: 0.82
        notes: "819 GB/s (~0.82 TB/s) per chip, from Google Cloud TPU v5e docs."
        sources:
          - url: "https://cloud.google.com/tpu/docs/v5e"
            kind: vendor_documentation
            description: "Google Cloud TPU v5e documentation: 819 GB/s memory bandwidth."
            retrieved_at: "2026-03-30"
      interconnect:
        value: "ICI (Inter-Chip Interconnect) — 800 Gb/s bidirectional per chip"
        notes: >
          Google's proprietary ICI fabric enables pod-level scale-out without external
          InfiniBand. v5e pods scale to 256 chips in a flat topology.
        sources:
          - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
            kind: vendor_blog
            description: "Google Cloud TPU v5e announcement: ICI interconnect details."
            retrieved_at: "2026-03-30"

    performance:
      tdp_watts:
        value: null
        notes: "Not publicly disclosed for v5e chip level. System-level TDP for a 256-chip pod is undisclosed."
        sources: []
      peak_flops_fp8_tflops:
        value: null
        notes: "Google does not publish FP8 TFLOPS for TPU v5e."
        sources: []
      peak_flops_fp16_tflops:
        value: 393
        notes: >
          393 TFLOPS bfloat16 per chip per Google Cloud documentation. Google TPUs
          use bfloat16 natively (not FP16); the value quoted is BF16 peak.
        sources:
          - url: "https://cloud.google.com/tpu/docs/v5e"
            kind: vendor_documentation
            description: "Google Cloud TPU v5e: 393 TFLOPS BF16 per chip."
            retrieved_at: "2026-03-30"
      peak_flops_fp32_tflops:
        value: null
        notes: "Not published for v5e; TPUs are not optimized for FP32 dense math."
        sources: []
      peak_flops_int8_tops:
        value: 786
        notes: "786 INT8 TOPS per chip, derived from Google Cloud documentation."
        sources:
          - url: "https://cloud.google.com/tpu/docs/v5e"
            kind: vendor_documentation
            description: "Google Cloud TPU v5e: INT8 performance."
            retrieved_at: "2026-03-30"

    efficiency:
      flops_per_watt_fp16:
        value: null
        notes: "Cannot compute — TDP not disclosed."
        sources: []
      flops_per_watt_fp8:
        value: null
        notes: "Cannot compute — FP8 TFLOPS and TDP not disclosed."
        sources: []
      memory_bandwidth_per_watt:
        value: null
        notes: "Cannot compute — TDP not disclosed."
        sources: []

    system_context:
      reference_system:
        value: "TPU v5e Pod (256 chips)"
        notes: >
          Standard deployment unit is a 256-chip pod interconnected via ICI.
          Slices available externally on Google Cloud: v5e-8, v5e-16, v5e-32,
          v5e-64, v5e-128, v5e-256.
        sources:
          - url: "https://cloud.google.com/tpu/docs/v5e"
            kind: vendor_documentation
            description: "Google Cloud TPU v5e: pod topology and slice sizes."
            retrieved_at: "2026-03-30"
      gpus_per_system:
        value: 256
        notes: "Maximum pod size. Smaller slices available externally."
        sources: []
      system_tdp_watts:
        value: null
        notes: "Not disclosed."
        sources: []
      rack_density_kw:
        value: null
        notes: "Not disclosed."
        sources: []
      scale_out_interconnect:
        value: "ICI (Inter-Chip Interconnect) — proprietary Google fabric"
        notes: >
          No external InfiniBand or RoCE required within a pod. ICI is tightly
          integrated into the TPU ASIC and does not expose a standard NIC interface.
        sources:
          - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
            kind: vendor_blog
            description: "Google Cloud TPU v5e: ICI interconnect."
            retrieved_at: "2026-03-30"

    workload_fit:
      training:
        value: "competitive"
        notes: >
          v5e is cost-optimized for mid-scale training and fine-tuning, not peak
          large-scale training (that is v5p and Trillium territory). Suitable for
          models up to ~7B–70B range cost-effectively.
        sources: []
      inference:
        value: "strong"
        notes: >
          v5e is Google's primary inference TPU for 2023–2024. Deployed for Gemini
          serving in production and as the default Google Cloud TPU inference SKU.
        sources:
          - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
            kind: vendor_blog
            description: "Google Cloud TPU v5e: designed for inference cost efficiency."
            retrieved_at: "2026-03-30"
      fine_tuning:
        value: "strong"
        notes: "v5e is explicitly recommended for fine-tuning in Google Cloud documentation."
        sources: []
      target_model_scale:
        value: "1B–70B parameter inference; up to ~70B fine-tuning"
        notes: "Google positions v5e for cost-efficient inference at medium-to-large scale."
        sources: []
      workload_notes:
        value: >
          Optimized for transformer inference with BF16/INT8 mixed-precision. Supports
          JAX and PyTorch via XLA/PJRT backend. Not suitable for CUDA-native workloads.
        notes: null
        sources: []

    benchmarks:
      mlperf_training:
        value: null
        notes: "Google has not submitted TPU v5e standalone MLPerf Training results."
        sources: []
      mlperf_inference:
        value: "MLPerf Inference v4.0 (2024) — v5e submitted in Offline and Server scenarios for LLM benchmarks."
        notes: >
          Google submitted TPU v5e in MLPerf Inference v4.0. Results show competitive
          throughput for Llama 2 70B in Offline scenario. Submission ID: see MLCommons
          results database. Exact numbers vary by scenario; reference the submission.
        sources:
          - url: "https://mlcommons.org/benchmarks/inference-datacenter/"
            kind: benchmark
            description: "MLCommons MLPerf Inference v4.0 results — Google TPU v5e submission."
            retrieved_at: "2026-03-30"
      vendor_published:
        value: >
          Google claims TPU v5e delivers 2× better price-performance vs. TPU v4 for
          inference workloads (vendor claim; not independently verified).
        notes: "Vendor benchmark claim from launch blog post — flag as vendor data."
        sources:
          - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
            kind: vendor_blog
            description: "Google: TPU v5e 2× price-perf improvement vs v4 for inference (vendor claim)."
            retrieved_at: "2026-03-30"

    pricing:
      list_price_usd:
        value: null
        notes: "Internal/captive silicon — no merchant list price."
        sources: []
      cloud_price_usd_hr:
        value: 2.20
        notes: >
          Google Cloud TPU v5e-8 (8-chip slice) on-demand pricing: ~$17.60/hr for 8 chips
          = ~$2.20/chip/hr. As of early 2026. Prices subject to change. Committed use
          discounts available (up to 57% for 3-year). Snapshot: March 2026.
        sources:
          - url: "https://cloud.google.com/tpu/pricing"
            kind: csp_pricing
            description: "Google Cloud TPU pricing page — v5e on-demand rates, March 2026."
            retrieved_at: "2026-03-30"
      cloud_providers:
        value: ["GCP"]
        notes: "TPUs are exclusively available through Google Cloud. Not available on AWS, Azure, or CoreWeave."
        sources: []

    availability:
      oem_systems:
        value: []
        notes: "TPUs are captive silicon — no OEM server configurations. Only available through GCP."
        sources: []
      lead_time:
        value: "On-demand via GCP (smaller slices); larger pod reservations may require advance commitment."
        notes: "As of 2026 — larger pod allocations often sold via committed use or reservation contracts."
        sources: []

    sources:
      - url: "https://cloud.google.com/tpu/docs/v5e"
        kind: vendor_documentation
        description: "Google Cloud TPU v5e product documentation."
        retrieved_at: "2026-03-30"
      - url: "https://cloud.google.com/blog/products/ai-machine-learning/introducing-cloud-tpu-v5e"
        kind: vendor_blog
        description: "Google Cloud blog: Introducing Cloud TPU v5e (August 2023)."
        retrieved_at: "2026-03-30"

