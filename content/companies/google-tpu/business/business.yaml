# ─── Company-level context ──────────────────────────────────────────────────────

software_ecosystem:
  stack_name:
    value: "XLA / PJRT — JAX, PyTorch (via torch_xla), TensorFlow"
    notes: >
      TPUs run via the XLA (Accelerated Linear Algebra) compiler, which is Google's
      primary ML compiler. PJRT (Plugin JAX Runtime) is the low-level interface.
      JAX is the primary framework for TPU-native development; PyTorch is supported
      via torch_xla but with higher friction than JAX. CUDA workloads do NOT run on TPUs.
    sources:
      - url: "https://cloud.google.com/tpu/docs/jax-quickstart-tpu-vm"
        kind: vendor_documentation
        description: "Google Cloud TPU JAX quickstart documentation."
        retrieved_at: "2026-03-30"
  framework_support:
    value: ["JAX", "PyTorch (via torch_xla)", "TensorFlow", "MaxText", "MaxDiffusion"]
    notes: >
      JAX is first-class; PyTorch support has improved significantly via torch_xla 2.x
      but still requires porting effort for CUDA-native codebases. TensorFlow is
      legacy-supported. MaxText (LLM training) and MaxDiffusion (image generation)
      are Google's own high-performance JAX libraries optimized for TPU deployment.
    sources:
      - url: "https://cloud.google.com/tpu/docs/supported-frameworks"
        kind: vendor_documentation
        description: "Google Cloud: supported frameworks for TPUs."
        retrieved_at: "2026-03-30"
  ecosystem_maturity:
    value: "growing"
    notes: >
      TPU ecosystem is mature for Google's internal use and JAX-native workloads
      (e.g., Flax, MaxText) but "growing" from an external developer perspective.
      CUDA ecosystem dominance (PyTorch + NVIDIA) creates significant switching friction.
      The XLA compilation model adds latency to iteration cycles vs. CUDA eager mode.
      HuggingFace, Keras, and major model hubs have added TPU support but CUDA-first
      development remains the default for most external teams.
    sources: []

manufacturing_and_supply:
  foundry_partners:
    value: ["TSMC"]
    notes: >
      TSMC is Google's primary (and believed sole) TPU foundry partner. Unlike NVIDIA,
      Google does not disclose foundry relationships officially but TSMC's annual
      reports and supply chain analyses consistently cite Google as a major customer.
    sources:
      - url: "https://www.tsmc.com/english/dedicatedFoundry/technology/logic"
        kind: vendor_documentation
        description: "TSMC technology overview — Google is major customer (confirmed through earnings calls/SEC filings)."
        retrieved_at: "2026-03-30"
  process_nodes:
    value: ["5nm class (v5e/v5p estimated)", "4nm class (v5p estimated)", "3nm class (Trillium estimated)"]
    notes: >
      All process node attributions are third-party estimates (Tier 3). Google does not
      disclose process nodes for any TPU generation. SemiAnalysis estimates v5e on N7/N5,
      v5p on N5, Trillium on N3. None confirmed by Google.
    sources: []
  packaging:
    value: "CoWoS (likely for HBM-attached TPUs)"
    notes: >
      Google does not disclose advanced packaging details. However, HBM attachment
      in v5p (95 GB), Trillium, and Ironwood (192 GB) requires 2.5D interposer packaging
      analogous to CoWoS-S or equivalent. Not confirmed by Google (Tier 3 inference).
    sources: []
  supply_constraints:
    value: >
      CoWoS capacity at TSMC is the binding supply constraint for HBM-attached AI chips
      industrywide (2024–2025). Google, NVIDIA, and AMD all compete for the same limited
      CoWoS capacity. Alphabet's $91B FY2025 capex implies Google is securing large
      committed capacity; management has indicated supply is "the binding constraint"
      on datacenter expansion in 2025.
    notes: null
    sources:
      - url: "https://abc.xyz/investor/"
        kind: earnings_release
        description: >
          Alphabet Q3 2025 earnings call: management cited supply as the primary
          constraint on AI infrastructure build rate, not demand.
        retrieved_at: "2026-03-30"

commercial_traction:
  deployment_channels:
    value: ["captive internal (Google Search, Ads, Maps, YouTube, Gemini)", "Google Cloud TPU on-demand (external)"]
    notes: >
      The dominant use case is captive/internal: TPUs run virtually all of Google's
      AI-powered products internally. External cloud availability is secondary but
      growing. External TPU customers get access to the same generation as internal
      workloads — a competitive advantage in time-to-performance vs. hyperscalers
      that resell NVIDIA GPUs.
    sources: []
  notable_customers_or_design_wins:
    value:
      - "Google (internal) — Search, Ads, YouTube, Maps, Assistant, Gemini API"
      - "Google DeepMind — Gemini 1.0, 1.5, 2.0, Gemma training and serving"
      - "Google Cloud external customers — disclosed in Q4 2025 ER as 'AI Infrastructure' demand driver"
      - "Various large-scale ML research teams via Google Cloud TPU Research Cloud"
    notes: >
      Google does not disclose specific external TPU customer names. The $17.7B Q4 2025
      Google Cloud quarter (47.7% YoY growth) includes TPU pod commitments as a
      stated driver. The TPU Research Cloud (TRC) program provides academic access.
    sources:
      - url: "https://sites.research.google/trc/"
        kind: vendor_documentation
        description: "Google TPU Research Cloud program."
        retrieved_at: "2026-03-30"
  revenue_segment:
    value: "Google Cloud"
    notes: >
      TPU-on-demand revenue is a sub-line within Google Cloud. It is not separately
      disclosed. Total Google Cloud FY2025 revenue = $58.7B; TPU share is not broken out.
    sources: []

roadmap:
  next_generation:
    value: "TPU v8 — not announced as of March 2026; expected on Google's ~annual cadence"
    notes: >
      Google has not announced v8 as of March 2026. Historical cadence: v4 (2021),
      v5e (2023-Q3), v5p (2023-Q4), v6e Trillium (2024-Q3), v7 Ironwood (2025-Q2 announcement).
      Approximately 12–18 months between major generations. v8 would be expected late 2026
      or early 2027 based on this cadence.
    sources: []
  cadence:
    value: "~12–18 months per generation"
    notes: >
      Google's TPU roadmap has accelerated: from roughly 2-year cycles (v1–v3 era) to
      roughly annual releases (v5e, v5p, v6e, v7 all within 24 months, 2023–2025).
      This matches NVIDIA's accelerated Blackwell → Rubin cadence and AMD's CDNA3→CDNA4.
    sources: []
  roadmap_credibility:
    value: "strong"
    notes: >
      Google has delivered on every TPU generation announced, often ahead of schedule.
      v5p 8,960-chip pod was operational for Gemini training before external GA.
      Trillium (v6e) shipped on schedule with GA in late 2024.
      Ironwood (v7) announced at Cloud Next April 2025 with preview timeline.
      Execution history is strong; the main uncertainty is external availability
      timing vs. internal deployment priority.
    sources: []

