  operating_cash_flow: 27747000000

  # SBC: Direct from Q2 2025 cash-flow reconciliation = $5,998M.
  stock_based_compensation: 5998000000

  # Capex: Derived. H1 2025 = $39,643M (Q2 ER cash-flow statement);
  # Q1 = $17,197M (direct). Q2 = $39,643M − $17,197M = $22,446M.
  # Note: Alphabet does not disclose capex split between TPU hardware, servers,
