extended_notes:
  tpu_chips_disclosure_gap:
    description: |
      TPU-specific revenue, capex, and unit economics are NOT disclosed by Alphabet.
      See FY2025-Q1.yaml extended_notes.tpu_chips_disclosure_gap for full list.
    q2_2025_capex_note: >
      Q2 2025 capex ($22.4B) is the largest single-quarter infrastructure investment in Alphabet's
      history to this point, reflecting accelerated TPU pod buildout and datacenter expansion.
      Management confirmed on the Q2 2025 earnings call that "the majority of our 2025 capex
      is going to servers and networking, much of which is for AI." TPU share undisclosed.

  google_cloud_segment:
    description: |
      Google Cloud is the nearest commercial proxy for AI infrastructure (TPU) traction.
      Google Cloud TPU-on-demand is a subset; its share is not separately broken out.
    q2_2025:
      revenue_usd: 13624000000
      revenue_yoy_pct: 32.0
      prior_year_revenue_usd: 10320000000  # Q2 2024
      operating_income_usd: 2826000000
      operating_margin_pct: 20.7
      prior_year_operating_margin_pct: 11.3  # Q2 2024
      note: >
        Both revenue and operating income direct from Q2 2025 earnings release segment table.
        Margin expansion (+9.4 ppts YoY) driven by AI workload scale economies. Management
        cited AI Infrastructure commitments (including TPU pods) as a primary demand driver
        alongside Gemini API and Vertex AI Agents.

