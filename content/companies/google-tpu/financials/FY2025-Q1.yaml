# Alphabet Inc. — Q1 2025 (January 1 – March 31, 2025)
# Profile scope: Google TPU / chips layer. All financial data is Alphabet consolidated.
# These metrics are IDENTICAL to content/companies/google-deepmind/financials/FY2025-Q1.yaml —
# same parent filing, same derivations. Headers and extended_notes are adapted for the
# chips-layer framing. Edits to Alphabet consolidated figures must be kept in sync.
#
# TPU-specific revenue, gross margin, and capex attribution to TPU hardware are NOT
# disclosed in any Alphabet public filing. Google Cloud segment figures appear in
# extended_notes as the commercial proxy for AI infrastructure / TPU traction.

period:
  label: "Q1 2025"
  start: "2025-01-01"
  end: "2025-03-31"
  fiscal_year: 2025

currency_reporting: USD

metrics:
  # --- Income statement ---
  # Revenue: Derived. Alphabet disclosed H1 2025 = $186,662M in Q2 2025 earnings release;
  # Q2 2025 = $96,428M direct; Q1 = $186,662M − $96,428M = $90,234M.
  revenue: 90234000000

  # Cost of revenue: Direct from Q1 2025 earnings release income statement.
  cost_of_revenue: 36361000000

  # Gross profit: Derived = revenue − cost_of_revenue.
  gross_profit: 53873000000

  # R&D: Direct from Q1 2025 earnings release income statement.
  research_and_development: 13556000000

  # Selling_general_administrative = Sales & marketing + General & administrative.
  # S&M derived: H1 2025 $13,273M (Q2 ER) − Q2 $7,101M = $6,172M.
  # G&A derived: H1 2025 $8,748M (Q2 ER) − Q2 $5,209M = $3,539M.
  # Total SGA = $6,172M + $3,539M = $9,711M.
  selling_general_administrative: 9711000000

  # D&A: Derived from cash-flow reconciliation.
  # H1 2025 D&A = $9,485M (Q2 ER cash-flow statement); Q2 2025 D&A = $4,998M (direct).
  # Q1 = $9,485M − $4,998M = $4,487M.
  depreciation_and_amortization: 4487000000

  # Operating income: Direct from Q1 2025 earnings release.
  operating_income: 30606000000

  interest_expense: null
  interest_income: null
  other_income_expense_net: null
  income_tax_expense_benefit: null

  # Net income: Direct from Q1 2025 earnings release.
  net_income: 34540000000

  # --- Cash flows ---
  # Operating cash flow: Direct from Q1 2025 earnings release cash flow summary.
  operating_cash_flow: 36150000000

  # SBC: Derived. H1 2025 SBC = $11,514M (Q2 ER cash-flow reconciliation);
  # Q2 2025 SBC = $5,998M (direct); Q1 = $11,514M − $5,998M = $5,516M.
  stock_based_compensation: 5516000000

  # Capex: Direct from Q1 2025 earnings release.
  # Note: Alphabet does not disclose capex split between TPU hardware, servers,
  # networking, land, or buildings. $17.2B is total infrastructure capex.
  capital_expenditures_cash: 17197000000

  investing_cash_flow_net: null
  financing_cash_flow_net: null

  # --- Balance sheet (as of March 31, 2025) ---
  cash_and_equivalents: 23264000000
  current_assets: null
  current_liabilities: null
  property_plant_equipment_net: null
  total_assets: 475374000000
  total_liabilities: 130107000000
  long_term_debt: null
  current_portion_of_long_term_debt: null
  total_debt: null
  stockholders_equity: 345267000000

  # --- Capital / market ---
  shares_outstanding_basic: null
  # Diluted shares: Derived from net_income / diluted EPS ($2.81, direct from Q1 ER).
  # $34,540M / $2.81 = 12,292M diluted shares.
  shares_outstanding_diluted: 12292000000
  market_cap: null

extended_notes:
  tpu_chips_disclosure_gap:
    description: |
      Google TPU hardware is captive silicon — deployed exclusively in Alphabet's own datacenters
      and offered externally via Google Cloud TPU-on-demand pods. Alphabet does not separately
      disclose TPU-specific revenue, cost of goods, gross margin, unit shipments, or capex
      attribution. The following items are NOT available in any public Alphabet filing:
    non_disclosed_items:
      - "TPU revenue or margin — not broken out in any Alphabet filing"
      - "TPU unit economics (cost per chip, per-pod COGS) — not disclosed"
      - "Capex attribution to TPU hardware vs. datacenter infrastructure — not disclosed"
      - "Google Cloud TPU-on-demand revenue as a share of Google Cloud total — not disclosed"
      - "Internal transfer pricing between TPU supply and Search/Ads workloads — not disclosed"
      - "TPU installed base (total pods deployed, total accelerator count) — not disclosed"
    analytical_note: >
      Alphabet consolidated capex ($17.2B Q1 2025) is the primary signal for infrastructure
      investment intensity. Google Cloud segment revenue is the external commercial proxy.
      TPU-specific attribution requires third-party estimates (e.g. SemiAnalysis, Morgan Stanley)
      and must be labeled as estimates, not disclosed facts.

  google_cloud_segment:
    description: |
      Google Cloud is the closest commercial proxy for AI infrastructure (TPU) traction available
      in Alphabet's public disclosures. Google Cloud TPU-on-demand is a subset; its share is not
      separately broken out. Cloud revenue growth partly reflects TPU adoption by external customers.
    q1_2025:
      revenue_usd: 12260000000
      revenue_yoy_pct: 28.0
      prior_year_revenue_usd: 9574000000  # Q1 2024
      operating_income_usd: 2182000000
      operating_margin_pct: 17.8
      prior_year_operating_margin_pct: 9.4  # Q1 2024
      note: >
        Operating income derived: reported margin 17.8% × revenue $12,260M = $2,182M.
        Management cited AI Infrastructure (including TPU pod commitments) as a driver
        of Google Cloud demand growth alongside Vertex AI / Gemini API adoption.

