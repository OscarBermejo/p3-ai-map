extended_notes:
  q3_2025_eu_dma_fine:
    description: >
      Q3 2025 G&A ($7,393M) includes a $3,500M accrual for a European Commission
      Digital Markets Act (DMA) fine relating to Google Search self-preferencing.
      Normalized G&A would be ~$3,893M; normalized SGA ~$11,098M.
      Operating income would be ~$34,728M on a normalized basis (vs $31,228M reported).
      This is a one-time charge unrelated to TPU/chips operations.

  tpu_chips_disclosure_gap:
    description: |
      TPU-specific revenue, capex, and unit economics are NOT disclosed by Alphabet.
      See FY2025-Q1.yaml extended_notes.tpu_chips_disclosure_gap for full list.
    q3_2025_capex_note: >
      Q3 2025 capex ($23.95B) continues Alphabet's accelerated AI infrastructure buildout.
      Management confirmed the $75B FY2025 capex plan on the Q3 2025 call (later executed
      at $91.4B actual). TPU pod deployments for v5e and Trillium (v6e) production-scale
      capacity expansion are the cited driver, alongside datacenter power/cooling build.

  google_cloud_segment:
    description: |
      Google Cloud is the nearest commercial proxy for AI infrastructure (TPU) traction.
    q3_2025:
      revenue_usd: 15157000000
      revenue_yoy_pct: 34.0
      prior_year_revenue_usd: 11353000000  # Q3 2024
      operating_income_usd: 3594000000
      operating_margin_pct: 23.7
      prior_year_operating_margin_pct: 17.1  # Q3 2024
      note: >
        Both revenue and OI direct from Q3 2025 earnings release segment table.
        Management noted AI Infrastructure commitments (multi-year TPU pod contracts)
        and Gemini API / Vertex AI Agents as primary growth drivers.
    google_cloud_cumulative_2025_ytd:
      revenue_usd_ytd: 41041000000  # Q1 $12,260M + Q2 $13,624M + Q3 $15,157M
      operating_income_usd_ytd: 8602000000  # Q1 $2,182M + Q2 $2,826M + Q3 $3,594M

