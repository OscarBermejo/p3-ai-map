# Alphabet Inc. — Q3 2025 (July 1 – September 30, 2025)
# Profile scope: Google TPU / chips layer. All financial data is Alphabet consolidated.
# These metrics are IDENTICAL to content/companies/google-deepmind/financials/FY2025-Q3.yaml —
# same parent filing, same derivations. Headers and extended_notes are adapted for chips-layer
# framing. Edits to Alphabet consolidated figures must be kept in sync.
#
# NOTE: Q3 2025 G&A includes a $3.5B EU Digital Markets Act (DMA) fine accrual.
# TPU-specific revenue, gross margin, and capex attribution to TPU hardware are NOT
# disclosed in any Alphabet public filing.

