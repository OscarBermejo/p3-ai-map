  net_income: 34979000000

  # --- Cash flows ---
  # Operating cash flow: Direct from Q3 2025 earnings release = $48,414M.
  operating_cash_flow: 48414000000

  stock_based_compensation: 6368000000

  # Capex: Derived. 9M 2025 = $63,596M; H1 = $39,643M.
  # Q3 = $63,596M − $39,643M = $23,953M.
  # Note: Alphabet's $91.4B FY2025 capex guidance implies Q4 capex ~$27.9B.
  # TPU hardware capex share not separately disclosed.
  capital_expenditures_cash: 23953000000

  investing_cash_flow_net: null
  financing_cash_flow_net: null

