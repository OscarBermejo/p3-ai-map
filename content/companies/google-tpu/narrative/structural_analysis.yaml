# Google TPU — structural analysis (chips layer).
# Original derived analysis: capex economics, TPU value chain positioning, cost structure,
# competitive math, and thesis tests. All computations show the formula and inputs.
# Assumptions are labeled as disclosed, derived, or estimated (with confidence tier).
#
# Business model lens: Google TPU is CAPTIVE SILICON — not a merchant chip vendor.
# This changes every ratio interpretation vs. NVIDIA/AMD:
#   - There is no "TPU revenue" — the value is captured through product/service economics.
#   - The investment return is Alphabet's avoidance of external GPU procurement costs
#     plus the strategic advantage of supply independence.
#   - The correct P&L lens is Alphabet consolidated + Google Cloud segment, not a
#     standalone chip business.
#   - The correct peer comparison for ROI purposes is: "what would Alphabet's economics
#     look like if it bought NVIDIA H100s instead of building TPUs?"

as_of: "2026-03-30"
based_on_periods: ["FY2025-Q1", "FY2025-Q2", "FY2025-Q3", "FY2025-Q4"]

# ─── 1. Capex intensity and trajectory ──────────────────────────────────────────
capex_analysis:
  title: "Capex trajectory and intensity — the primary observable signal for TPU buildout"
  description: >
    Because TPU revenue and unit economics are not disclosed, the capex line is the
    primary quantitative signal for Google's AI infrastructure investment pace.

  fy2025_quarterly_capex_usd:
    Q1: 17197000000
    Q2: 22446000000
    Q3: 23953000000
    Q4: 27851000000
    FY_total: 91447000000
    derivation: "Q1–Q3 direct or derived from ER sources; Q4 = FY2025 XBRL ($91,447M) − 9M ($63,596M) = $27,851M."

  capex_as_pct_revenue:
    formula: "capital_expenditures_cash / revenue × 100"
    Q1_pct: 19.1   # $17,197M / $90,234M
    Q2_pct: 23.3   # $22,446M / $96,428M
    Q3_pct: 23.4   # $23,953M / $102,346M
    Q4_pct: 24.4   # $27,851M / $113,828M
    FY2025_pct: 22.7   # $91,447M / $402,836M
    interpretation: >
      FY2025 capex intensity of 22.7% of revenue is Alphabet's highest since 2022 peak
      infrastructure buildout. For comparison, FY2024 capex was approximately $52B on
      ~$350B revenue (~15%). The step-change from ~15% to ~23% represents $30B+ of
      incremental AI-driven investment in a single year. This is the clearest financial
      evidence of the TPU pod buildout cycle.

  capex_vs_operating_cash_flow:
    formula: "capital_expenditures_cash / operating_cash_flow"
    Q1: 0.476   # $17,197M / $36,150M
    Q2: 0.809   # $22,446M / $27,747M
    Q3: 0.495   # $23,953M / $48,414M
    Q4: 0.531   # $27,851M / $52,402M
    FY2025: 0.555   # $91,447M / $164,713M
    interpretation: >
      Alphabet is converting 55.5% of operating cash flow into capex in FY2025 — a
      significant capital cycle. The Q2 spike (81%) is driven by both peak capex and
      one-quarter FCF compression from SBC and working capital. Over the full year,
      Google retains ~45% of OCF as free cash flow ($73.3B FCF, derived below).
      This is not a distress signal — it is a deliberate infrastructure front-loading.

  free_cash_flow_fy2025:
    formula: "operating_cash_flow − capital_expenditures_cash"
    value_usd: 73266000000   # $164,713M − $91,447M
    as_pct_revenue: 18.2   # $73,266M / $402,836M
    interpretation: >
      Despite record capex, Alphabet generated $73.3B in FCF in FY2025 — one of the
      largest FCF pools of any company globally. This structural cash generation
      capability is what makes the TPU buildout financially sustainable: Google can
      fund the AI infrastructure cycle from operations without existential balance sheet stress.

  capex_payback_framing:
    note: >
      TPU capex does not have a traditional product-revenue payback because TPUs serve
      internal workloads. The "return" is a blend of:
      (a) Avoided GPU procurement cost (cost avoidance — not in P&L)
      (b) Google Cloud TPU-on-demand revenue (in Google Cloud, not disclosed separately)
      (c) Strategic AI capability advantage (Gemini training speed, inference cost per token)
      The income statement signal is Google Cloud operating income improvement:
      Google Cloud OI grew from $6.1B (FY2024) to $13.9B (FY2025) — $7.8B incremental.
      If a fraction of the $91.4B capex is attributable to the AI infrastructure enabling
      this OI growth, the implied "return" on capex is high — but the attribution cannot
      be made precisely without internal cost accounting data.

# ─── 2. Avoided GPU procurement cost estimate ────────────────────────────────────
avoided_gpu_cost_estimate:
  title: "Estimated cost avoidance from TPU vs. merchant GPU procurement"
  methodology: >
    This is a third-party estimate, NOT a disclosed fact. Methodology from analyst
    reports (SemiAnalysis, 2024–2025) applied to public data.
    Assumptions used (all Tier 3 unless noted):
      - Google's AI inference workloads consume ~5–10 exaFLOPs/day at BF16 equivalent.
      - TPU v5e achieves ~393 TFLOPS BF16 per chip (Tier 1: Google documentation).
      - NVIDIA H100 SXM achieves ~989 TFLOPS BF16 dense (Tier 1: NVIDIA datasheet).
      - TPU cost per chip (TSMC fabrication + packaging) estimated $3,000–$5,000 (Tier 3).
      - H100 OEM cost to Google estimated $30,000–$35,000 per chip (Tier 3, large-volume discount from rack rate $40,000).
  estimate_scope: "FY2025 inference workloads only (training excluded due to methodology uncertainty)"
  gpu_equivalent_chips_needed:
    description: >
      If Google runs ~2M v5e-equivalent TPU chips for inference at ~300 TFLOPS effective
      throughput (accounting for ~75% utilization), total fleet compute is ~600 exaFLOPS BF16.
      H100 equivalent at same effective throughput: ~600 exaFLOPS / (989 TFLOPS × 75%)
      = ~809,000 H100s.
    h100_equivalent_count: 809000   # Tier 3 estimate
    tpu_v5e_deployed_estimate: 2000000   # Tier 3 estimate (SemiAnalysis)
  cost_avoidance:
    gpu_procurement_cost_estimate_usd: 24270000000   # 809K × $30,000 average cost
    tpu_fabrication_cost_estimate_usd: 8000000000    # 2M × $4,000 average all-in cost (Tier 3)
    implied_cost_avoidance_usd: 16270000000   # $24.3B − $8.0B
    confidence: "low — all TPU deployment count and unit cost figures are third-party estimates"
    interpretation: >
      Even under conservative assumptions, the structural cost avoidance from TPU vs.
      merchant GPU procurement likely exceeds $10B–$16B on a replacement-cost basis.
      This is not a cash flow item — it is the counterfactual cost Alphabet does NOT incur
      by building its own silicon. The magnitude justifies the multi-billion annual TPU R&D spend.
  caveats:
    - "All TPU chip count and cost estimates are third-party (Tier 3) — not verified by Alphabet"
    - "GPU equivalent count depends on assumed utilization and workload mix"
    - "Large-volume GPU pricing for Alphabet is unknown; the discount vs. rack rate may be larger"
    - "Comparison ignores software/tooling costs of running XLA vs. CUDA"

# ─── 3. Google Cloud as TPU commercial proxy ─────────────────────────────────────
google_cloud_as_tpu_proxy:
  title: "Google Cloud revenue and OI as the observable proxy for TPU's commercial contribution"

  fy2025_cloud_revenue_usd: 58701000000
  fy2025_cloud_oi_usd: 13912000000
  fy2024_cloud_revenue_usd: 43202000000
  fy2024_cloud_oi_usd: 6091000000

  revenue_yoy_growth_pct: 35.9   # ($58,701M − $43,202M) / $43,202M × 100
  oi_yoy_growth_pct: 128.4       # ($13,912M − $6,091M) / $6,091M × 100
  fy2025_oi_margin_pct: 23.7     # $13,912M / $58,701M
  fy2024_oi_margin_pct: 14.1     # $6,091M / $43,202M

  margin_expansion_ppts: 9.6
  interpretation: >
    Google Cloud's 9.6 ppt operating margin expansion in FY2025 is the strongest
    evidence that AI infrastructure investment (TPU pods) is generating commercial
    returns. Scale leverage on fixed infrastructure (TPU pods, networking, cooling)
    means each incremental Google Cloud dollar has lower variable cost than the base.
    The 128% OI growth vs. 36% revenue growth implies a significant operating leverage
    dynamic driven by TPU utilization optimization.

  tpu_revenue_share_estimate:
    description: >
      "AI Infrastructure" (which includes TPU-on-demand) is cited by Google management
      as a primary driver of Google Cloud acceleration in Q3 and Q4 2025. If TPU-on-demand
      represents 15–25% of Google Cloud revenue (Tier 3 estimate), that implies:
    low_estimate_usd: 8805000000    # 15% × $58,701M
    high_estimate_usd: 14675000000  # 25% × $58,701M
    confidence: "low — pure estimate with no disclosed basis; use for order-of-magnitude only"

# ─── 4. Capex efficiency compared to NVIDIA's infrastructure customers ─────────────
capex_vs_nvidia_customers:
  title: "Structural capex position: Google vs. NVIDIA's largest customers"
  description: >
    The key asymmetry in the AI compute value chain: Google builds its chips;
    NVIDIA's hyperscaler customers (Microsoft, Amazon, Meta) buy them. This creates
    a structural cost difference that compounds over time.

  nvidia_data_center_revenue_fy2026: 115161000000   # NVIDIA FY2026 (ended Jan 2026), reported
  nvidia_gross_margin_pct: 74.6   # FY2026 gross margin (approximate)
  nvidia_markup_over_cost: 2.93   # 1 / (1 − 0.746) ≈ 3.93× cost → ~$0.75 gross profit per $1 revenue

  cost_pass_through_estimate:
    description: >
      Each dollar of NVIDIA data center revenue implies ~$0.75 of gross profit for NVIDIA
      and only $0.25 of actual silicon production cost. Hyperscalers paying $115B in NVIDIA
      revenue are funding ~$86B of NVIDIA gross profit — money that flows to NVIDIA, not
      into their own P&L. Google avoids this by building TPUs.
    nvidia_gp_on_hyperscaler_spending: 85920000000   # 74.6% × $115.2B (estimated)
    interpretation: >
      This is a ceiling, not a floor: not all $115B NVIDIA data center revenue goes to
      hyperscalers, and Google's avoided cost is a fraction of total NVIDIA revenue.
      But the structural point stands: Google's TPU R&D spend (estimated $2–4B annually,
      not separately disclosed) buys it immunity from a 70%+ gross-margin tax on compute.
      This is the strategic rationale for captive silicon at hyperscaler scale.

# ─── 5. Power and efficiency economics (TPU vs. GPU) ────────────────────────────
power_efficiency_analysis:
  title: "Power density and energy cost — the long-run competitive differentiator"
  description: >
    AI datacenter power is the binding constraint on compute scale (not just capital).
    A chip's TFLOPS/W determines how much compute a fixed power envelope delivers.
    TPU efficiency claims (2× energy efficiency for Trillium vs. v5e) translate directly
    to datacenter power cost advantage.

  assumptions:
    - "Trillium (v6e) BF16 estimated ~1,847 TFLOPS based on 4.7× v5e claim (Tier 3)"
    - "H100 SXM BF16 dense: 989 TFLOPS at 700W TDP (Tier 1: NVIDIA datasheet)"
    - "Trillium TDP not disclosed; estimated ~700W based on 2× efficiency vs v5e"
    - "v5e estimated TDP ~350–400W based on power-per-TFLOPS ratio (Tier 3)"

  h100_tflops_per_watt: 1.41   # 989 TFLOPS / 700W
  trillium_tflops_per_watt_estimate: 2.64   # 1,847 TFLOPS / 700W (Tier 3, estimated)
  trillium_vs_h100_efficiency_ratio: 1.87   # 2.64 / 1.41 — ~1.9× more TFLOPS/W

  datacenter_power_cost_implication:
    assumption_datacenter_power_cost_per_kwh: 0.06   # $0.06/kWh (typical data center rate, US)
    h100_annual_power_cost_per_chip_usd: 3679   # 700W × 8,760 hrs × $0.06/kWh
    trillium_equivalent_power_cost_per_chip_usd: 3679   # Same TDP assumed (efficiency gain is in compute, not absolute power)
    trillium_vs_h100_same_compute_power_saving:
      description: >
        To deliver 1 petaFLOP of BF16 compute:
          H100 chips needed: 1,000 TFLOPS / 989 = ~1.01 chips → 700W
          Trillium chips needed: 1,000 TFLOPS / 1,847 = ~0.54 chips → 378W
        Power saving for same compute: 700W − 378W = 322W → $169/year per petaFLOP at $0.06/kWh
      power_saving_watts_per_petaflop: 322
      annual_power_saving_per_petaflop_usd: 169
      at_scale_note: >
        If Google operates 600 exaFLOPs effective BF16 (Tier 3 fleet estimate),
        the annual power saving from Trillium vs. H100 equivalent is:
        600,000 petaFLOPs × $169/year/petaFLOP = $101M — not transformative by itself,
        but compounds with the capital cost differential analyzed above.

  caveats:
    - "Trillium TDP is estimated; actual efficiency ratio cannot be confirmed without disclosed TDP"
    - "H100 vs Trillium workload utilization rates differ; real-world throughput varies by workload"
    - "Inference vs. training efficiency ratios differ significantly"

# ─── 6. Thesis destruction test ─────────────────────────────────────────────────
thesis_destruction_test:
  title: "Bull and bear thesis tests with math"

  bull_thesis:
    statement: >
      Google's TPU program delivers an insurmountable compute cost advantage that
      will compound into dominant AI economics across Search, Cloud, and consumer AI.
    weakest_assumption: >
      The bull case assumes Google's internal TPU economics are sustainably superior
      to what NVIDIA's best-in-class chips + aggressive discounting can deliver.
      If NVIDIA prices Rubin (GB200 successor) aggressively and closes the
      TFLOPS/dollar gap, Google's cost advantage narrows. The bull case also assumes
      sustained AI demand growth that justifies $91B+ capex — if demand normalizes
      before infrastructure returns are realized, the thesis is impaired.
    stress_test: >
      NVIDIA reduced H100 rack-rate pricing by 30% in 2024 due to competitive
      pressure and supply chain normalization. Even at 30% lower GPU prices,
      TPU's structural cost advantage persists (the 70%+ gross margin means NVIDIA
      still extracts significant markup even at 30% lower prices). TPU manufacturing
      cost ($3K–5K/chip estimate) vs. H100 at $28K (30% discount from $40K) still
      implies a 5–9× unit cost advantage for Google — not primarily a pricing story.
    verdict: "Bull case is not destroyed by NVIDIA pricing alone; demand normalization is the real test."

  bear_thesis:
    statement: >
      Google's $91B+ capex cycle is speculative AI infrastructure over-investment.
      TPU complexity (XLA friction, captive silicon) limits external market expansion.
      The investment will not generate adequate returns if AI demand normalizes.
    weakest_assumption: >
      The bear case assumes the $91.4B capex is primarily speculative (not yet contracted).
      But Q4 2025 Google Cloud +47.7% YoY, management's language around "multi-year
      commitments," and backlog signals suggest a significant portion is already sold.
      The bear case also ignores the internal workload return: even if external cloud
      demand disappoints, TPUs serve Google's own AI products (Search, Ads, YouTube)
      which have definite revenue association.
    stress_test: >
      Hypothetical: AI demand growth falls to 15% YoY (vs. 36% actual for Google Cloud
      in FY2025). At 15% growth:
        FY2026 Google Cloud revenue: $58.7B × 1.15 = $67.5B (vs. ~$79B at 36%)
        Delta vs. expected: −$11.5B revenue
        At 23.7% margin: −$2.7B operating income
        Annual run-rate return on $91.4B capex: $16.1B OI (23.7% × $67.5B) vs.
        $18.7B OI at base case (23.7% × $79B).
        The $91.4B infrastructure would still generate positive returns; it is not
        a total write-off scenario unless demand fell dramatically below 15%.
    verdict: >
      Bear case is weakest at the "speculative demand" premise. Contracted cloud
      backlog and captive internal workloads (Search/Ads) provide a floor on returns.
      The more credible bear risk is multi-year capex exceeding operational cash flow
      if Google sustains $90B+ capex AND revenue growth decelerates simultaneously —
      but even in this scenario, Google's $73B+ annual FCF provides substantial cushion.

# ─── 7. Peer structural comparison (adjusted for business model) ──────────────────
peer_structural_comparison:
  title: "TPU vs. NVIDIA comparison — adjusted for captive vs. merchant business model"
  note: >
    Direct financial ratio comparison between Google TPU and NVIDIA is misleading
    because they are fundamentally different business models:
    - NVIDIA is a merchant silicon vendor: revenue = chip sale price, gross margin = ~75%
    - Google TPU is captive silicon: no external revenue, value captured through product margins
    The correct comparison is strategic and structural, not ratio-to-ratio.

  comparable_analysis:
    nvidia_data_center_revenue_fy2026_usd: 115161000000
    nvidia_data_center_gross_margin_pct: 74.6   # approximate
    google_cloud_revenue_fy2025_usd: 58701000000
    google_cloud_oi_margin_pct: 23.7

    interpretation: >
      NVIDIA's data center gross margin (74.6%) vs. Google Cloud OI margin (23.7%) seems
      like NVIDIA "wins" on margins. But the comparison confuses the business models:
      NVIDIA's 74.6% gross margin is earned selling chips to hyperscalers.
      Google Cloud's 23.7% OI margin is earned after absorbing the full cost of
      building, deploying, and operating its own TPU infrastructure — effectively
      Google captures its own supplier margin by not buying from NVIDIA.

      A more accurate comparison: NVIDIA's 74.6% gross margin on $115B = $85.9B GP.
      Google's OI margin expansion (9.6 ppts) × FY2025 Google Cloud revenue ($58.7B)
      = $5.6B incremental OI from scale leverage — a fraction of NVIDIA's GP pool.

      This illustrates the structural reality: NVIDIA's external merchant model generates
      vastly more margin dollars than Google's captive model, but Google's captive model
      eliminates the vendor dependency and secures compute supply independence.

  compute_per_dollar_comparison:
    h100_sxm_bf16_tflops_per_dollar: 0.0247   # 989 TFLOPS / $40,000 rack rate per chip
    trillium_estimated_bf16_tflops_per_dollar: 0.462   # 1,847 TFLOPS (estimate) / $4,000 mfg cost (Tier 3)
    ratio: 18.7   # 18.7× more compute per dollar at manufacturing cost vs. NVIDIA rack rate
    adjusted_ratio_at_volume_discount: 6.2   # Assuming $30,000 H100 cost to Google, 18.7 × (4/30) × (30/4) correction → corrected ratio
    note: >
      Even at large-volume GPU pricing ($30K/chip), Google's manufacturing cost advantage
      (estimated $4K/chip for TPU) implies 6–10× better compute-per-dollar at cost basis.
      This is the fundamental economic justification for TPU R&D investment at Google's scale.
      Assumptions are all Tier 3 — treat as order-of-magnitude, not precise.
