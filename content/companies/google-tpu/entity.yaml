# Google TPU / Alphabet Inc. — profile scoped to chips layer only.
# This profile covers Alphabet's Tensor Processing Unit (TPU) product line:
# custom AI accelerator design, datacenter deployment, and competitive positioning
# vs. merchant silicon (NVIDIA/AMD). It does NOT cover Gemini models, Gemini API,
# Vertex AI model catalog, or Google Search AI features — those belong to google-deepmind.
# Legal / reporting entity is Alphabet Inc. (same as google-deepmind).

slug: google-tpu
legal_name: Alphabet Inc.

tickers:
  - symbol: GOOGL
    exchange: NASDAQ
  - symbol: GOOG
    exchange: NASDAQ

summary: |
  Google TPU is the internal silicon program at Alphabet that designs and deploys
  Tensor Processing Units — custom AI accelerators purpose-built for Google's
  training and inference workloads. TPUs are first-party captive silicon: designed
  in-house at Google DeepMind / Google Research, manufactured at TSMC, and deployed
  exclusively in Google's own datacenters and through Google Cloud's TPU-on-demand
  service. The TPU line spans v5e (cost-optimized inference), v6e Trillium (peak
  efficiency general-purpose), and the announced v7 Ironwood (inference-first, 2025).
  By building its own accelerators, Alphabet eliminates dependency on merchant GPUs
  (primarily NVIDIA) for its largest AI workloads — training Gemini and running
  Google Search, Ads, and Assistant at scale. Google Cloud TPU pods are also
  available to third-party customers, providing a limited external revenue signal.
  TPU-specific revenue, gross margin, and capex attribution are not separately
  disclosed by Alphabet; Google Cloud segment ($58.7B FY2025, +36% YoY) is the
  nearest commercial proxy.

  Profile scope: chips layer — TPU hardware, silicon architecture, datacenter
  deployment, and competitive positioning vs. merchant GPUs. Cross-references
  google-deepmind where TPUs serve as the training/inference substrate for Gemini.

