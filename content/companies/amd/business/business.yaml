layer: chips
profile_version: 1

as_of: "2026-03-29"

# AMD AI accelerator product catalog — chips layer
# Covers Instinct GPU family (CDNA 3 and CDNA 4 generations) plus EPYC CPUs as
# supporting data-center hardware. Gaming/Client GPUs (Radeon RX 9000 series) are
# noted but not the focus of the AI value chain positioning.

products:

  # ─── CDNA 3 Generation ──────────────────────────────────────────────────────────

  - name: "Instinct MI300X"
    vendor: amd
    generation: "CDNA 3"
    status: production
    launch_date: "2023-12-06"

    architecture:
      process_node:
        value: "TSMC N5 + N6 (chiplet)"
        notes: "Three CDNA 3 compute dies (GCDs) on TSMC N5 + one I/O die on TSMC N6. Multi-chip module (MCM) using AMD 3D-stacked HBM approach."
        sources:
          - "AMD Instinct MI300X Product Brief, Dec 2023 — https://www.amd.com/en/products/accelerators/instinct/mi300/mi300x.html"
      transistor_count:
        value: 153
        notes: "~153B transistors total (3 × GCDs + 1 × IO die). Sometimes cited as 8 chiplets including HBM die stacks."
        sources:
          - "AMD Instinct MI300X Product Brief"
      die_size_mm2:
        value: 1042
        notes: "Reported active die area of compute complex; full package area larger. Per AMD CES 2024 press materials."
        sources:
          - "AMD MI300X die area reported in Hot Chips 35 (2023) and product brief"
      memory_type:
        value: "HBM3"
        notes: "Eight HBM3 stacks integrated in the multi-chip package."
        sources:
          - "AMD Instinct MI300X Product Brief"
      memory_capacity_gb:
        value: 192
        notes: "192 GB HBM3 per GPU — largest memory capacity among commercially available AI accelerators at launch. Critical for large-model inference (fitting 70B+ parameter models on a single accelerator)."
        sources:
          - "AMD Instinct MI300X Product Brief"
      memory_bandwidth_tb_s:
        value: 5.3
        notes: "5.3 TB/s peak HBM3 bandwidth per card."
        sources:
          - "AMD Instinct MI300X Product Brief"
      interconnect:
        value: "Infinity Fabric (900 GB/s total, 7th-gen xGMI)"
        notes: "Chip-to-chip within OAM module via xGMI3 (Generation 4, 7th-gen IF). Supports multi-GPU scale-up in an 8-GPU system with point-to-point NIM links."
        sources:
          - "AMD Instinct MI300X Product Brief; AMD Hot Chips 35 presentation"

    performance:
      tdp_watts:
        value: 750
        notes: "750W OAM module TDP."
        sources:
          - "AMD Instinct MI300X Product Brief"
      peak_flops_fp8_tflops:
        value: 1307
        notes: "1,307 FP8 TFLOPS sparse (AMD headline). Dense FP8 not separately published; AMD typically headlines sparse."
        sources:
          - "AMD Instinct MI300X Product Brief"
      peak_flops_fp16_tflops:
        value: 1307
        notes: "1,307 BF16/FP16 TFLOPS sparse per AMD spec sheet. Dense BF16 = ~655 TFLOPS."
        sources:
          - "AMD Instinct MI300X Product Brief"
      peak_flops_fp32_tflops:
        value: 163.4
        notes: "163.4 FP32 TFLOPS (scalar compute; not matrix)."
        sources:
          - "AMD Instinct MI300X Product Brief"
      peak_flops_int8_tops:
        value: 2614
        notes: "2,614 INT8 TOPS sparse per AMD spec sheet."
        sources:
          - "AMD Instinct MI300X Product Brief"

    efficiency:
      flops_per_watt_fp8:
        value: 1.74
        notes: "Derived: 1,307 FP8 TFLOPS / 750W = 1.743 TFLOPS/W (sparse). Memory bandwidth per watt is where MI300X excels vs. H100 (5.3 TB/s / 750W = 7.07 GB/s/W)."
        sources: []
      flops_per_watt_fp16:
        value: 1.74
        notes: "Derived: 1,307 BF16 TFLOPS sparse / 750W = 1.743 TFLOPS/W. Lower dense figure: 655/750 = 0.87 TFLOPS/W."
        sources: []
      memory_bandwidth_per_watt:
        value: 0.00707
        notes: "Derived: 5.3 TB/s / 750W = 0.00707 TB/s per W = 7.07 GB/s per W. Key differentiator for memory-bound inference workloads."
        sources: []

    system_context:
      reference_system:
        value: "AMD Instinct MI300X Universal Baseboard (UBB)"
        notes: "8-GPU OAM-based UBB reference design. Used by Dell, HPE, Lenovo, Supermicro in their MI300X server platforms."
        sources:
          - "AMD Instinct MI300X Launch Materials, Dec 2023"
      gpus_per_system:
        value: 8
        notes: "8 × MI300X OAM modules per UBB server. GPU-to-GPU bandwidth via PCIe + xGMI fabric; AMD provides reference interconnect topology."
        sources:
          - "AMD UBB system specification"
      system_tdp_watts:
        value: 6400
        notes: "8 × 750W = 6,000W GPU power; system-level TDP (with CPUs, cooling, etc.) typically cited around 6,400–7,200W depending on EPYC configuration."
        sources: []
      rack_density_kw:
        value: null
        notes: "Rack-level density not published by AMD; depends on OEM chassis design."
        sources: []
      scale_out_interconnect:
        value: "InfiniBand NDR 400G or Ethernet (400GbE/800GbE) — OEM choice"
        notes: "AMD does not supply scale-out interconnect; MI300X servers connect via standard RDMA fabrics. No AMD equivalent to NVIDIA NVLink Switch for scale-out."
        sources: []

    workload_fit:
      training:
        value: competitive
        notes: "ROCm + PyTorch/JAX support enables training at scale. Winning some hyperscaler training wins (Meta Llama 3, Microsoft Azure). Still behind NVIDIA in software breadth; some models require ROCm-specific modifications. MLPerf Training v4.0 results below H100 system."
        sources: []
      inference:
        value: strong
        notes: "192 GB VRAM is the defining advantage — can load 70B parameter FP16 models without tensor parallelism, 405B models with minimal sharding. Low $/token for large inference batches documented by multiple hyperscalers. Microsoft Azure ND MI300X v5 GA in 2024 specifically for inference."
        sources: []
      fine_tuning:
        value: competitive
        notes: "LoRA/QLoRA fine-tuning benefits from large VRAM. Full-rank fine-tuning of large models (70B+) is a natural fit."
        sources: []
      target_model_scale:
        value: ">70B inference, all scales training"
        notes: "Primary competitive moat is large-model inference. For training, competitive but not dominant."
        sources: []
      workload_notes:
        value: "LLM inference is MI300X's strongest use case. The 192 GB memory pool allows deploying models like Llama-3-70B, Mixtral-8x22B, or Llama-3.1-405B on fewer GPUs than H100. Disaggregated prefill-decode deployments also benefit from memory headroom."
        notes: null
        sources: []

    benchmarks:
      mlperf_training:
        value: "MLPerf Training v4.0 (closed division): AMD submitted MI300X 8-GPU results for GPT-3 175B. Did not achieve time-to-train competitive with NVIDIA H100 SXM5 8-GPU on most benchmarks."
        notes: "AMD's training software stack (ROCm, FlashAttention-ROCm) maturity gap is visible in MLPerf results. Improving with each round."
        sources:
          - "MLPerf Training v4.0 results — https://mlcommons.org/benchmarks/training/"
      mlperf_inference:
        value: "MLPerf Inference v4.0 (open division): AMD MI300X results submitted for text summarization (Llama-2-70B) and image generation. Competitive throughput in memory-bound workloads."
        notes: "Closed division inference results limited; AMD primarily participates in open division."
        sources:
          - "MLPerf Inference v4.0 — https://mlcommons.org/benchmarks/inference-datacenter/"
      vendor_published:
        value: "AMD published MI300X vs. H100 benchmarks showing 1.3–1.6× throughput advantage on Llama-2-70B inference in FP16 (Tier 3 — vendor claim, not independently verified by MLPerf closed division)."
        notes: "Treat as marketing data; actual performance depends on software optimization level."
        sources:
          - "AMD Instinct MI300X Benchmark blog post, Dec 2023"

    pricing:
      list_price_usd:
        value: null
        notes: "AMD does not publish list pricing for data-center Instinct GPUs. Server-level OEM pricing used for market estimates."
        sources: []
      cloud_price_usd_hr:
        value: 13.20
        notes: "Microsoft Azure ND MI300X v5 (8 × MI300X per instance): list on-demand price ~$105.80/hr ÷ 8 GPUs = ~$13.23/GPU-hr as of Q1 2025 snapshot. Region: eastus."
        sources:
          - "Microsoft Azure pricing page — https://azure.microsoft.com/en-us/pricing/details/virtual-machines/linux/ (snapshot Q1 2025)"
      cloud_providers:
        value: ["Microsoft Azure", "Oracle Cloud (OCI)", "Google Cloud (limited preview)"]
        notes: "Microsoft Azure ND MI300X v5 GA as of late 2024. OCI MI300X Compute shapes available 2024. GCP preview."
        sources: []

    availability:
      oem_systems:
        value: ["Dell PowerEdge XE9680", "HPE ProLiant DL380 Gen11", "Lenovo ThinkSystem SR685a V3", "Supermicro SYS-821GE-TNHR", "Inspur NF5688M7"]
        notes: "All major OEM server vendors offer MI300X-based systems via the AMD UBB reference design."
        sources:
          - "AMD partner ecosystem listings, AMD.com"
      lead_time:
        value: "4–8 weeks (estimated, varies by OEM/region)"
        notes: "MI300X not in as severe allocation-constrained status as H100/H200. Lead times normalize in 2024 as supply ramps."
        sources: []

    sources:
      - "AMD Instinct MI300X Product Brief — https://www.amd.com/en/products/accelerators/instinct/mi300/mi300x.html"
      - "AMD Instinct MI300X Architecture — Hot Chips 35, Aug 2023"

