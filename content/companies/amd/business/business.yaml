# ─── Company-level context ──────────────────────────────────────────────────────

software_ecosystem:
  stack_name:
    value: "ROCm (Radeon Open Compute)"
    notes: "AMD's open-source GPU compute stack equivalent to NVIDIA's CUDA ecosystem. ROCm 6.x (released 2024) brought improved PyTorch 2.x and JAX support, FlashAttention-2-ROCm, and vLLM ROCm backend. Core gap vs. CUDA: ecosystem breadth, library coverage (especially for custom CUDA kernels), and community size."
    sources:
      - "ROCm GitHub — https://github.com/ROCm/ROCm"
      - "AMD ROCm 6.0 release blog, Jan 2024"
  framework_support:
    value: ["PyTorch", "JAX", "TensorFlow (limited)", "ONNX Runtime", "triton-rocm", "vLLM (ROCm fork)", "DeepSpeed"]
    notes: "PyTorch 2.x is the primary first-class framework; most major inference frameworks now support ROCm. TensorFlow ROCm support is community-maintained and lags. CUDA kernel compatibility via HIP (HIP C++) still requires manual porting for custom kernels."
    sources:
      - "ROCm compatibility matrix — https://rocm.docs.amd.com/projects/install-on-linux/en/latest/reference/system-requirements.html"
  ecosystem_maturity:
    value: growing
    notes: "ROCm ecosystem maturity rated 'growing' — improving rapidly since 2023 but still meaningfully behind NVIDIA CUDA in library breadth, debugger/profiler tooling (Omnitrace/Omniperf vs. Nsight), and kernel optimization depth. Major hyperscalers (Microsoft, Meta) have invested in ROCm development to reduce CUDA lock-in. AMD contributor base to PyTorch growing."
    sources:
      - "AMD earnings calls Q2–Q4 FY2025 ROCm ecosystem commentary"
      - "Meta open-source ROCm contributions GitHub"

manufacturing_and_supply:
  foundry_partners:
    value: ["TSMC"]
    notes: "AMD is fabless; 100% outsourced to TSMC. Instinct MI300X/MI325X use TSMC N5+N6 chiplets. EPYC Turin uses TSMC N3+N6. MI350 (CDNA 4) targets TSMC N3. HBM memory supplied separately by Samsung and SK Hynix (not AMD-manufactured)."
    sources:
      - "AMD 10-K FY2025 (supplier disclosure)"
  process_nodes:
    value: ["TSMC N5", "TSMC N6", "TSMC N3"]
    notes: "N5/N6 for current Instinct and EPYC Genoa. N3 (Turin CPU, MI350 GPU). AMD is one of TSMC's top N3 customers alongside Apple and NVIDIA."
    sources:
      - "AMD product specifications; industry supply chain reports"
  packaging:
    value: "CoWoS-L (AMD calls it 3D packaging / multi-die module for MI300X)"
    notes: "AMD's MI300X uses a custom multi-die stacking approach with HBM3 on-package. The specific TSMC CoWoS variant used is not publicly disclosed as CoWoS-S or CoWoS-L by AMD; often referred to as 'advanced packaging'. TSMC CoWoS capacity is a bottleneck shared with NVIDIA. AMD has had CoWoS capacity priority issues in 2023–2024 limiting MI300X supply ramp."
    sources:
      - "AMD supply chain commentary in earnings calls; TSMC CoWoS capacity reports"
  supply_constraints:
    value: "CoWoS packaging capacity at TSMC was primary supply bottleneck through mid-2024; improved in H2 2024. HBM3e allocation (Samsung/SK Hynix) is a gating factor for MI325X ramp in 2025. TSMC N3 capacity prioritization is a 2025–2026 risk for MI350."
    notes: "AMD competes with NVIDIA for the same CoWoS and HBM pools. AMD's smaller volume relative to NVIDIA gives less leverage in HBM and advanced packaging negotiations, though AMD has been securing multi-year supply agreements."
    sources:
      - "AMD earnings calls FY2025; analyst supply chain reports"

