    notes: "AMD's Data Center segment includes both Instinct GPU revenue and EPYC server CPU revenue. AMD does not break out GPU vs. CPU within the Data Center segment. Instinct GPU revenue likely represented ~60–70% of Data Center segment revenue in FY2025 (Tier 3 estimate based on rapid Instinct growth vs. steady EPYC). FY2025 Data Center segment revenue approximately $26.7B (~77% of total FY2025 revenue of $34.6B — derived from press release segment tables)."
    sources:
      - "AMD FY2025 Q4 Earnings Press Release, Feb 3, 2026 (segment breakdown)"

roadmap:
  next_generation:
    value: "Instinct MI355X (CDNA 4 refresh, 2026) → MI400 (CDNA 5, HBM4, ~2026–2027)"
    notes: "AMD follows a cadence of annual GPU generation + mid-cycle refresh. MI350 (CDNA 4, TSMC N3) is the FY2025 new generation. MI355X (CDNA 4 refresh with potential HBM3e upgrade) is expected in 2026. MI400 (CDNA 5 with HBM4) targets 2027. AMD also developing next-gen CPU-GPU unified architecture for HPC (successor to MI300A APU). Intel is not a meaningful competitive threat in data-center AI accelerators; NVIDIA Blackwell (B200/B300) is the primary benchmark."
    sources:
      - "AMD Technology Summit roadmap, Nov 2024"
      - "AMD SC24 roadmap slides"
  cadence:
    value: "annual (CDNA new generation) + mid-cycle refresh (~12–18 months)"
    notes: "AMD's stated cadence is annual GPU generation releases. CDNA 1 (MI100, 2020) → CDNA 2 (MI210/250/250X, 2021–2022) → CDNA 3 (MI300X, 2023) → CDNA 3 refresh (MI325X, 2024) → CDNA 4 (MI350, 2025). AMD has generally held to this cadence but historically had gaps in software maturation between hardware releases."
    sources:
      - "AMD Instinct GPU Roadmap history"
  roadmap_credibility:
    value: moderate
    notes: "AMD's hardware roadmap execution has been strong — EPYC has gained 4 consecutive server CPU share gains vs. Intel; MI300X delivered on its specs and achieved significant commercial traction faster than skeptics expected. CDNA 4 (MI350) is the next major test. Credibility risk: software (ROCm) has consistently lagged hardware specifications, meaning GPU hardware excellence does not automatically translate to full workload capture. AMD has improved ROCm cadence and has increased software headcount significantly (FY2025 R&D $7.6B LTM). The go-to-market execution risk is real — NVIDIA has 5+ years of hyperscaler relationship lead time."
    sources:
      - "AMD earnings calls FY2025; analyst consensus"

