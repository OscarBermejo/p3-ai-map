  deployment_channels:
    value: ["CSP instances (Azure, OCI, GCP)", "OEM servers (Dell, HPE, Lenovo, Supermicro)", "direct enterprise AI clusters", "HPC research (DOE national labs)"]
    notes: "CSP is primary go-to-market for AI accelerators. OEM server channel for on-premise enterprise AI. HPC segment (DOD, DOE) benefits from AMD EPYC + Instinct co-deployment (El Capitan supercomputer)."
    sources: []
