  - date: "2026-02-03"
    title: "AMD reports Q4 and full-year FY2025 results; guides Q1 FY2026 revenue ~$7.7B"
    category: other
    summary: >
      AMD reported Q4 FY2025 revenue of $10.27B (+69% YoY), operating income of $1.75B, and net income of
      $1.51B. Full-year FY2025 revenue was $34.64B. AMD guided Q1 FY2026 revenue at approximately $7.7B
      (±$300M), implying a sequential step-down from Q4 due to normal seasonality. CEO Lisa Su highlighted
      continued AI accelerator demand and the ramp of Instinct MI300X and MI325X products.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1276/amd-reports-fourth-quarter-and-full-year-2025-financial-results
        kind: ir_html
        description: "AMD Q4 & FY2025 earnings press release, Feb 3, 2026. Contains full income statement, balance sheet, cash flow, segment data, and Q1 FY2026 guidance."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000002488&type=10-K&dateb=&owner=include&count=10
        kind: sec_10k
        description: "AMD FY2025 Annual Report (10-K) filed 2026-02-04; accession 0000002488-26-000018. Full audited financials."
        retrieved_at: "2026-03-29"

  - date: "2026-01-07"
    title: "AMD announces Instinct MI350 production ramp and MI400 roadmap at CES 2026"
    category: product
    summary: >
      At CES 2026, AMD CEO Lisa Su confirmed that the Instinct MI350 (CDNA 4, TSMC N3) is in customer
      sampling and on track for production ramp in H1 2026. AMD previewed the MI400 series (CDNA 5, HBM4)
      as the following generation, targeting 2027. AMD also announced software improvements in ROCm 7.0,
      including expanded PyTorch 2.x integration and a new FP6 sparse attention kernel for inference.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1279/amd-advances-ai-leadership-ces-2026
        kind: ir_html
        description: "AMD CES 2026 press release (Jan 7, 2026) announcing MI350 production timeline, MI400 roadmap preview, and ROCm 7.0 software updates."
        retrieved_at: "2026-03-29"

  - date: "2025-11-04"
    title: "AMD reports Q3 FY2025 results; revenue $9.25B (+69% YoY), Data Center $7.1B"
    category: other
    summary: >
      AMD Q3 FY2025 revenue of $9.25B exceeded consensus estimates. Data Center segment revenue was
      approximately $7.1B, with Instinct GPU revenue growing strongly. Client revenue was $2.2B and Gaming
      revenue was $462M (declining). AMD noted that it received export licenses for MI308 GPU products to
      China following U.S. government review, and recognized some MI308 revenue in Q3. Non-GAAP EPS was $1.14.
      AMD guided Q4 FY2025 revenue at approximately $10.5B (±$300M).
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1265/amd-reports-third-quarter-2025-financial-results
        kind: ir_html
        description: "AMD Q3 FY2025 earnings press release, Nov 4, 2025."
        retrieved_at: "2026-03-29"

  - date: "2025-11-04"
    title: "AMD announces Instinct MI350 sampling milestone and CDNA 4 specifications"
    category: product
    summary: >
      At the Q3 FY2025 earnings call and accompanying Technology Day event, AMD disclosed final CDNA 4
      (MI350) specifications: 288 GB HBM3e, ~8 TB/s bandwidth, TSMC N3 process, and approximately 4× FP8
      TFLOPS improvement over CDNA 3 (MI300X). AMD stated that MI350 customer sampling began in Q3 2025,
      with volume production targeted for Q1 2026. The announcement includes the MI355X, a CDNA 4 refresh
      variant expected in H2 2026.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1265/amd-reports-third-quarter-2025-financial-results
        kind: ir_html
        description: "AMD Q3 FY2025 earnings press release and Technology Day disclosures, Nov 4, 2025."
        retrieved_at: "2026-03-29"

  - date: "2025-10-11"
    title: "AMD completes divestiture of ZT Systems manufacturing business to Sanmina"
    category: restructuring
    summary: >
      AMD announced the completion of the sale of ZT Systems' manufacturing operations to Sanmina Corporation.
      AMD acquired ZT Systems in February 2025 for approximately $4.9B (cash + stock), immediately announcing
      the intent to divest the manufacturing segment and retain ZT Systems' AI server design and integration
      team. The Sanmina divestiture was valued at approximately $0.65B. This transaction completes AMD's
      transition of ZT Systems from a full acquisition to a software/IP/engineering asset.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1261/amd-completes-sale-of-zt-systems-manufacturing-business
        kind: ir_html
        description: "AMD press release announcing completion of ZT Systems manufacturing sale to Sanmina, Oct 11, 2025."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000002488&type=8-K&dateb=&owner=include&count=20
        kind: sec_8k
        description: "AMD 8-K filed Oct 2025 disclosing material completion of Sanmina divestiture."
        retrieved_at: "2026-03-29"

  - date: "2025-08-05"
    title: "AMD reports Q2 FY2025 results; revenue $7.69B despite ~$800M MI308 export-control charge"
    category: other
    summary: >
      AMD Q2 FY2025 revenue of $7.69B included an ~$800M inventory and related charge from U.S. Department
      of Commerce export control restrictions imposed on AMD's Instinct MI308 GPU product for China. Excluding
      this charge, AMD's non-GAAP gross margin would have been approximately 54%. GAAP gross margin was 40%.
      AMD filed license applications for MI308 exports and expected resolution in subsequent quarters. Net
      income was $872M, including a $104M benefit from discontinued ZT Systems operations and an $853M income
      tax benefit from release of an IRS tax reserve.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1257/amd-reports-second-quarter-2025-financial-results
        kind: ir_html
        description: "AMD Q2 FY2025 earnings press release, Aug 5, 2025."
        retrieved_at: "2026-03-29"

  - date: "2025-06-04"
    title: "AMD announces $2.44B senior notes offering; uses proceeds to retire 2024-due notes"
    category: debt
    summary: >
      AMD priced an offering of senior notes consisting of multiple tranches totaling approximately $2.44B
      in aggregate principal. Proceeds were used in part to redeem outstanding 2024-maturity senior notes
      ($950M) and for general corporate purposes. The new notes comprise 2030-maturity and 2032-maturity
      tranches, extending AMD's debt maturity profile at rates reflecting the prevailing credit environment.
      AMD's long-term debt balance increased from $1.72B (Q1 FY2025) to $3.22B (Q2 FY2025) as a result.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1252/amd-prices-offering-of-senior-notes
        kind: ir_html
        description: "AMD press release announcing senior notes pricing, Jun 2025."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000002488&type=8-K&dateb=&owner=include&count=20
        kind: sec_8k
        description: "AMD 8-K filings related to the notes offering and concurrent debt retirement."
        retrieved_at: "2026-03-29"

  - date: "2025-02-14"
    title: "AMD completes $4.9B acquisition of ZT Systems"
    category: deal
    summary: >
      AMD completed its previously announced acquisition of ZT Systems, a U.S.-based provider of AI
      infrastructure servers and rack-scale solutions, for total consideration of approximately $4.9B
      (cash and stock). AMD simultaneously announced its intent to divest ZT Systems' manufacturing
      operations to a third party while retaining the design, integration, and software engineering
      capabilities. The acquisition was aimed at expanding AMD's AI server go-to-market reach and
      system-integration capabilities for Instinct-based clusters.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1238/amd-completes-acquisition-of-zt-systems
        kind: ir_html
        description: "AMD press release announcing completion of ZT Systems acquisition, Feb 14, 2025."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000002488&type=8-K&dateb=&owner=include&count=20
        kind: sec_8k
        description: "AMD 8-K filed Feb 2025 for material definitive agreement and acquisition completion."
        retrieved_at: "2026-03-29"

  - date: "2025-05-06"
    title: "AMD reports Q1 FY2025 results; revenue $7.44B, Data Center GPU revenue growth continues"
    category: other
    summary: >
      AMD Q1 FY2025 revenue of $7.44B (+36% YoY). Data Center segment revenue was approximately $5.8B.
      AMD noted strong Instinct MI300X demand and growing MI325X adoption. Non-GAAP operating income was
      $2.04B (27% margin). AMD guided Q2 FY2025 revenue at approximately $7.4B (±$300M).
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1245/amd-reports-first-quarter-2025-financial-results
        kind: ir_html
        description: "AMD Q1 FY2025 earnings press release, May 6, 2025."
        retrieved_at: "2026-03-29"

  - date: "2025-01-28"
    title: "AMD reports Q4 FY2024 and full-year results; FY2024 revenue $25.8B, Data Center $12.7B"
    category: other
    summary: >
      AMD Q4 FY2024 revenue of $7.66B, with full-year FY2024 revenue of $25.79B. Data Center segment
      full-year revenue was $12.66B, representing 128% YoY growth driven by Instinct MI300X adoption.
      AMD entered FY2025 with record Instinct backlog and guided Q1 FY2025 revenue at $7.3B (±$300M).
      CEO Lisa Su noted that Instinct revenue in FY2024 exceeded $5B, ahead of the prior $3.5B estimate.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1231/amd-reports-fourth-quarter-and-full-year-2024-financial-results
        kind: ir_html
        description: "AMD Q4 FY2024 and FY2024 full-year earnings press release, Jan 28, 2025."
        retrieved_at: "2026-03-29"

  - date: "2024-11-12"
    title: "El Capitan supercomputer (LLNL) officially inaugurated as world's fastest at 1.742 exaflops"
    category: customer
    summary: >
      The El Capitan supercomputer at Lawrence Livermore National Laboratory (LLNL), powered by AMD EPYC
      9004 (Genoa) CPUs and Instinct MI300A APU accelerators, was officially inaugurated and ranked #1 on
      the TOP500 list with 1.742 exaflops HPL performance. El Capitan represents the world's first exascale
      system using AMD hardware exclusively and is a significant validation of AMD's Instinct platform for
      the most demanding HPC workloads. Contract value not disclosed; system cost estimated at ~$600M.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1228/amd-powers-el-capitan-worlds-fastest-supercomputer
        kind: ir_html
        description: "AMD press release on El Capitan inauguration, Nov 12, 2024."
        retrieved_at: "2026-03-29"
      - url: https://www.top500.org/news/llnl-launches-el-capitan-the-worlds-most-powerful-supercomputer/
        kind: company_web
        description: "TOP500 official press release for El Capitan #1 ranking, Nov 2024."
        retrieved_at: "2026-03-29"

  - date: "2024-10-10"
    title: "AMD launches Instinct MI325X with 256 GB HBM3e memory"
    category: product
    summary: >
      AMD announced general availability of the Instinct MI325X, the CDNA 3 refresh GPU featuring 256 GB
      HBM3e memory (vs. 192 GB HBM3 on MI300X), 6.0 TB/s bandwidth, and OAM compatibility with existing
      MI300X infrastructure. The MI325X is positioned as a drop-in upgrade for inference-optimized deployments.
      AMD noted it maintains the same 750W TDP and compute architecture as MI300X.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1225/amd-launches-instinct-mi325x
        kind: ir_html
        description: "AMD Instinct MI325X launch press release, Oct 10, 2024."
        retrieved_at: "2026-03-29"

  - date: "2024-08-19"
    title: "AMD announces definitive agreement to acquire ZT Systems for $4.9B"
    category: deal
    summary: >
      AMD announced a definitive agreement to acquire ZT Systems, a leading designer and builder of AI
      infrastructure for hyperscale cloud providers, for approximately $4.9B in cash and stock. AMD said it
      plans to divest ZT Systems' manufacturing segment to a third party after closing. The transaction was
      expected to close in the first half of 2025 and was subject to regulatory approval. ZT Systems brings
      AI server system-integration expertise and deep hyperscaler customer relationships.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1213/amd-to-acquire-zt-systems
        kind: ir_html
        description: "AMD definitive agreement to acquire ZT Systems press release, Aug 19, 2024."
        retrieved_at: "2026-03-29"
      - url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000002488&type=8-K&dateb=&owner=include&count=20
        kind: sec_8k
        description: "AMD 8-K disclosing definitive merger agreement for ZT Systems."
        retrieved_at: "2026-03-29"

  - date: "2024-06-03"
    title: "AMD announces Instinct MI350 (CDNA 4) and MI400 (CDNA 5) roadmap at Computex 2024"
    category: product
    summary: >
      At Computex 2024, AMD CEO Lisa Su revealed the AMD Instinct roadmap through 2026: MI350 (CDNA 4) on
      TSMC N3 targeting >4× performance improvement over MI300X; and MI400 (CDNA 5) with HBM4, targeting
      2027. AMD also previewed EPYC Turin (5th Gen, Zen 5) for H2 2024 with up to 192 cores and DDR5-6400.
      This was the first public confirmation of TSMC N3 for CDNA 4 and the explicit multi-year GPU roadmap
      with annual cadence commitment.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1196/amd-unveils-next-generation-ai-accelerator-and-cpu-roadmap
        kind: ir_html
        description: "AMD Computex 2024 press release announcing MI350 and MI400 GPU roadmap and EPYC Turin timeline, Jun 3, 2024."
        retrieved_at: "2026-03-29"
