  - url: "Derived: Amortization burn-off analysis"
    kind: derived
    description: "Derived: Acquisition amortization FY2025 = Q1 $567M + Q2 $568M + Q3 $562M + Q4 $557M = $2,254M annualized. Remaining intangibles 12/27/2025 = $16,705M. Linear burn-off: 7.4 years. At 3%/year declining balance: FY2026 amortization ~$2,186M (GAAP tailwind: $68M vs. FY2025). At 8%/year: FY2027 ~$1,907M (tailwind: $347M annualized)."
    retrieved_at: "2026-03-29"
  - url: "Derived: Instinct GPU revenue estimate"
    kind: derived
    description: "Derived: EPYC revenue estimate = 24% (IDC x86 server share) × $25B server CPU market × 1.05 ASP premium = ~$6.3B. Instinct GPU revenue estimate = $26.7B Data Center FY2025 - $6.3B EPYC = ~$20.4B. ASSUMPTION: IDC share estimate (Tier 2) and no other material Data Center revenue. This is an estimate, not a disclosed figure."
