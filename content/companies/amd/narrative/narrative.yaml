  - url: "Derived: FY2025 free cash flow"
    kind: derived
    description: "Derived: FCF = OCF ($7,709M, XBRL) - CapEx ($974M, XBRL) = $6,735M. FCF margin = $6,735M / $34,639M = 19.4%. Working capital change = OCF - Net Income - Acq. Amort. - Operational D&A - SBC = $7,709M - $4,335M - $2,254M - $751M - $1,638M = -$1,269M."
