central_questions:
  - >
    AMD has closed the hardware gap with NVIDIA on memory capacity and, with MI350,
    will close most of the compute gap — so why does the market treat AMD as a structural
    #2 rather than a genuine co-leader in AI chips? The answer is ROCm, and the real
    question is whether ROCm can mature fast enough to convert inference traction into
    training wins before NVIDIA's Blackwell generation erases AMD's memory advantage.
  - >
    AMD's GAAP operating margin (10.7% in FY2025) looks thin against a 22% non-GAAP figure,
    but neither number captures the most important forward dynamic: Xilinx acquisition
    amortization is burning off mechanically, creating a guaranteed GAAP earnings expansion
    that the market has not fully priced.

sections:

  - id: business_model_and_stage
    title: "What AMD actually is and why its financials look the way they do"
    body: >
      AMD is a fabless chip designer — it owns the architecture, IP, and brand but
      outsources all manufacturing to TSMC. This single fact explains most of what looks
      unusual about AMD's financials versus Intel (which owns its fabs) and mostly explains
      the similarity to NVIDIA. A fabless model means: (1) no capex on fabrication;
      (2) wafer costs flow entirely through COGS as variable operating costs; (3) the primary
      capital deployed is in R&D (architectural design, software) and acquired intangibles;
      (4) operating leverage comes from spreading R&D + SGA fixed costs over more revenue
      rather than from capacity utilization of owned physical assets.

      In FY2025, AMD was a mature growth company mid-product-cycle, executing a rare
      dual inflection: Instinct GPU revenue growing explosively from a meaningful base,
      while EPYC CPU sustained steady market share gains. The company is not in a "build
      it and they will come" phase — it has $34.6B in annual revenue and $6.7B in
      annual free cash flow. The financial story is about whether AMD can sustain its
      trajectory from a strong incumbency position against a near-monopolist competitor
      with structural software advantages.

      AMD's balance sheet carries $16.7B in remaining acquired intangible assets (primarily
      Xilinx), which generates $2.25B/year in non-cash amortization. This is the single
      most important accounting artifact in AMD's financials: it suppresses GAAP operating
      margin from ~17% (cash-adjusted GAAP) to 10.7% (as-reported GAAP), and from ~22%
      (non-GAAP) to 10.7% depending on the starting point. This amortization is economically
      real — AMD paid $35B for Xilinx and the cost was real — but it is a fixed, declining
      non-cash charge, not a recurring operational burden. Understanding this matters for
      forward earnings modeling.

  - id: cost_structure_and_profitability
    title: "Cost structure: what the ratios say and why the business model changes the reading"
    body: >
      **Derived cost structure analysis (FY2025, all figures from AMD filings):**

      Total FY2025 revenue: $34,639M
      Total GAAP operating costs (COGS + all opex including acq. amortization): $30,945M
      All-in GAAP operating cost ratio: $30,945 / $34,639 = 89.3%
      GAAP operating margin: $3,694 / $34,639 = 10.7%

      Quarterly trend:
        Q1 FY2025: cost ratio = ($7,438 - $806) / $7,438 = 89.2% (margin 10.8%)
        Q2 FY2025: cost ratio = ($7,685 + $134) / $7,685 = 101.7% (margin -1.7%; MI308 charge)
        Q3 FY2025: cost ratio = ($9,246 - $1,270) / $9,246 = 86.3% (margin 13.7%)
        Q4 FY2025: cost ratio = ($10,270 - $1,752) / $10,270 = 82.9% (margin 17.1%)

      The trend is the story. Excluding Q2's $800M one-time MI308 inventory write-down, the GAAP
      operating margin expanded from 10.8% in Q1 to 17.1% in Q4. This is rapid operating leverage
      in a business where the major cost components are: (1) fixed acquisition amortization
      ($557-568M/quarter, declining slowly), (2) R&D ($1.7B → $2.3B/quarter, growing), and
      (3) COGS (variable, but AMD is fabless so COGS scales with revenue at roughly the same
      gross margin).

      Non-cash items as a share of FY2025 revenue:
        Acquisition amortization: $2,254M / $34,639 = 6.5% of revenue
        Stock-based compensation: $1,638M / $34,639 = 4.7% of revenue
        Total non-cash: $3,892M / $34,639 = 11.2%

      This 11.2% non-cash burden is why GAAP margin (10.7%) looks thin while non-GAAP margin
      (22%) looks healthy, and why neither number in isolation tells the full story. The honest
      middle ground is the cash-adjusted GAAP operating income: $3,694M + $2,254M acq. amort. =
      $5,948M = 17.2% cash-adjusted GAAP operating margin. Add back SBC ($1,638M) and the
      non-GAAP $7,768M / 22.4% is reached. Both non-cash items are real economic costs — SBC is
      compensation, amortization is repayment of acquisition capital — but only SBC recurs
      indefinitely. Amortization has a terminal date.

      **Business model context:** AMD's R&D intensity ($8,091M / $34,639M = 23.4% of revenue)
      is the structural feature that makes AMD financially different from NVIDIA. AMD must
      simultaneously develop four major product families: (a) Instinct GPU (CDNA architecture),
      (b) EPYC CPU (Zen architecture), (c) Radeon client GPU (RDNA architecture), and
      (d) Xilinx FPGA/embedded (Versal architecture). NVIDIA funds one core product
      architecture (GPU/CUDA) and one software platform. AMD's R&D is spread across architectures
      that do not share silicon. This is structurally less efficient — but it is also AMD's
      competitive positioning strategy, not financial mismanagement. The question is whether
      four architecture teams generate four times the revenue opportunity, which AMD's
      FY2025 trajectory partially affirms.

  - id: fabless_fcf_decomposition
    title: "Free cash flow: the strongest number AMD doesn't lead with"
    body: >
      **Derived FY2025 free cash flow decomposition:**

      Operating cash flow (FY2025): $7,709M (disclosed: XBRL, full-year OCF)
      Capital expenditures (FY2025): $974M (disclosed: XBRL, full-year capex)
      Free cash flow (FY2025): $7,709M - $974M = $6,735M
      FCF margin: $6,735M / $34,639M = 19.4%

      OCF components (derived):
        Net income: $4,335M
        Add back acq. amortization: $2,254M (non-cash COGS + opex amort.)
        Add back operational D&A (CF reconciliation): ~$751M (sum of quarterly CF-schedule D&A)
        Add back stock-based compensation: $1,638M
        Working capital change: OCF minus above = $7,709M - ($4,335 + $2,254 + $751 + $1,638)
          = $7,709M - $8,978M = -$1,269M (net working capital buildup; AR and inventory growth)

      The working capital build (-$1,269M) consumed FCF, driven by AMD's revenue ramp: more
      revenue meant higher accounts receivable and more inventory needed to support the
      MI300X/MI325X/EPYC supply chains. This is expected at AMD's growth rate (+52% revenue
      FY2024 → FY2025) and is not a quality concern.

      Capex intensity: $974M / $34,639M = 2.8% of revenue

      AMD's 2.8% capex intensity is the defining characteristic of the fabless model. Compare
      to Intel (integrated device manufacturer): Intel FY2025 capex ~$20B on ~$53B revenue =
      38% capex intensity. Intel pays to build and maintain fabs; AMD pays TSMC and books those
      costs through COGS. Raw capex comparisons between AMD and Intel are meaningless — the same
      economic function (manufacturing capability) appears in completely different line items
      in their respective P&Ls. When analysts worry that AMD's "capex is too low to compete
      in AI," they are applying an infrastructure-layer mental model to a chips-layer business.
      AMD's competitive spending is R&D and TSMC wafer contracts, not capex.

      NVIDIA comparison (fabless peer, adjusted for business model similarity): NVIDIA FY2026
      capex estimated at ~2-3% of revenue — structurally identical to AMD. The comparison that
      matters for AMD's financial quality is NVIDIA, not Intel. On that comparison, AMD generates
      a comparable FCF margin to NVIDIA at a much smaller scale, which confirms the fabless model
      is working.

  - id: capital_structure
    title: "Capital structure: AMD is in a fortress net-cash position that the market underweights"
    body: >
      **Derived capital structure at December 27, 2025:**

      Cash + short-term investments: $5,539M + $5,013M = $10,552M liquid assets
      Total debt: current $874M + long-term $2,348M = $3,222M
      Net cash: $10,552M - $3,222M = $7,330M
      Net cash / FY2025 revenue: $7,330M / $34,639M = 21.2%

      Debt maturity: $874M current portion (due within 12 months as of Dec 2025) and
      $2,348M long-term (2030 and 2032 maturities). No meaningful near-term maturity cliff.

      FY2025 total interest expense: Q1 $20M + Q2 $38M + Q3 $37M + Q4 $36M = $131M
      Interest burden: $131M / $34,639M revenue = 0.4% of revenue — economically trivial.
      Interest coverage: GAAP operating income $3,694M / $131M = 28.2× — extremely conservative.

      In Q2 FY2025, AMD issued $2,441M in new senior notes (2030 and 2032 maturities) and
      retired $950M in 2024-maturing notes. The net issuance increased leverage by ~$1.5B but
      extended the maturity profile substantially. At $10.6B liquid assets vs. $3.2B debt,
      AMD could retire its entire debt balance tomorrow and still hold $7.3B in cash — three
      quarters of operating expenses covered.

      This fortress balance sheet is not a financial accident; it is a strategic asset. AMD has
      no financing risk, can absorb supply chain disruptions (like the Q2 FY2025 MI308 charge)
      without distress, and can fund both TSMC N3 supply agreements and ZT Systems integration
      costs without equity dilution. The capital structure debate for AMD is not "can AMD survive"
      but "what will AMD do with $7B+ in net cash that is generating negligible yield?"

  - id: gaap_earnings_mechanically_improving
    title: "The amortization cliff: a guaranteed GAAP earnings expansion the market is not fully pricing"
    body: >
      This is the most important financial asymmetry in AMD's story, and it requires math to see.

      AMD's acquisition-related intangibles at December 27, 2025: $16,705M (primarily Xilinx,
      acquired in Feb 2022 for $35B; also AMD's smaller prior acquisitions). The quarterly
      amortization rate in FY2025: approximately $557-568M/quarter = ~$2,254M annualized.

      At $2,254M/year and $16,705M remaining, the simple linear burn-off would take 7.4 years
      from end-FY2025 (i.e., through 2033). But acquired intangible amortization is not linear —
      it is accelerated on a useful-life schedule that front-loads the charge. The declining
      balance is visible: Q4 FY2025 amortization ($557M) is lower than Q1 FY2025 ($567M),
      showing the mechanical annual step-down.

      If amortization declines at ~3% per year (consistent with useful-life methods), the
      FY2026 amortization run rate would be ~$2,186M vs. FY2025's $2,254M — a $68M GAAP
      operating income tailwind. If the step-down accelerates to 8%/year (aggressive), FY2027
      amortization would be ~$1,907M vs. FY2025's $2,254M — a $347M annualized GAAP tailwind
      from amortization alone.

      Stated differently: if AMD's revenue grows to $40B in FY2026 (consensus range) and the
      gross/operating margin structure stays identical, the GAAP operating margin would improve
      by 0.2–1.0 percentage points purely from the mechanical decline in amortization. By FY2028,
      the accumulated amortization savings could be $700M–$1,400M/year — adding 2–4 percentage
      points to GAAP operating margin with zero operational improvement required.

      The market is aware of amortization as a "non-GAAP adjustment" but does not rigorously
      model its forward glide path. Consensus AMD GAAP EPS estimates for FY2026 typically
      apply a rough GAAP/non-GAAP ratio rather than modeling the specific amortization schedule.
      This creates a systematic bias: GAAP EPS beats become more likely as the amortization
      burden declines each year, and the market typically re-rates on GAAP improvement even when
      the non-GAAP story is unchanged.

  - id: rd_efficiency_and_multi_architecture_burden
    title: "R&D efficiency: the true cost of AMD's multi-architecture strategy"
    body: >
      AMD's FY2025 R&D expense: $8,091M (23.4% of revenue).
      NVIDIA FY2026 R&D (estimated): ~$9.7B on ~$130B revenue = 7.5% of revenue.
      Revenue per R&D dollar: AMD $4.28 vs. NVIDIA ~$13.40.

      AMD is 3.1× less R&D-efficient per revenue dollar than NVIDIA. This gap is structural,
      not operational — it is the cost of AMD's multi-architecture strategy. AMD maintains
      five concurrent CPU/GPU architecture teams: Zen (EPYC CPU), RDNA (Radeon consumer GPU),
      CDNA (Instinct data-center GPU), Versal/Ryzen Embedded (Xilinx-derived FPGAs and
      embedded processors), and XDNA (AMD's AI PC NPU, launched with Ryzen AI series). NVIDIA
      primarily invests in one compute architecture (CUDA GPU) plus software.

      This is not inefficiency — it is strategic breadth. EPYC R&D ($1-2B/year estimated;
      not separately disclosed) produced the architecture that took x86 server market share from
      Intel at a pace Intel has not reversed. Instinct R&D produced the MI300X that won Microsoft
      Azure and Meta deployments against fierce NVIDIA incumbency. The multi-architecture
      investment is paying off across multiple revenue lines.

      The risk is concentration of R&D upside in Instinct. If Instinct GPU wins are the majority
      of Data Center revenue growth ($26.7B FY2025), then the $8B R&D base is largely being
      "credited" by the Instinct product line, with EPYC, Radeon, and Embedded as subsidized
      beneficiaries. If Instinct momentum stalls, AMD's R&D base becomes a heavier burden per
      dollar of GPU revenue — unlike NVIDIA, which has the luxury of a near-monopoly R&D
      efficiency ratio. The question for AMD's long-term thesis is whether multi-architecture
      breadth creates a durable advantage (diverse revenue streams, customer lock-in at the
      platform level) or is simply the cost of a company that has not yet won decisively in any
      single architecture.

  - id: inventory_risk_and_MI350_transition
    title: "Inventory: elevated and rising into the CDNA 4 transition — an underappreciated risk"
    body: >
      AMD's balance sheet inventory at September 27, 2025 (Q3 end): $7,313M.
      AMD's balance sheet inventory at December 27, 2025 (Q4 end): $7,920M.
      Inventory growth Q3→Q4: +$607M, even after Q2's $800M MI308 charge had been resolved.

      Inventory / FY2025 annual revenue: $7,920M / $34,639M = 22.9% of annual revenue.
      Inventory / Q4 FY2025 COGS (excl. amort.): $7,920M / $4,433M = 1.79× quarterly COGS
      = ~5.4 months of forward COGS coverage.

      For context: AMD is fabless and must maintain 3-6 months of inventory given TSMC's
      lead times. $7.9B of inventory building in Q4 is consistent with AMD positioning for
      MI350 volume ramp (prepaying wafer costs, securing HBM3e allocation) while maintaining
      MI300X/MI325X safety stock for existing customer commitments.

      The risk is not that the current inventory level is wrong in isolation — it is the
      product transition sequencing. AMD guided Q1 FY2026 revenue at $7.7B (±$300M) against
      Q4 FY2025 revenue of $10.27B — a 25% sequential decline. That is an unusually large
      Q4-to-Q1 step-down. If the decline reflects MI300X/MI325X demand softening before
      MI350 reaches volume, AMD could be carrying 6-7 months of inventory against declining
      near-term COGS. The Q2 FY2025 MI308 charge ($800M) demonstrated that AMD does take
      inventory write-downs when product demand fails unexpectedly. A CDNA 3→CDNA 4 transition
      executed poorly could produce a smaller but real charge from stranded MI300X/MI325X
      inventory.

      This is a known risk in chip company product cycles — Intel has a 20-year history of
      inventory charges on product transitions — and it is mitigated by AMD's hyperscaler
      customers who typically buy in firm purchase orders, not spot. The scale of the Q1 FY2026
      guidance decline, however, warrants monitoring. If Q2 FY2026 inventory does not decline
      materially, the CDNA 3→4 transition is taking longer than management implied.

  - id: competitive_moat_and_memory_window
    title: "AMD's memory moat: real, but time-bounded — the window is 2025–2027"
    body: >
      AMD's dominant competitive advantage in AI inference is structural and derivable from
      the specifications: the MI300X carries 192 GB HBM3 per GPU; the H100 carries 80 GB HBM3;
      the H200 carries 141 GB HBM3e. The MI325X extends this to 256 GB HBM3e — exceeding H200
      by 81% on memory capacity and MI300X by 33% on bandwidth (6.0 vs. 5.3 TB/s).

      Why this matters economically: serving a Llama-3-70B model in FP16 requires approximately
      140 GB of GPU memory. On H100 (80 GB), this requires 2 GPUs in tensor-parallel configuration.
      On MI300X (192 GB), it runs on a single GPU. The cost delta is not just the GPU count —
      it is the networking, the power, the system complexity, and the software overhead of
      parallel serving. For a hyperscaler running millions of inference requests/day, reducing
      from 2 H100s to 1 MI300X per deployment unit cuts infrastructure cost and latency.
      Azure's deployment of ND MI300X v5 for Copilot AI inference is economically motivated,
      not a charitable purchase from a competitor.

      **The window:** NVIDIA's B200 ships with 192 GB HBM3e (equal to MI300X). The B300/B300 Ultra
      is targeting 288 GB HBM3e (equal to MI350's specification). By H2 2026-H1 2027, the memory
      capacity advantage disappears. AMD's moat is real but has a defined expiration: the 2–3
      year window between MI300X launch (Dec 2023) and B300 volume availability (~mid-2026).

      AMD's strategic imperative is to convert the memory window into durable advantages that
      survive B300: hyperscaler software investments in ROCm, long-term supply agreements,
      design wins in next-generation AI clusters that create switching cost. The evidence that
      this conversion is happening: Meta's investment in ROCm engineering (public blog posts,
      GitHub contributions), Oracle's OCI MI300X/MI325X deployments, and AMD's ZT Systems
      acquisition to strengthen hyperscaler direct relationships. Whether these investments
      produce durable switching costs before B300 ships at volume is the central open question.

  - id: GAAP_non_GAAP_reconciliation_and_segment_opacity
    title: "What AMD doesn't show you — and what that costs the analysis"
    body: >
      AMD reports four segments: Data Center, Client, Gaming, and Embedded. FY2025 Data Center
      revenue is approximately $26.7B (derived from quarterly press release segment tables;
      ~77% of total $34.6B revenue). AMD does NOT break out Instinct GPU revenue vs. EPYC CPU
      revenue within Data Center. This is the most important undisclosed AMD metric.

      **Original derived estimate of GPU/CPU split:**
      AMD EPYC holds approximately 24% server CPU market share in a ~$25B annual server CPU
      market (IDC FY2025 estimate). Applying AMD's implied ASP premium (~5%), estimated EPYC
      annual revenue ≈ 24% × $25B × 1.05 = $6.3B. If this estimate is approximately correct,
      Instinct GPU revenue ≈ $26.7B Data Center - $6.3B EPYC CPU = ~$20.4B in FY2025
      (assumptions: IDC share estimate, no other Data Center revenue).

      This derived $20.4B Instinct GPU figure implies AMD's GPU business is larger relative to
      CPU than most sell-side models assume — creating higher GPU-specific customer concentration
      risk than the blended Data Center figure implies.

      The absence of a GPU/CPU revenue split creates compounding analytical problems:
      - Cannot compute AMD's Instinct GPU ASP trend (AMD doesn't disclose unit volumes either)
      - Cannot assess whether Data Center growth is driven by GPU volume, GPU ASP, or CPU market share
      - Cannot benchmark AMD Instinct gross margin vs. NVIDIA Data Center gross margin

      Compare to NVIDIA's disclosures: NVIDIA provides quarterly Data Center GPU product revenue
      separately from "other" Data Center (networking, etc.). NVIDIA also discloses geographic
      revenue by segment. AMD's disclosure is several steps behind its primary competitor, and
      the gap is strategically motivated — AMD benefits from not quantifying its GPU concentration
      risk to hyperscalers.

  - id: thesis_destruction_test
    title: "Stress testing the bull case and bear case with the actual numbers"
    body: >
      **Bull case stress test:**
      Thesis: "AMD Data Center revenue grows to $40B in FY2026, sustaining the FY2025 growth
      trajectory, as MI350 ramps."

      Critical assumption: MI350 volume production begins in H1 2026 and hyperscalers place
      meaningful orders by Q3 FY2026.

      Math test: AMD guided Q1 FY2026 total revenue at $7.7B (±$300M). Assuming Data Center
      remains ~77% of total (conservative; likely higher in Q1 given Gaming/Client seasonality),
      Q1 FY2026 Data Center ≈ $5.9B. To reach $40B in Data Center for FY2026:
        Required remaining 3 quarters: $40B - $5.9B = $34.1B → $11.4B/quarter average
      That would be a 63% increase over Q4 FY2025's implied ~$7.0B Data Center quarterly run
      rate (derived: $26.7B FY2025 Data Center / 4 quarters) — in just 6–9 months.

      Falsifier condition: if Q3 FY2026 Data Center revenue is below $9B, the $40B FY2026
      estimate requires a Q4 FY2026 Data Center number exceeding $15B — more than double
      the FY2025 average quarterly run rate. That would be unprecedented even for AMD's
      extraordinary FY2025 ramp. The $40B FY2026 consensus likely requires assuming that
      the Q1 FY2026 step-down is a one-quarter trough and MI350 contributes meaningfully
      by Q2–Q3.

      The bull case is achievable — but it is back-end loaded and dependent on a supply chain
      execution (TSMC N3 CoWoS allocation, HBM3e supply) that AMD has not fully derrisked.

      **Bear case stress test:**
      Thesis: "ROCm's software gap prevents AMD from winning training workloads; AMD's GPU
      business plateaus at its current inference-heavy mix."

      This bear case fails to account for inference being the faster-growing AI workload segment.
      In FY2025, AI inference spending grew at least as fast as training spending as hyperscalers
      deployed models to production. AMD did not need training wins to grow Data Center revenue
      110% in FY2025. If inference remains the primary hyperscaler GPU deployment vector for
      2026–2027, AMD can sustain meaningful growth even with zero training wins.

      The bear case requires three simultaneous adverse outcomes: (1) NVIDIA B200/B300 erases
      the memory capacity advantage and inference customers migrate back to NVIDIA for
      cost-efficiency, AND (2) AMD does not win incremental training workloads to offset, AND
      (3) hyperscalers allocate more spend to custom ASICs (Google TPU, Microsoft Maia, Meta MTIA)
      that reduces total GPU spend. All three simultaneously is possible but not high-probability.
      The bear case is weakest at its ROCm premise — it needs ROCm to never improve, when the
      observable trajectory (ROCm 6.x, FlashAttention-2 parity, vLLM support, Meta ROCm
      investment) is one of steady maturation.

  - id: conclusion
    title: "How to read AMD in early 2026"
    body: >
      AMD is executing its strategy as a company in this position should execute, and the
      numbers confirm it. FY2025 free cash flow of $6.7B on $34.6B revenue (19.4% FCF margin),
      a fortress net-cash balance sheet ($7.3B net cash), and operating leverage expanding from
      10.8% GAAP operating margin (Q1) to 17.1% (Q4) even as the company absorbed an $800M
      one-time inventory charge in Q2 — this is what a well-run fabless chip company looks like
      when its product cycle is working. The market has recognized this, but AMD's discount to
      NVIDIA (AMD ~15× EV/2026E revenue vs. NVIDIA ~20-25×) reflects genuine uncertainty, not
      market blindness.

      What AMD is genuinely doing well: The memory capacity moat in Instinct GPUs (192–256 GB
      vs. H100/H200's 80–141 GB) has proven to be a real, economically significant advantage
      for large-model inference deployments, evidenced by Azure ND MI300X v5 GA, Meta's
      investment in ROCm engineering, and Oracle OCI MI300X availability. EPYC CPU continues
      to take Intel server CPU share on merits (192-core Turin vs. Intel's 128-core Granite Rapids;
      DDR5-6400 bandwidth vs. Intel's DDR5-4800). AMD's FCF generation and capital discipline
      are exemplary for a company fighting a near-monopolist competitor.

      Where the genuine risks lie (not just the cost of execution): First, the CDNA 3→CDNA 4
      transition inventory risk is real — $7.9B of inventory building into a 25% Q1 revenue
      decline is a combination that warrants watching closely. Second, AMD's GPU revenue
      concentration in 2-4 hyperscale customers (unquantified but structurally inferred from
      the business) creates a lumpiness and cliff risk that the blended Data Center revenue
      number obscures. Third, NVIDIA's B200 and B300 are closing the memory gap on specifications
      by mid-2026, and if AMD cannot convert its 2023–2025 memory moat into durable customer
      switching costs (via ROCm investment, long-term contracts, design integration), the
      competitive differentiation narrows to cost and availability — where AMD has less
      advantage.

      Where the consensus appears off: Two asymmetries stand out from the derived analysis.
      First, the mechanical improvement in GAAP operating income from Xilinx amortization
      burn-off is underpriced by a market focused on non-GAAP metrics. The $2.25B annual
      amortization charge declining at 3-8%/year creates a guaranteed GAAP earnings tailwind
      that becomes visible as a series of annual "beats" against models that roll GAAP at a
      static ratio. Second, AMD's Instinct GPU revenue is likely larger (estimated ~$20.4B
      in FY2025 from derived EPYC market share math) than most sell-side models assume within
      the blended $26.7B Data Center figure — which simultaneously makes the growth story
      more impressive and the concentration risk more acute.

      What to watch for confirmation or denial: (1) Q2 FY2026 Data Center revenue — should
      be $7-8B+ if MI350 is ramping; below $6.5B would signal supply delay. (2) AMD 10-Q for
      any disclosure of GPU vs. CPU revenue within Data Center (unlikely but the most valuable
      potential disclosure). (3) First hyperscaler announcement of MI350 production deployment
      for training workloads (would be the most significant positive catalyst in 2026). (4)
      Inventory level at Q1 FY2026 end — should decline from $7.9B if CDNA 3 sell-through is
      proceeding; further increase would flag transition risk.

      What remains unknown: AMD does not disclose Instinct GPU unit volumes or ASPs; the
      GPU/CPU split within Data Center; customer concentration within Instinct revenue; TSMC
      supply agreement terms; or the specific timeline for Xilinx intangible amortization
      step-downs. Any forward model for AMD beyond one quarter carries meaningful uncertainty
      on all of these dimensions. The company's execution has earned benefit of the doubt —
      but the disclosure practices have not evolved to give analysts the building blocks they
      need to model the business with confidence.

disclosure_gaps:
  - AMD does not break out Instinct GPU revenue vs. EPYC CPU revenue within the Data Center segment.
    This is the most important undisclosed metric — it prevents computing GPU ASP trends,
    GPU-specific customer concentration, or Instinct gross margin vs. NVIDIA comparisons.
  - AMD does not disclose GPU unit volumes shipped or installed base, making TAM share
    calculations a derived estimate rather than a computable metric.
  - AMD does not disclose customer concentration within Data Center revenue beyond the
    10%+ threshold in the 10-K. Given the hyperscaler concentration likely present, this
    is a material disclosure gap.
  - Instinct GPU ASP trends are not disclosable; revenue/volume cannot be computed.
  - Balance sheet items for Q1 FY2025 (cash, current assets, total assets, total liabilities,
    PP&E) were not independently extracted from the 10-Q filing and remain null in
    financials/FY2025-Q1.yaml. See that file's source documentation.
  - Financing cash flow for Q1 and Q3 FY2025 was not independently derived; null in respective
    quarterly YAML files.

