  - url: "Derived: Capital structure at 2025-12-27"
    kind: derived
    description: "Derived: Net cash = (Cash $5,539M + Short-term investments $5,013M) - Total debt ($874M current + $2,348M LT) = $10,552M - $3,222M = $7,330M. Net cash / Revenue = 21.2%. Interest coverage = GAAP op income $3,694M / FY2025 interest expense $131M = 28.2×."
