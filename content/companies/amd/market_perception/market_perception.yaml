kind: market_perception
schema_version: 1
as_of: "2026-03-29"
company: amd
layer: chips

# ─── Consensus Narrative ────────────────────────────────────────────────────────

consensus_narrative:
  summary: >
    AMD is seen as the credible #2 AI chip company behind NVIDIA — a legitimate challenger
    with improving hardware, growing hyperscaler adoption, and strong EPYC CPU momentum. The
    dominant market narrative in Q1 2026 is that AMD's hardware has closed the gap with NVIDIA
    on specifications but still lags meaningfully on software ecosystem depth (ROCm vs. CUDA),
    and that the ROCm software gap — not silicon — is the primary barrier to share capture.
    FY2025's $34.6B revenue and explosive Data Center growth have converted skeptics who
    thought NVIDIA's moat was unassailable; MI300X's 192 GB memory pool has proven to be a
    durable competitive differentiator for large-model inference, a workload class that keeps
    growing. The bear case centers on execution risk in CDNA 4 (MI350) software readiness and
    AMD's structural disadvantage in hyperscaler CUDA training workloads.

  bull_thesis: >
    AMD's MI300X/MI325X have demonstrated that memory capacity (not just FLOPS) is the key
    axis for large-model inference, where AMD holds a structural lead (192–256 GB vs. H100/H200's
    80–141 GB). Hyperscalers (Microsoft Azure, Meta, Oracle) are deploying MI300X at scale
    specifically for inference cost reduction, driven by a $/token advantage of 15–40% vs. H100
    in large-batch scenarios (analyst estimates; Tier 2). EPYC continues to take server CPU share
    from Intel with 4th consecutive year of gains (AMD 24%+ x86 server share by Q4 2025 per IDC
    estimates). CDNA 4 (MI350) on TSMC N3 brings 4× FP8 compute improvement; if AMD can
    simultaneously ship ROCm improvements that close the training software gap, AMD could break
    into training workloads beyond the current inference-heavy mix. Valuation: at ~15× EV/2026E
    revenue (consensus ~$40B), AMD trades at a discount to NVIDIA's ~20–25×, implying the
    market does not fully credit a software catch-up scenario. CEO Lisa Su's track record of
    under-promising/over-delivering (EPYC turnaround, Xilinx integration) supports execution
    credibility.

  bear_thesis: >
    NVIDIA's competitive moat is not the H100 or B200 silicon — it is the 15-year CUDA ecosystem,
    developer tooling (Nsight, cuDNN, TensorRT), and the NVLink/NVSwitch fabric that enables
    GPU cluster-level coherent memory. AMD's ROCm remains one to two years behind in production
    reliability for custom kernels, a gap that hyperscalers absorb through engineering investment
    (Meta ROCm team) but that enterprise customers cannot replicate. AMD's FY2025 Data Center
    revenue growth was driven almost entirely by a handful of hyperscalers; customer concentration
    risk is high and not disclosed. CDNA 4 (MI350) was announced for H2 2025 production but is
    now ramping in H1 2026, meaning AMD ships one generation behind NVIDIA's Blackwell (B200/B300
    GA in H2 2025). The Embedded segment (acquired via Xilinx) recovered slowly from a severe
    inventory correction; $462M Gaming revenue in Q3 2025 shows AMD's consumer GPU business
    declining. AMD's non-GAAP operating margin (22% in FY2025) looks healthy but GAAP
    operating margin (11%) is heavily suppressed by Xilinx acquisition amortization ($2.2B+/year),
    masking the true capital cost of the Xilinx deal that funded the data center pivot.

  embedded_assumptions:
    - "AMD Data Center revenue grows to ~$40–45B in FY2026, implying continued MI300X+MI325X deployment ramp even before MI350 volume"
    - "ROCm 7.x (2025–2026) closes enough of the CUDA gap to enable AMD to win training workloads at 3–4 hyperscalers (vs. ~1.5 today)"
    - "TSMC N3 CoWoS allocation for MI350 is secured at volume by H1 2026 — HBM3e supply from Samsung/SK Hynix not a binding constraint"
    - "AMD EPYC server CPU share continues to grow (Intel's product roadmap remains delayed), contributing stable ~$4B/quarter CPU revenue"
    - "Instinct GPU ASPs stable to rising (not falling) as AMD sells into more complex multi-GPU rack configurations via ZT Systems design capability"

  narrative_shift: >
    The narrative shifted sharply from 2023 to 2025. In 2023, consensus was that MI300X would
    underperform vs. H100 on real workloads due to ROCm immaturity. By mid-2024, Azure and Meta
    deployments provided credible evidence of MI300X inference cost efficiency. By FY2025, AMD's
    Data Center revenue run-rate (~$28B annual) made the "AMD is just catching up" framing
    obsolete. The new debate is whether AMD can cross from being a memory-bandwidth inference play
    into a full-stack training competitor when MI350 ships. The market has stopped asking "can
    AMD compete at all?" and started asking "what share of training workloads can AMD realistically
    capture in 2026–2027?"

# ─── Key Debates ────────────────────────────────────────────────────────────────

key_debates:

  - id: debate_1
    question: "Will AMD's ROCm close the CUDA software gap enough to win significant training workloads by 2026–2027?"
    bull_case: >
      AMD has invested heavily in ROCm since 2023: ROCm 6.x brought PyTorch 2.x parity, native
      FlashAttention-2 ROCm support, and vLLM ROCm backend. Meta's public investment in ROCm
      for Llama-3 training was the most credible external validation that the gap was closable.
      AMD's R&D grew to ~$7.6B in FY2025 (TTM), a significant portion targeting software. The
      number of ROCm-supported frameworks tripled from 2022 to 2025 (AMD claim). If CDNA 4
      ships with a mature ROCm 7.x stack, the activation energy for hyperscalers to dual-source
      training clusters drops sharply.
    bear_case: >
      The CUDA ecosystem gap is not primarily about open-source framework support (PyTorch ROCm
      works) — it is about the long tail of custom CUDA kernels in production inference/training
      code, operator-specific optimizations in triton/cutlass, and the developer experience gap.
      SemiAnalysis has noted that NVIDIA's CUDA kernel quality advantage in transformer attention
      is 3–5× in execution time for non-standard sequence lengths; ROCm's triton-rocm cannot
      reproduce these optimizations without AMD-specific kernel rewrites. Enterprise customers
      (non-hyperscaler) have essentially no ROCm engineering capacity, limiting AMD's addressable
      market for training to the handful of hyperscalers willing to invest in ROCm.
    resolution_evidence: >
      Watch: (1) MI350 MLPerf Training v5.0 submission in closed division and time-to-train vs.
      NVIDIA Blackwell B200; (2) new hyperscaler training workload announcements (beyond Meta);
      (3) AMD's ROCm GitHub issue closure rate and PyPI download trends for rocm packages;
      (4) AMD management commentary on training mix in FY2026 earnings calls.
    current_lean: >
      INTERPRETATION: Weight of evidence leans bear for the 2026 timeframe but improving. ROCm
      gap is real and multi-year to close on training custom kernels. AMD is more likely to win
      inference-adjacent fine-tuning and mixed training/inference workloads than pure large-scale
      training for frontier models in 2026. Timeline for training parity extends to 2027–2028.
    sources:
      - url: https://semianalysis.com/2024/04/17/mi300x-vs-h100-vs-h200-inferencing-rag-benchmark/
        kind: specialist_analysis
        description: "Specialist analysis: SemiAnalysis MI300X vs. H100/H200 inference and ROCm ecosystem deep-dive (Apr 2024). Documents specific ROCm gaps in attention kernel performance and custom op support."
        retrieved_at: "2026-03-29"
      - url: https://ir.amd.com/news-events/press-releases/detail/1265/amd-reports-third-quarter-2025-financial-results
        kind: earnings_transcript
        description: "Earnings transcript: AMD Q3 FY2025 earnings call (Nov 4, 2025). Lisa Su commentary on ROCm investment and hyperscaler training wins."
        retrieved_at: "2026-03-29"

  - id: debate_2
    question: "Is AMD's ~$28B FY2025 Data Center revenue run-rate driven by 2–3 hyperscalers, creating a concentration cliff risk?"
    bull_case: >
      AMD's go-to-market via OEM server channel (Dell, HPE, Lenovo) and CSP deployments (Azure,
      OCI, GCP) suggests broader distribution than Instinct-only revenue implies. EPYC CPU revenue
      is genuinely diversified — thousands of enterprise customers. The ZT Systems acquisition
      expanded AMD's hyperscaler-direct design and integration footprint. AMD CEO noted in FY2025
      that they were seeing "broadening across a wide range of customers."
    bear_case: >
      AMD does not disclose customer concentration for Instinct GPU revenue. Given that Meta and
      Microsoft Azure are the two publicly identified large AMD GPU customers, and that hyperscaler
      GPU procurement is highly lumpy (multi-quarter megadeals), AMD's Instinct revenue is almost
      certainly concentrated in 3–5 customers. A 10-K analysis of AMD's $34.6B FY2025 revenue
      against its 10-K concentration risk disclosures shows that AMD disclosed that one customer
      represented >10% of revenue in FY2025 (per AMD 10-K risk factors). This is a structural
      cliff risk: if one hyperscaler pauses or redirects a portion of capex to custom ASICs
      (Google TPU, Microsoft Maia, Meta MTIA), AMD's Data Center revenue can decline 15–20% in
      one quarter without any competitive failure.
    resolution_evidence: >
      Watch: (1) AMD 10-K and 10-Q customer concentration disclosures (10% customer threshold);
      (2) hyperscaler earnings commentary on GPU diversity (Microsoft Azure, Meta, Oracle Q1-Q2
      2026 capex guidance and GPU sourcing comments); (3) new AMD customer announcements in
      non-hyperscaler segments (enterprise, sovereign AI, Tier-2 CSPs).
    current_lean: >
      INTERPRETATION: Bear case is better supported by available evidence. AMD's Instinct GPU
      revenue is almost certainly concentrated in <5 customers. This is a known but unquantified
      risk that the market prices imprecisely. The risk is real but partially mitigated by
      hyperscalers' stated desire to dual-source (reduce NVIDIA dependence), meaning AMD's
      concentration risk and diversification driver are the same phenomenon.
    sources:
      - url: https://www.sec.gov/Archives/edgar/data/2488/000000248826000018/
        kind: sec_10k
        description: "AMD FY2025 10-K (accession 0000002488-26-000018): customer concentration risk disclosures in risk factors and notes to financial statements."
        retrieved_at: "2026-03-29"

  - id: debate_3
    question: "Does AMD's 'memory capacity' moat erode when NVIDIA Blackwell B300 Ultra ships with higher HBM capacity?"
    bull_case: >
      Memory capacity differentiation is not just about GB count — it is about the memory
      architecture decision that drives total cost of ownership at scale. AMD's unified memory
      pool (192/256 GB per card, no NVLink memory aggregation overhead) enables simpler inference
      serving at large batch sizes. Even if NVIDIA ships higher per-card capacity, AMD maintains
      a software-stackable advantage: vLLM + ROCm can serve the same models with fewer GPUs
      in configurations hyperscalers have already deployed and validated.
    bear_case: >
      NVIDIA's Blackwell B200 (192 GB HBM3e) and B300/B300 Ultra (anticipated 288 GB HBM3e+)
      directly match and exceed AMD's MI300X/MI325X/MI350 memory specifications. Once NVIDIA
      closes the capacity gap, AMD's sole "structural" hardware advantage disappears, leaving
      only CUDA software superiority — which benefits NVIDIA. The memory moat was a CDNA 3
      window, not a durable architectural advantage. After B300, the playing field returns to
      software and supply chain execution where NVIDIA dominates.
    resolution_evidence: >
      Watch: (1) NVIDIA B300/B300 Ultra memory specifications at full product launch (confirmed
      HBM capacity per card); (2) AMD MI350 memory capacity relative to NVIDIA Blackwell next
      generation in side-by-side inference benchmark comparisons; (3) hyperscaler purchasing
      patterns in H2 2026 — continued MI350 procurement vs. migration back to NVIDIA for
      next-gen inference clusters.
    current_lean: >
      INTERPRETATION: The memory moat will erode to some degree when B300 ships at volume, but
      the bear case overstates the speed of erasure. NVIDIA's B200 (192 GB) is already spec-equal
      to MI300X; hyperscalers are still deploying MI325X/MI350, suggesting that memory alone
      was never the complete story — cost, supply, and software also matter. AMD's differentiation
      in 2026–2027 will depend on MI350 CDNA 4 compute + ROCm improvements, not purely memory.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1276/amd-reports-fourth-quarter-and-full-year-2025-financial-results
        kind: ir_html
        description: "AMD Q4 FY2025 press release; management commentary on MI325X/MI350 competitive differentiation vs. NVIDIA Blackwell."
        retrieved_at: "2026-03-29"
      - url: https://nvidianews.nvidia.com/news/nvidia-blackwell-platform-arrives-to-power-a-new-era-of-computing
        kind: company_web
        description: "NVIDIA Blackwell B200 specification page — 192 GB HBM3e per GPU, 8 TB/s bandwidth (matches/exceeds MI300X 5.3 TB/s). Key competitive reference."
        retrieved_at: "2026-03-29"

  - id: debate_4
    question: "Can AMD sustain 50%+ gross margins as Instinct GPU mix continues to grow?"
    bull_case: >
      AMD's non-GAAP gross margins have consistently expanded from ~46% (FY2022) to ~53–54%
      (FY2025 ex-MI308 charge). Instinct GPUs, as high-ASP products sold at scale to hyperscalers,
      carry better gross margins than commodity CPUs. As Instinct revenue grows as a share of
      total mix, gross margins structurally improve. AMD management guided 54% non-GAAP gross
      margin for Q1 FY2026.
    bear_case: >
      AMD's GAAP gross margins (40–54% across FY2025) were severely distorted by the Q2 FY2025
      MI308 inventory charge (~$800M) and ongoing Xilinx acquisition amortization (~$260M/quarter
      in COGS, reducing GAAP gross margins by ~3 percentage points per quarter). The non-GAAP
      gross margin (54%) is the "right" number for operating efficiency, but hyperscaler GPU
      pricing is negotiated at scale and subject to volume discounts as AMD competes harder against
      NVIDIA. AMD does not disclose Instinct GPU ASPs; there is material risk that ASPs decline
      as AMD wins higher-volume but lower-price contracts.
    resolution_evidence: >
      Watch: (1) AMD quarterly gross margins on a trailing-12-month basis; (2) Data Center segment
      revenue per quarter vs. management commentary on pricing environment; (3) TSMC CoWoS pricing
      trends (cost input); (4) AMD non-GAAP vs. GAAP gross margin differential (narrows as Xilinx
      amortization burns off by ~2028).
    current_lean: >
      INTERPRETATION: Margin direction is positive but level uncertain. The non-GAAP ~54% margin
      is achievable at current Instinct volume. The key risk is AMD winning more volume by
      competing on price against NVIDIA, which could erode ASPs. This has not been evidenced yet
      but is a structural risk as AMD scales to 20%+ of hyperscaler GPU spend. Lean neutral.
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1276/amd-reports-fourth-quarter-and-full-year-2025-financial-results
        kind: ir_html
        description: "AMD Q4 FY2025 earnings press release: Q1 FY2026 guidance of ~54% non-GAAP gross margin; historical quarterly gross margin data."
        retrieved_at: "2026-03-29"

# ─── Sentiment Signals ────────────────────────────────────────────────────────

sentiment_signals:
  sell_side_summary:
    rating_distribution: "~60% Buy / ~30% Hold / ~10% Sell (approximate, based on public consensus data as of Q1 2026)"
    consensus_price_target_range: "$140–$220 range (approximate)"
    notes: >
      Sell-side consensus is moderately constructive. Buy ratings are anchored on Data Center
      growth trajectory and CDNA 4 (MI350) catalyst. Hold ratings reflect NVIDIA competition
      risk and execution uncertainty on ROCm. The broad target range reflects model uncertainty
      around Instinct GPU revenue trajectory for FY2026. Do not reproduce proprietary content;
      these are directional summaries only.

  social_sentiment:
    direction: improving
    as_of: "2026-03-29"
    notes: >
      Community sentiment on r/hardware and HackerNews turned meaningfully positive in 2024
      following MI300X deployment reports from Azure and Oracle. Developer sentiment on ROCm
      improved with ROCm 6.x (measurably fewer "ROCm is a mess" complaints on Reddit and HN
      vs. 2022–2023). X (Twitter) sentiment among ML practitioners remains NVIDIA-dominant
      but AMD sentiment is no longer reflexively dismissive — there is genuine discussion of
      ROCm viability for inference. Tier 3 signal; directional only.

  notable_shifts:
    - event: "MI300X Azure deployment validation (2024)"
      direction: positive
      notes: "Microsoft's public Azure ND MI300X v5 GA announcement was the most credible external validation of MI300X production quality. Shifted skeptical community from 'AMD GPU is for hobbyists' to 'AMD GPU is hyperscaler-certified.'"
    - event: "Q2 FY2025 MI308 export control charge (~$800M)"
      direction: initially negative, then neutral
      notes: >
        The charge shocked the market at first reading but subsequent analysis showed AMD's non-GAAP
        margins remained intact, MI308 export licenses were filed, and the charge was a one-time
        inventory write-down rather than a go-forward revenue impairment. By Q3, AMD recognized
        MI308 revenue following license approval, resolving the concern.
    - event: "NVIDIA Blackwell ramp delays (H1 2025)"
      direction: positive for AMD
      notes: >
        Reports of NVIDIA Blackwell B200/GB200 cooling and yield challenges in Q1–Q2 2025 created
        a window for AMD MI300X/MI325X to capture incremental hyperscaler orders. AMD's Q3 FY2025
        revenue beat ($9.25B vs. ~$8.9B consensus) was partly attributed to this window.

  contrarian_positions:
    - position: "AMD's GAAP earnings are the right metric and the picture is uglier than non-GAAP suggests"
      source_tier: 2
      notes: >
        A minority of analysts argue that AMD's non-GAAP adjustment for acquisition-related
        amortization ($2.2B+ per year from Xilinx) is legitimate but misleading: the Xilinx deal
        cost $35B+ in equity, and that capital cost is real. On a GAAP basis, AMD's FY2025 operating
        margin was 11% vs. 22% non-GAAP, and trailing GAAP EPS severely lags non-GAAP. The GAAP
        story becomes more relevant if investors re-rate the sector on a GAAP basis (historically
        happens at cycle peaks).

# ─── Competitive Positioning ─────────────────────────────────────────────────

competitive_positioning:
  key_peers:
    - company: nvidia
      layer: chips
      relationship: "Primary competitor in AI GPU; NVIDIA holds ~85% market share in data-center AI accelerators by revenue (industry estimates FY2025)"
    - company: intel
      layer: chips
      relationship: "Secondary competitor in both data-center GPU (Gaudi 3) and server CPU (Xeon); not a meaningful threat in AI GPU; meaningful in CPU"
    - company: google
      layer: chips
      relationship: "Custom ASIC competitor (TPU v5/v6 via internal deployment) — not a commercial GPU vendor but reduces AMD/NVIDIA TAM by ~10–15% (hyperscalers self-serving AI compute)"
    - company: amazon
      layer: chips
      relationship: "AWS Trainium2/Inferentia2 custom ASICs reduce GPU TAM for AMD/NVIDIA at AWS specifically"

  where_company_wins:
    - dimension: "Memory capacity per accelerator"
      evidence: "MI325X 256 GB HBM3e vs. NVIDIA H200 141 GB HBM3e; enables single-GPU large-model serving that NVIDIA requires multi-GPU aggregation for. Durable through MI350 generation."
      sources:
        - "AMD MI325X product brief; NVIDIA H200 product brief"
    - dimension: "Server CPU market share trajectory"
      evidence: "AMD EPYC has grown from ~1% (2016) to 24%+ x86 server unit share (2025) vs. Intel Xeon. Turin (5th Gen EPYC) continues technical leadership on cores-per-socket, DDR5 bandwidth, and PCIe 5.0 lane count."
      sources:
        - "IDC server market share reports Q3 2025; AMD EPYC Turin vs. Intel Xeon Scalable 4th Gen specs"
    - dimension: "HPC / national lab workloads"
      evidence: "El Capitan (#1 TOP500) validates Instinct MI300A APU at the extreme of HPC deployment. AMD has both EPYC and Instinct in the top 3 supercomputers globally."
      sources:
        - "TOP500 Nov 2024 list"
    - dimension: "Inference cost per token for large models (70B+)"
      evidence: "Multiple Azure and cloud benchmark reports show MI300X 15–40% better $/token vs. H100 for batch inference of Llama-3-70B and similar due to memory capacity-driven multi-GPU reduction. Tier 2 source."
      sources:
        - "Microsoft Azure MI300X vs. H100 inference cost blog (2024)"

  where_gap_closing:
    - dimension: "NVIDIA's per-GPU memory capacity (H200, B200, B300)"
      evidence: "H200 ships 141 GB (MI300X match closing), B200 ships 192 GB (equal to MI300X), B300 targeting 288 GB (equal to MI350). Memory advantage is a 2-year window, not a durable 5-year moat."
      sources:
        - "NVIDIA H200 and B200 product briefs"
    - dimension: "NVLink scale-up fabric bandwidth"
      evidence: "NVIDIA NVLink 5.0 in B200/GB200 provides 1.8 TB/s GPU-to-GPU bandwidth per GPU in a tray. AMD's xGMI in MI300X provides ~900 GB/s. The scale-up interconnect gap is widening, not closing."
      sources:
        - "NVIDIA Blackwell architecture white paper"

  where_company_loses:
    - dimension: "Software ecosystem depth (CUDA vs. ROCm)"
      evidence: "CUDA ecosystem: ~10M registered CUDA developers (NVIDIA claim), 15 years of cuDNN/cuBLAS optimization, Nsight profiler maturity, TensorRT inference optimizer. ROCm: significant subset of CUDA capabilities but custom kernel portability, profiler depth, and library coverage meaningfully behind."
      sources:
        - "Specialist analysis: SemiAnalysis CUDA ecosystem analysis 2024"
    - dimension: "NVLink/NVSwitch scale-up fabric for large cluster training"
      evidence: "NVIDIA NVSwitch-based NVLink 4.0/5.0 enables all-to-all GPU communication at 900 GB/s → 1.8 TB/s per GPU, enabling multi-hundred GPU coherent memory fabric. AMD has no equivalent scale-up fabric — MI300X/MI350 scale-out uses commodity InfiniBand, which is 5–10× lower bandwidth for all-reduce operations in training."
      sources:
        - "NVIDIA GB200 NVL72 architecture; AMD Instinct UBB reference design"
    - dimension: "Inference optimization stack (TensorRT equivalent)"
      evidence: "NVIDIA TensorRT-LLM provides graph fusion, INT4/INT8 quantization, and continuous batching in a production-hardened inference server. AMD's ROCm inference stack (vLLM ROCm fork, MIOpen) is functional but requires more engineering to match TensorRT optimization depth."
      sources:
        - "MLPerf Inference v4.0 closed division results: NVIDIA TensorRT-LLM vs. AMD ROCm results"

  switching_costs:
    customer_lock_in_nvidia: >
      NVIDIA's customer lock-in operates at three levels: (1) CUDA kernel-level — code written
      in CUDA requires rewriting in HIP/ROCm to port; (2) framework-level — PyTorch CUDA
      extensions, custom operators, and model optimizations are CUDA-path by default; (3) workflow
      tooling level — Nsight Compute profiler, NeMo/Megatron training frameworks, TensorRT-LLM
      inference are NVIDIA-specific. Hyperscalers absorb this cost; enterprise customers largely
      cannot.
    switching_to_amd: >
      Switching from NVIDIA to AMD requires: (1) ROCm environment setup (hours-to-days for clean
      PyTorch migration; weeks-to-months for custom kernel-heavy codebases); (2) benchmark
      validation (mandatory for production hyperscaler deployments); (3) workflow tooling
      substitution (ROCm Profiler vs. Nsight, MIOpen vs. cuDNN). Cost is high for existing
      deployments but near-zero for greenfield inference deployments using standard PyTorch + vLLM.

  order_changers:
    - scenario: "AMD MI350 ships with ROCm 7.x training parity"
      probability: moderate
      notes: "If MI350 ships with MLPerf Training closed-division results within 20% of NVIDIA B200, it would be the first time AMD competes on equal footing for training procurement."
    - scenario: "Hyperscaler custom ASIC acceleration (TPU, Trainium, Maia) captures 30%+ of total AI compute spend"
      probability: moderate
      notes: "Would reduce both AMD and NVIDIA TAM; AMD more exposed as its hyperscaler GPU share is smaller. AMD would retain EPYC CPU and enterprise CPU/GPU positions."
    - scenario: "U.S. export control escalation further restricts Instinct GPU sales to China"
      probability: low-moderate
      notes: "AMD's MI308 China export license situation resolved in Q3 2025; further escalation remains a policy risk. AMD has less China AI exposure than some estimates due to MI300X specs exceeding current export thresholds."

  disclosure_quality_comparison:
    amd:
      rating: moderate
      financial_granularity: >
        AMD reports four segments (Data Center, Client, Gaming, Embedded) with segment revenue
        and operating income. Does NOT break out GPU vs. CPU within Data Center, preventing
        analysts from modeling Instinct GPU ASP trends independently. Does NOT disclose customer
        concentration beyond 10%+ thresholds. Non-GAAP adjustments are large (~$2.2B+/year
        amortization) and standard but make GAAP-to-non-GAAP bridge a critical analytical step.
      guidance_specificity: >
        AMD provides quarterly revenue guidance with ±$300M range — specific and falsifiable.
        Gross margin guidance provided (non-GAAP). No multi-quarter or full-year guidance.
        No Instinct GPU unit volume or revenue guidance.
      management_deflections: >
        In Q3 FY2025 earnings call: analysts asked AMD to break out Instinct GPU revenue
        separately from EPYC CPU — deflected with "we don't break that out." Analysts asked
        about China MI308 revenue concentration and whether ~$390M Q3 MI308 revenue was one-time
        or recurring — deflected with vague "normalized mix" language. Q4 FY2025: analysts asked
        about customer concentration (Meta dependence) — deflected. Key gap: no GPU vs. CPU
        revenue split is the single most important AMD disclosure gap.
    nvidia:
      rating: strong
      financial_granularity: >
        NVIDIA reports Data Center segment separately with GPU vs. compute/networking breakdown.
        Discloses H100/H200/B200 ramp explicitly in earnings commentary. Geographic revenue
        detailed. Customer concentration in 10-K (several >10% customers disclosed). Gross margin
        components (product vs. service) separate.
      notes: "NVIDIA's disclosure is the highest in the AI chip peer set; AMD disclosure lags."
    intel:
      rating: moderate
      financial_granularity: >
        Intel reports DCAI segment (data center AI including Gaudi) separately. Discloses
        Gaudi shipment milestones. Server CPU (Xeon) revenue separate. Intel's Gaudi 3 has
        not achieved scale; disclosure is detailed but less relevant for comparative AI GPU
        analysis.

# ─── Information Asymmetries ─────────────────────────────────────────────────

information_asymmetries:

  - id: asym_1
    title: "The GPU/CPU revenue mix inside Data Center is the most important undisclosed AMD metric"
    market_believes: >
      Most models assume AMD Data Center ~$28B FY2025 ≈ ~70–75% Instinct GPU + ~25–30% EPYC CPU.
      This is an informed guess, not a disclosed figure. Sell-side models use this split without
      any basis other than management commentary direction.
    evidence_suggests: >
      Original derived analysis: AMD FY2025 Data Center revenue ~$28.4B (derived from segment tables
      in FY2025 press release). AMD EPYC has ~24% server CPU market share in a ~$25B total server CPU
      market (IDC 2025) → AMD EPYC annual revenue ≈ $6.0–$6.5B (derived: 24% × $25B × ~1.05 ASP
      premium). This implies Instinct GPU revenue ≈ $28.4B - $6.2B ≈ $22.2B in FY2025 (~78% of
      Data Center). This is higher than most sell-side estimates of $15–18B Instinct standalone.
      If correct, Instinct revenue concentration risk is higher than the market models.
    gap_reason: "AMD does not disclose GPU vs. CPU revenue within Data Center; market uses imprecise top-down estimates."
    closing_catalyst: "AMD could choose to disclose Instinct GPU revenue separately (as NVIDIA does for Data Center GPU). Analyst pressure is building."
    confidence: moderate
    sources:
      - url: https://ir.amd.com/news-events/press-releases/detail/1276/amd-reports-fourth-quarter-and-full-year-2025-financial-results
        kind: ir_html
        description: "Data Center segment revenue for FY2025: approximately $26.7B for the year (sum of quarterly Data Center segment figures from FY2025 press releases). AMD provides no GPU/CPU split."
