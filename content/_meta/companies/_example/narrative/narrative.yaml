sections:
  - id: example_angle
    title: ""
    body: |
      Issuer-specific “underneath” insight — not the same section titles for every company.
      Use any section ids/titles; order by story, not a fixed template.

  - id: conclusion
    title: "Takeaway"
    body: |
      Required id: conclusion. Synthesize how to read the period; separate known vs unknown.
      Title may be Conclusion, Takeaway, etc.

disclosure_gaps: null

