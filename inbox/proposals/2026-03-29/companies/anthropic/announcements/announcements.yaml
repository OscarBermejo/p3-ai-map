  - date: "2024-11-22"
    category: partnership
    title: "Amazon investment increased to $8B total; AWS designated primary cloud and training partner"
    summary: >
      Amazon deepened its Anthropic investment to a total of $8B and formalized AWS as Anthropic's
      'primary cloud and training partner.' The arrangement includes collaboration with Annapurna Labs
      on next-generation Trainium accelerator development. Project Rainier, AWS's dedicated Anthropic
      training cluster with nearly 500,000 Trainium2 chips, was announced as operational. This
      relationship is the compute backbone for Anthropic's frontier model training.
    significance: high
    sources:
      - url: https://techcrunch.com/2024/11/22/anthropic-raises-an-additional-4b-from-amazon-makes-aws-is-primary-cloud-partner/
        kind: news_article
