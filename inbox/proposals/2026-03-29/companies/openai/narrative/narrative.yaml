kind: financial_narrative
schema_version: 1
as_of: "2026-03-29"

based_on_financials:
  file: financials/FY2025-annual.yaml
  period_end: "2025-12-31"
  period_label: FY2025-annual

business_profile_as_of: "2026-03-29"

central_questions:
  - >
    Can a company generating $3.14 in losses for every dollar of revenue reach
    profitability by 2030 — after permanently surrendering 20% of all revenue
    to its primary infrastructure partner — while defending market share against
    two better-capitalized competitors who are winning the enterprise segment
    it needs most?
  - >
    Is OpenAI's $730B+ valuation a bet on the frontier model category or on
    OpenAI's ability to hold onto its position within it?

sections:

  - id: business_model_and_stage
    title: "What OpenAI actually is — and why its financials look the way they do"
    body: >
      OpenAI is best understood as a frontier AI research lab that became a consumer
      and enterprise software company before it was ready to be one. The decision to
      ship ChatGPT in November 2022 was, in retrospect, the founding moment of the
      modern AI industry — and it created a company with a structural mismatch between
      its revenue profile (fast-scaling, increasingly recurring) and its cost structure
      (compute-intensive, front-loaded, scaling with capability ambition rather than
      with revenue).


      What OpenAI owns: The model weights (GPT-4.1, o3, GPT-5.4), the training
      methodology and RLHF pipeline, and the ChatGPT consumer brand. These are real
      assets, but they have short economic lives. Each major model generation is
      commercially relevant for approximately 12-18 months before the next generation
      supersedes it — a depreciation schedule far more aggressive than the GPU hardware
      on which the models run. OpenAI does not own its compute infrastructure (Azure
      dependent), does not manufacture its own chips (NVIDIA dependent), and does not
      control its enterprise distribution (increasingly dependent on Azure OpenAI
      Service for API customers). It is a fabless analog in the models layer: designing
      and training the assets while outsourcing the physical layer to partners who take
      a structural share of the economics.


      What OpenAI rents: Everything physical. Azure provides training compute under
      the Microsoft partnership; Azure also hosts inference for stateless API calls
      exclusively through 2032. The effective cost of this arrangement is not just the
      Azure bills — it is the 20% revenue-share paid to Microsoft on all revenue through
      2032. At FY2025's $13B in recognized revenue, that is $2.6B paid to Microsoft
      before any other cost is covered. At $25B ARR (February 2026 run rate), the
      Microsoft "infrastructure tax" runs at $5B/year. This is not a cost that
      scales down with efficiency improvements — it is permanent, proportional, and
      contractually locked until at least 2032.


      Stage: OpenAI is in late-stage buildout. The consumer product is operational and
      scaling. The enterprise product (Frontier platform, API) is at early commercial
      stage — meaningful revenue but not yet the enterprise stickiness that creates
      durable margins. The compute infrastructure that would allow self-sufficiency
      (Stargate) is years from operational. The company is simultaneously sustaining
      a consumer product, building an enterprise platform, scaling compute
      infrastructure, and training frontier models — four capital-intensive activities
      at once, funded entirely by external capital rather than operating cash flow.


      This combination — real revenue growth, fabricated at scale, leveraged to
      infrastructure owned by a partner who takes 20% off the top — is structurally
      different from every public company comparator. The closest analogy is not
      Salesforce or Snowflake (capital-light SaaS) or NVIDIA (capital-intensive but
      highly profitable). The closer analog is a vertically integrated platform that
      has outsourced its vertical integration. Understanding this is prerequisite to
      reading any of the financial figures accurately.

  - id: loss_ratio_analysis
    title: "The $3.14 loss — understanding what it is and what it isn't"
    body: >
      H1 2025 financials (The Information, most granular data available): revenue
      $4.3B, net loss $13.5B, R&D $6.7B, sales & marketing $2.0B, SBC $2.5B, cash
      burn $2.5B.


      At face value: OpenAI is generating a net loss ratio of -314% ($13.5B loss /
      $4.3B revenue). No profitable company has ever traded at a $730B valuation
      with these economics. But the face value is the wrong frame.


      The critical decomposition: The $13.5B net loss is NOT the same as $13.5B
      in cash consumed. The H1 2025 cash burn was $2.5B — dramatically different.
      The gap is primarily stock-based compensation ($2.5B in H1) plus other
      non-cash charges. Analytically:

        GAAP net loss:       -$13.5B
        Less: SBC (non-cash)  +$2.5B
        Adjusted cash loss:  ~-$11.0B (still large, but different character)
        Less: Other non-cash  +$8.5B (implied — primarily compute lease prepayments,
                                       deferred revenue recognition, non-cash charges)
        Cash burn (actual):  ~-$2.5B

      The $8.5B gap between adjusted cash loss and actual cash burn is not disclosed
      in granular form, but it is likely dominated by Microsoft's compute provision
      structure — significant portions of Microsoft's infrastructure contribution are
      recorded as non-cash consideration rather than cash expense, making the GAAP
      loss appear larger than the liquidity drain.


      Cash burn multiple (H1 2025):
        ARR at start of 2025:  ~$3.7B (FY2024 recognized revenue as proxy)
        ARR at end of H1 2025: ~$8.6B ($4.3B H1 revenue × 2 annualized)
        Net new ARR in H1:     $4.9B
        Cash burn multiple:    $2.5B / $4.9B = 0.51

      A burn multiple below 1.0 means the company generates more new ARR than it
      burns in cash. OpenAI's H1 2025 cash burn multiple of 0.51 is genuinely
      exceptional — for every dollar of cash consumed, the company added $2 in
      annualized revenue run rate. By this metric (which is how growth-stage
      investors actually think about capital efficiency, not GAAP margins),
      OpenAI is executing well. However, the economic burn multiple — including
      SBC at full value — is $5.0B / $4.9B = approximately 1.0, meaning SBC is
      entirely consuming the efficiency advantage. Employees are being compensated
      at the rate that revenue is growing. That is sustainable if the equity value
      grows to justify the SBC; it becomes a structural problem if equity value
      stalls.


      The H2 2025 picture is materially different but unconfirmed: CFO stated
      $20B+ ARR crossed in 2025, year-end ARR was $21.4B, and FY2025 recognized
      revenue was ~$13B. This means H2 2025 alone generated ~$8.7B in revenue —
      2× the H1 pace. If H2 burn scaled similarly, full-year 2025 cash burn would
      be ~$5B. But compute expanded from 0.6 GW to 1.9 GW in 2025 — a 3× increase.
      Whether compute costs were pre-paid, capitalized, or expensed is not disclosed.
      The full-year 2025 burn rate is the single most important unknown in the
      current financial picture.

  - id: microsoft_structural_tax
    title: "The 20% structural ceiling — what the Microsoft deal actually costs"
    body: >
      The Microsoft revenue share (20% of total revenue through 2032, per The
      Information) is the most underappreciated structural constraint on OpenAI's
      path to profitability. It is not an expense that improves with scale or
      efficiency — it is a flat percentage, permanent, applied before any other
      cost is measured.


      Derived impact at current and projected revenue scales:

        FY2025 revenue:      $13.0B → Microsoft share: $2.6B (20%)
        Feb 2026 ARR:        $25.0B → Microsoft share at this run rate: $5.0B/yr
        2030 revenue target: $280.0B → Microsoft share: $56.0B/yr

      At the $280B revenue target, Microsoft receives $56B — more than OpenAI's
      entire current annual run rate — before OpenAI covers a single other cost.
      To achieve the 20% operating margin that analysts argue would justify
      the current valuation, OpenAI needs $56B in operating income on $280B revenue.
      But Microsoft has already taken $56B off the top. That means OpenAI must
      generate $112B in "pre-Microsoft gross profit" to net $56B after the share —
      requiring a 40% gross margin on the $280B before the rev-share, not 20%.


      This is not a fatal constraint — it is a known cost structure that investors
      have priced in. But it means that OpenAI's profitability math requires
      significantly higher gross margins than a peer company without the rev-share
      would need. The "path to 20% operating margins" headline that analysts cite
      understates the margin required on the underlying product economics by
      approximately 1.25×.


      The October 2025 partnership update provided some relief: OpenAI can now
      use compute providers other than Azure for non-API workloads, and the
      Stargate partnership with Oracle and AWS gives OpenAI diversification options.
      But the 20% revenue share persists regardless of which compute provider
      OpenAI uses. The revenue share is not a "compute cost" — it is a return on
      Microsoft's equity investment, structured as a revenue participation. Stargate
      does not reduce it.

  - id: model_price_performance_trajectory
    title: "The cannibalization curve — model quality is improving faster than pricing"
    body: >
      The models layer has a unique dynamic that does not appear in chips, infrastructure,
      or applications: the company's own new models obsolete its own previous models at
      a pace set by the compute investment schedule, not by the competitive landscape.
      OpenAI is simultaneously its own best customer and its own most dangerous competitor.


      Derived price-performance comparison using available Artificial Analysis data
      (quality index) and current API pricing (snapshot: 2026-03-29):

        GPT-4o (May 2024):  quality_index 46 / $10.00 output = 4.6 quality/dollar
        o3 (Apr 2025):      quality_index 63 / $8.00 output  = 7.875 quality/dollar
        Δ (11 months):      +71% price-performance improvement

      Every 12 months, OpenAI is delivering approximately 70%+ more quality-per-output-dollar.
      This is the "AI's law" equivalent — and it is brutal for revenue stability.


      The implication: The $10/M output pricing for GPT-4o looks increasingly indefensible
      against GPT-4.1 (same $8/M, much better quality) and o3 (same $8/M, far better
      reasoning). GPT-4o's quality_per_output_dollar of 4.6 is 42% below o3 at 7.875.
      Rational users should and are migrating. This migration is revenue-neutral if
      they move to o3/GPT-4.1 (similar pricing), but the pattern compresses when
      the migration is to GPT-4.1-mini ($1.60/M output).


      GPT-4.1-mini represents the existential pricing pressure: at $1.60/M output
      vs $8-10/M for premium models, it costs 5-6× less. If its quality_index were
      even 30 (unconfirmed — Artificial Analysis data not available), that would be
      30 / 1.60 = 18.75 quality/dollar — 2.4× better price-performance than o3.
      Enterprise buyers optimizing for cost-adjusted quality will naturally route
      lower-complexity tasks to GPT-4.1-mini and reserve o3 for hard reasoning.
      The revenue-per-query will compress over time as this routing becomes standard.


      This is not a problem unique to OpenAI — Anthropic and Google face the same
      compression. But it means that revenue growth must come from expanding the
      total volume of AI queries (consumer + enterprise penetration) rather than
      from pricing power on any given model. The demand elasticity of AI queries
      at lower price points has proven extremely high (800M ChatGPT WAU), which
      is why the revenue trajectory continues even as per-token pricing falls.
      Whether volume growth can outpace pricing decline is the fundamental unit
      economics question, and the answer is currently unknowable without token
      volume data that OpenAI does not disclose.

  - id: enterprise_market_share_risk
    title: "The Anthropic problem — structural, not cyclical"
    body: >
      The market share shift in enterprise is the most structurally concerning
      development in OpenAI's competitive picture, and it deserves sharper treatment
      than the consensus gives it. Anthropic has captured 40% of enterprise LLM
      spending (2025, from 24% in 2024) while OpenAI declined from 50% to 27%.
      In the coding agent segment specifically — the highest-growth vector for
      enterprise AI deployment — Anthropic holds 54% vs OpenAI's 21%.


      What makes this structural rather than cyclical:


      First, the coding segment is the stickiest. When an engineering team builds
      their CI/CD pipeline, their code review workflow, and their internal documentation
      agents on Claude Code, they are building on Claude's API, its tool-use patterns,
      its function-calling conventions, and its system-prompt behavior. Switching
      to GPT-4.1 requires rewriting prompts, revalidating behavior, and retraining
      the team. The switching cost is 1-3 months of engineering time. This is
      not loyalty — it is friction-based retention, and it accumulates over time.


      Second, the enterprise trust gap created by the November 2023 board crisis
      and the 2026 Pentagon deal controversy is not reflected in API pricing or
      benchmark scores — but it IS reflected in enterprise compliance reviews.
      Regulated industries (healthcare, legal, finance) have formal AI governance
      processes that include reputational and stability assessments. OpenAI's
      governance turbulence created a documented entry in those risk registers
      that will take years to clear, regardless of model quality.


      Third, the 79% overlap (Anthropic customers also paying for OpenAI) is
      misread by the bull camp as evidence that it's not a zero-sum switch.
      It is actually evidence that enterprises are replacing OpenAI as primary
      with Anthropic, while keeping OpenAI as secondary for legacy workflows they
      haven't migrated yet. That is not a draw — it is a structural demotion.
      Secondary provider economics (lower volume, higher price sensitivity) are
      different from primary provider economics.


      OpenAI's response — the Frontier enterprise agent platform — is directionally
      correct: moving up the value stack toward workflow integration reduces
      commoditization exposure. But Frontier launched in February 2026 against
      Claude CoWork and AWS Bedrock, both of which are deeper in enterprise stacks
      at launch. The incumbent advantage belongs to Anthropic in this race.

  - id: valuation_math
    title: "The $730B valuation — what has to be true"
    body: >
      A rigorous valuation bridge:

        Implied valuation: ~$730B–$850B (Feb 2026 pre-money + post-money range)
        Current ARR: $25B (Feb 2026)
        Implied EV/ARR multiple: ~29–34×

      For comparison:
        - Snowflake at 2020 IPO peak: ~100× ARR (loss-making hypergrowth)
        - Salesforce at peak growth phase: ~15–20× ARR
        - Databricks 2023 (private, ~$1.6B ARR): ~27× ARR
        - ServiceNow at $12B ARR: ~17× ARR (profitable, 25%+ FCF margin)

      29× ARR is not absurd for a company growing ARR at 50%+ annually. But the
      conditions attached are extreme:


      Illustrative 2030 scenario required for $730B value to be justified
      (using 25× forward operating income as a reasonable exit multiple for
      a profitable AI platform):

        Required operating income (2030): $730B / 25 = $29.2B
        + Microsoft rev-share (20%) paid before EBIT: ~$56B at $280B revenue
        = Required gross profit: $29.2B + opex + $56B Microsoft share
        At 30% opex-to-revenue: ~$84B opex
        Minimum required revenue: ($29.2B + $84B + $56B) / gross_margin
        At 50% gross margin before rev-share: $169.2B / 0.50 = $338B revenue
        At 40% gross margin before rev-share: $169.2B / 0.40 = $423B revenue

      This math is deliberately simplified and illustrative — not a precise model.
      The conclusion is consistent: OpenAI needs revenue between $280B–$420B by 2030
      to justify the current valuation at reasonable margin assumptions. That requires
      CAGR of 50–70% from $13B (2025). No technology company at $13B+ revenue scale
      has ever sustained that growth rate for five years.


      The bear case requires only that revenue growth slows to 30% CAGR (a pace
      that would still create one of the largest tech companies in history):
        $13B × (1.30)^5 = $48B revenue in 2030
        At 15% operating margin: $7.2B EBIT
        At 25× EBIT: $180B valuation
        Implied loss: -75% from $730B

      The bull and bear cases bound a range of $180B–$1.5T+ in enterprise value
      in 2030 — a 9× spread. This is not an unusual range for a pre-profitability
      frontier technology company valued on long-duration optionality rather than
      near-term cash flows. Investors holding OpenAI equity (directly or via SoftBank,
      Thrive Capital, etc.) are not valuing it on a DCF; they are making a categorical
      bet on whether OpenAI controls the foundational AI layer of the next computing
      platform, the same way AWS controlled cloud infrastructure in 2010.

  - id: disclosure_gap_assessment
    title: "Information vacuum — the structural limits of analyzing OpenAI"
    body: >
      OpenAI's financial disclosure is the worst among all significant companies in
      this repo, by a large margin. This is worth stating plainly, because the
      $730B+ valuation is made at near-total informational disadvantage for
      outside investors.


      What is confirmed (Tier 1 — voluntary company disclosure):
        - CFO-stated: "Annualized revenue crossed $20B in 2025" (Jan 2026)
        - Funding rounds: amounts and dates confirmed via Form D and press
        - Corporate structure: entity type, Microsoft partnership terms (via
          joint statement), approximate Microsoft investment total ($13B+)
        - Headcount: ~4,500 (Reuters citing FT, Mar 2026)

      What is Tier 2 (credible press, not confirmed):
        - FY2025 recognized revenue: $13B (The Information / CBInsights)
        - H1 2025 P&L: revenue $4.3B, net loss $13.5B, R&D $6.7B,
          S&M $2B, SBC $2.5B, cash burn $2.5B (The Information internal document)
        - Year-end 2025 ARR: $21.4B, Feb 2026 ARR: $25B (The Information via Reuters)
        - Gross margin compression to ~33% (analyst estimates)
        - $111B cumulative cash burn forecast through 2030 (The Information)

      What is completely unavailable:
        - Gross profit or gross margin (confirmed)
        - Operating income
        - Balance sheet (cash, debt, assets, equity)
        - Cash flow statement
        - Customer count by tier (free vs. Plus vs. Team vs. Enterprise)
        - Token volume (the denominator for every unit economics calculation)
        - Revenue by product line (ChatGPT consumer vs. API vs. enterprise contracts)
        - Microsoft compute bill (the largest cost component)

      The practical consequence: every ratio computation in this narrative is either
      impossible or based on leaked internal data from a single outlet. You cannot
      independently verify OpenAI's revenue. You cannot compute gross margin. You
      cannot assess whether the $25B ARR figure is recognized revenue or a
      loose annualization of a single recent month. You are trusting management's
      implied characterization as reported through journalists.


      Comparison: Anthropic (competitor) is similarly opaque. Google (competitor)
      discloses Gemini revenue only within the broader "Google Services" and
      "Google Cloud" segments — also not directly comparable. The entire frontier
      model competitive landscape is characterized by inadequate financial disclosure
      relative to the capital at stake. For public market comparable context:
      NVIDIA, whose GPUs power OpenAI's training, discloses 10-K/10-Q with full
      XBRL data, segment margins, and quarterly guidance. The asymmetry between
      the infrastructure layer (fully transparent) and the models layer (nearly
      opaque) is unusual and is a regime risk: any forced disclosure event (IPO S-1,
      public debt issuance, regulatory inquiry) would reset investor expectations
      dramatically.

  - id: thesis_destruction_test
    title: "Testing both theses — what has to be wrong for each to fail"
    body: >
      BULL CASE: "OpenAI will dominate the frontier model category and achieve
      $280B+ revenue at 20%+ operating margins by 2030."

      The assumption this depends on most: Revenue grows at 50%+ CAGR for five
      years while margins expand from deeply negative to 20%+. These two things
      must happen simultaneously.

      What the math shows: Revenue growth from $3.7B (2024) to $13B (2025) to
      $25B ARR (Feb 2026) is real — the 6.8× growth in 24 months is not fabricated.
      But extrapolating 50% CAGR from $13B generates $97B by 2028 and $283B by 2030.
      For context, Salesforce — the most successful enterprise SaaS company — took
      18 years to reach $31B revenue. OpenAI would need to do $283B in 5 years from
      a $13B base. This is possible only if AI token volume grows at 10-20× over
      the period (consistent with hardware procurement plans) AND OpenAI retains
      a stable share of that volume as Anthropic and Google compete.

      What would falsify it: (1) ARR growth drops below 40% for two consecutive
      quarters; or (2) Anthropic/Google combined API market share exceeds 50%,
      meaning OpenAI's volume growth must come from expanding the total market rather
      than its share; or (3) the Stargate infrastructure build suffers major delays,
      preventing the compute capacity needed to serve $280B in revenue.


      BEAR CASE: "OpenAI is a money-losing hype machine — the financials don't work."

      The assumption this depends on: The loss ratio (-314% in H1 2025) is structural
      and persistent.

      What the math shows: The -314% GAAP margin uses the net loss ($13.5B), which
      includes $2.5B SBC and approximately $8.5B in other non-cash items, against
      $4.3B revenue. The actual cash burn ($2.5B) against $4.9B in net new ARR
      generated a burn multiple of 0.51 — among the most efficient capital deployments
      in growth-stage technology. The bear case is applying the GAAP framework to a
      company where GAAP dramatically overstates cash consumption due to the structure
      of the Microsoft compute relationship. This does NOT mean the profitability
      challenges are fictional — they are real, particularly the Microsoft 20% rev-share
      and the R&D intensity. But the "cash incinerator" framing overstates the severity.

      Where the bear case IS correct: Enterprise market share loss to Anthropic is
      a real structural trend, not noise. The coding segment — the highest-value
      enterprise deployment — is 54% Anthropic. If enterprise coding agent market
      share continues to shift, OpenAI's enterprise expansion revenue (which is where
      the margin improvement must come from) will decelerate.

      A more precise bear case: "OpenAI retains consumer dominance but loses
      enterprise software to Anthropic, resulting in a revenue ceiling around
      $60-80B (consumer-driven) rather than $280B (enterprise-driven). At that
      ceiling with the Microsoft rev-share, 20% operating margins require gross
      margins of ~40%, which inference cost deflation makes achievable by 2027.
      But the $730B valuation requires $280B — so at $70B revenue with 20% margins,
      implied valuation is ~$350B. That is the real bear case: not bankruptcy, but
      a 50%+ discount to current valuation."

  - id: conclusion
    title: "How to read OpenAI right now"
    body: >
      OpenAI is the defining product of the current AI cycle — but it is not yet
      a well-defined business. The consumer asset (ChatGPT, 800M WAU, 50M paid
      subscribers) is real, durable, and underappreciated in its data-flywheel
      value. The enterprise business is at genuine risk. The financial picture,
      once decoded from GAAP distortion, is better than headline losses suggest
      but worse than the valuation implies.


      What OpenAI is doing well: revenue scaling, consumer brand ownership, and
      model release cadence. Growing from $3.7B (2024) to $25B ARR (Feb 2026)
      in 24 months is categorically exceptional and has not been achieved by any
      technology company at this scale in history. The H1 2025 cash burn multiple
      of 0.51 demonstrates that capital efficiency, measured correctly, is strong.
      The Stargate initiative, if executed, provides a credible path to compute
      independence from Microsoft by 2028-29 — which is the one structural constraint
      OpenAI cannot resolve through model quality alone.


      Where genuine risks lie: The Microsoft 20% rev-share is a permanent structural
      tax that makes 20%+ operating margins require ~40% pre-share gross margins —
      achievable but demanding. Enterprise market share loss to Anthropic in the
      coding segment is structural (workflow lock-in), not cyclical. The $218B
      additional capital forecast through 2029 creates sustained dilution risk
      if equity markets reprice AI expectations. And the disclosure quality is
      appalling — the entire financial picture depends on a single leaked internal
      document and voluntary CFO statements. Any audited financial disclosure
      (S-1, public debt offering, regulatory inquiry) carries significant
      reset risk in both directions.


      Where the market consensus appears off: The bull camp focuses on revenue
      growth (correct) but applies public-SaaS profitability math that ignores
      the Microsoft structural tax. The bear camp applies GAAP loss ratios (-314%)
      to a company whose cash burn is actually efficient (0.51 burn multiple) —
      and predicts cash-drain failure in a company that has $175B of investor
      backing and growing revenue. Both camps misread the primary risk, which
      is not cash or margins but competitive displacement in enterprise by a
      more trusted, better-positioned Anthropic.


      What to watch: (1) Enterprise coding segment share — if Anthropic crosses
      60% and OpenAI drops below 15%, the enterprise revenue ceiling is real.
      (2) Q1 2026 ARR confirmation — if ARR acceleration continues ($25B → $30B+
      by mid-2026), the revenue growth thesis survives. (3) Stargate operational
      milestones — first Texas campus online would signal compute independence
      timeline is real. (4) Any public debt issuance — the first time audited
      financials become available would reset every estimate in this analysis.
      (5) Gross margin confirmation — if The Information or another Tier 2 source
      reports gross margins above 40% in H2 2025, the path to profitability
      accelerates materially.


      What remains unknown and cannot be resolved with current data: the true
      gross margin (the single most important number for the profitability thesis),
      the balance sheet, the H2 2025 burn rate as compute scaled 3×, and the
      actual mix of ChatGPT revenue between consumer Plus and enterprise contracts
      (the difference between a $20/month ARPU and a $50+/month ARPU is the
      difference between a $1B and a $3B+ annual revenue ceiling from subscriptions).
      All five of OpenAI's most material financial facts are undisclosed. That is
      not a company you can analyze with confidence — it is a company you bet on.

disclosure_gaps: >
  Five critical gaps bound all analysis. (1) Gross margin — not disclosed; analyst estimates
  ~33%, but 40%+ is needed to absorb the Microsoft rev-share and reach 20% EBIT; the gap is
  worth ~$1.75B/year at current ARR. (2) Full balance sheet — no cash, debt, or equity disclosed;
  runway is not computable despite the $110B Feb 2026 raise. (3) Token volume — without query
  counts, revenue-per-token and unit economics cannot be verified. (4) Revenue by product line —
  ChatGPT consumer vs. API developer vs. enterprise contracts have fundamentally different
  economics; mix is unknown. (5) H2 2025 and Q1 2026 P&L — H1 2025 is the only partial-year
  data available; H2 compute scaled 3× (0.6 GW → 1.9 GW) with no corresponding cost disclosure.

