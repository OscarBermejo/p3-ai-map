summary: |
  OpenAI is the leading AI research and deployment company, best known for the GPT model
  family (GPT-4o, GPT-4o-mini), the o-series reasoning models (o1, o3), and the ChatGPT
  consumer product. In the AI value chain, OpenAI sits at the models layer: it trains
  frontier large language models and deploys them via API (OpenAI API) and direct
  consumer/enterprise products (ChatGPT, ChatGPT Enterprise, Sora, Assistants API,
  Responses API). OpenAI is a private company with a unique capped-profit corporate
  structure: a non-profit parent (OpenAI, Inc.) controls a for-profit subsidiary
  (OpenAI, L.L.C.) in which investors receive capped returns. As of early 2025, OpenAI
  was restructuring toward a Public Benefit Corporation (PBC) structure to remove the
  capped-profit constraint. OpenAI's primary compute partner is Microsoft (Azure),
  which made a multi-year, multi-billion dollar investment in exchange for exclusive
  Azure deployment rights and a revenue-share arrangement. Quantitative financials
  are not publicly disclosed; estimates from press reports are in financials/*.yaml.

