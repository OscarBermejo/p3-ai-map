notes:
  - OpenAI is a PRIVATE company. No 10-K/10-Q. Use financials_private.md sourcing rules.
  - Corporate structure is unusual — non-profit parent with capped-profit for-profit subsidiary, restructuring to PBC.
  - Microsoft is both primary investor (~$13B total committed as of 2024) and exclusive cloud infrastructure partner (Azure).
  - Revenue is primarily API (pay-per-token) + ChatGPT Plus/Team/Enterprise subscriptions + API platform enterprise contracts.
  - OpenAI was founded in 2015 as a non-profit; converted to capped-profit model in 2019.
  - Sam Altman is CEO. Board upheaval in Nov 2023 (Altman fired then reinstated within days); board reconstituted.
