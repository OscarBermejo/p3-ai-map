    covers: []  # Supports understanding of ARR trajectory; does not change FY2025 recognized revenue
    retrieved_at: "2026-03-29"

  - url: null
    kind: documentation
    description: "Distinction: revenue ($13B) is estimated FY2025 recognized revenue. ARR at year-end 2025 was $21.4B (The Information) — a run-rate figure reflecting the exit pace. The difference (~$8.4B gap) reflects that H1 2025 revenue was only $4.3B while H2 accelerated sharply. Both figures are stored; the standard revenue field holds the recognized figure."
    covers: [revenue]
    retrieved_at: "2026-03-29"

  - url: null
    kind: documentation
    description: "cost_of_revenue, gross_profit: not disclosed. Key CoR components: (1) Microsoft Azure compute (exclusive hosting); (2) Microsoft revenue share at 20% of revenue = ~$2.6B in FY2025; (3) inference compute for model serving. No credible Tier 1 or Tier 2 source provides gross margin. Field null."
    covers: [cost_of_revenue, gross_profit]
    retrieved_at: "2026-03-29"

  - url: null
    kind: documentation
    description: "research_and_development: H1 2025 R&D was $6.7B (The Information). If H2 spent similarly, FY2025 R&D would be ~$13–$14B — exceeding full-year revenue. This is not unusual for a frontier AI lab (compute training costs and research headcount). Full-year figure not confirmed; field null."
    covers: [research_and_development]
    retrieved_at: "2026-03-29"

  - url: null
    kind: documentation
    description: "net_income, operating_income: H1 2025 net loss alone was $13.5B. With H2 revenue significantly higher (~$8.7B) but compute capacity expanding from 0.6GW to 1.9GW in 2025, full-year net loss is estimated at $20B–$35B (Tier 3 wide range). OpenAI's forecast per The Information: $111B cumulative cash burn through 2030. Fields null; full-year not confirmed."
    covers: [net_income, operating_income]
    retrieved_at: "2026-03-29"

  - url: null
