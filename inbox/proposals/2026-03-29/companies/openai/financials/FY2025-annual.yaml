    value: 2888889  # Derived: $13B / 4,500 = ~$2.89M per employee (FY2025 revenue / current headcount)
    notes: "Derived estimate: FY2025 revenue $13B / ~4,500 headcount = ~$2.89M per employee. For context: NVIDIA's FY2026 revenue per employee was ~$3.5M+. OpenAI's ratio is high for a pre-profitability company but understates total compensation (SBC was ~$2.5B in H1 alone)."
    sources: []
