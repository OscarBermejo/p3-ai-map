extended_metrics:
  total_funding_raised_usd:
    value: null  # Range $167B–$175B as of Mar 2026; not pinpointed to Dec 31 2025
    notes: >
      As of Feb 2026 ($110B round), cumulative raised ~$175B (CBInsights) to $168B (Tracxn).
      As of Dec 31, 2025 (pre-Feb 2026 round), cumulative was approximately $65B–$75B based on
      Oct 2024 ($6.6B), Mar 2025 ($40B), Aug 2025 ($8.3B), Oct 2025 ($22.5B) rounds plus
      prior raises. No single source confirms the exact Dec-31-2025 cumulative figure.
    sources:
      - url: https://techcrunch.com/2026/02/27/openai-raises-110b-in-one-of-the-largest-private-funding-rounds-in-history
        kind: ir_html
        description: "TechCrunch: $110B round Feb 2026 at $730B pre-money; context for full funding history."
        retrieved_at: "2026-03-29"

  last_round_amount_usd:
    value: 22500000000  # $22.5B — Oct 2025 round (last in FY2025)
    notes: "Led by SoftBank. Valuation not separately confirmed for this specific round."
    sources:
      - url: https://www.cbinsights.com/company/openai/financials
        kind: ir_html
        description: "CBInsights: Oct 2025, $22.5B, led by SoftBank."
        retrieved_at: "2026-03-29"

  last_round_valuation_usd:
    value: null  # Specific post-money for Oct 2025 round not confirmed; $500B confirmed for secondary Oct 2025
    notes: "Secondary market transaction at ~$500B (Oct 2, 2025). Primary round (Oct 26, 2025 $22.5B) valuation not separately reported."
    sources: []

  last_round_date: "2025-10-26"
  last_round_type: series_x

  arr_usd:
    value: 21400000000  # $21.4B ARR at year-end 2025 — Tier 2 (The Information / Reuters)
    notes: "The Information reported $21.4B ARR at year-end 2025. CFO stated $20B+ ARR crossed in 2025. Reuters reported $25B ARR as of Feb 2026. The $21.4B is used as the Dec-31-2025 exit ARR. Distinct from the $13B recognized FY2025 revenue."
    sources:
      - url: https://www.reuters.com/technology/openai-tops-25-billion-annualized-revenue-last-month-information-reports-2026-03-05/
        kind: ir_html
        description: "Reuters citing The Information: year-end 2025 ARR was $21.4B; $25B ARR reached Feb 2026 (+17%)."
        retrieved_at: "2026-03-29"

  monthly_burn_rate_usd:
    value: null  # FY2025 full-year burn not disclosed; H1 $2.5B; H2 likely higher with compute scale-up
    notes: "H1 2025 monthly burn ~$417M. Full-year burn unknown. The Information reported OpenAI forecast $111B cumulative cash burn through 2030, implying ~$22B/year on average — but this is a forward projection, not FY2025 actuals."
    sources:
      - url: https://www.theinformation.com/articles/openai-boost-revenue-forecasts-predicts-112-billion-cash-burn-2030
        kind: ir_html
        description: "Tier 2: The Information — OpenAI predicts $111B additional cash burn through 2030."
        retrieved_at: "2026-03-29"

  cash_runway_months:
    value: null
    notes: "Not calculable. Company raised $40B (Mar 2025) and $22.5B (Oct 2025) during FY2025, providing substantial liquidity."
    sources: []

  headcount:
    value: 4500  # ~4,500 as of early 2026 — Tier 2 (Reuters)
    notes: "Reuters Mar 2026: ~4,500 employees currently; plans to double to ~8,000 by end-2026."
