  notes: >
    FY2024 is xAI's early commercial year. The company launched the Grok 1 open-weights model
    (March 2024), began commercializing via API in late 2024, and built the Colossus Phase 1
    supercluster (100K H100s, online September 2024). No revenue or P&L figures are confirmable
    from any public source. The ~$100M end-of-year ARR figure (Sacra, Tier 2) is the best
    available anchor for understanding scale; it implies negligible full-year recognized revenue.
    The file exists primarily to document the funding history and establish the base from which
    2025 ARR growth is measured. Quality rating is 'low'.

extended_metrics:
  total_funding_raised_usd:
    value: 12135000000  # $135M Series A + $6B Series B + $6B Series C = $12.135B as of Dec 31, 2024
    notes: >
      Confirmed: Series A $135M (Jan 2024, TechCrunch); Series B $6B (May 2024, Reuters/xAI blog);
      Series C $6B (Dec 2024, xAI blog). Total equity raised as of Dec 31, 2024: $12.135B.
      Excludes debt rounds in 2025 and Series E in January 2026.
    sources:
      - url: https://x.ai/blog/series-c
        kind: vendor_page
        description: "Tier 1 (xAI official blog): Series C $6B closed December 2024. Lead investors A16Z, BlackRock, Fidelity, Sequoia, NVIDIA, AMD, QIA, Lightspeed, Kingdom Holdings, MGX, Morgan Stanley, OIA, Valor, Vy Capital."
        retrieved_at: "2026-03-30"
      - url: https://techcrunch.com/2024/05/26/elon-musks-xai-raises-6b-in-series-b-funding/
        kind: news_article
        description: "Tier 2 (TechCrunch): Series B $6B closed May 2024 at ~$24B valuation."
        retrieved_at: "2026-03-30"

  last_round_amount_usd:
    value: 6000000000  # $6B Series C, December 2024
    notes: "Series C closed December 23, 2024. $6B equity raise at ~$50B post-money valuation."
    sources:
      - url: https://x.ai/blog/series-c
        kind: vendor_page
        description: "Tier 1 (xAI official): Series C $6B, December 23, 2024."
        retrieved_at: "2026-03-30"

  last_round_valuation_usd:
    value: 50000000000  # ~$50B post-money valuation at Series C
    notes: >
      Multiple press reports (Reuters, Bloomberg, TechCrunch) confirmed ~$50B post-money valuation
      for the December 2024 Series C. Tier 2 consensus figure.
    sources:
      - url: https://techcrunch.com/2024/12/23/xai-raises-6b-series-c-at-50b-valuation/
        kind: news_article
        description: "Tier 2 (TechCrunch): Series C $6B at $50B post-money valuation."
        retrieved_at: "2026-03-30"

  last_round_date: "2024-12-23"
  last_round_type: series_c

  arr_usd:
    value: null  # ~$100M ARR at December 2024 — Tier 2 estimate; field null per protocol
    notes: >
      Sacra research estimates xAI at approximately $100M ARR at end-2024 (standalone — API
      revenue and SuperGrok subscriptions, before X merger). This compares to Anthropic's ~$1B
      ARR and OpenAI's ~$3.7B ARR at the same period end. xAI was 24–36 months behind commercial
      peers on revenue ramp as of end-2024. Standard field null per protocol.
    sources:
      - url: https://sacra.com/c/xai/
        kind: ir_html
        description: "Tier 2 (Sacra): xAI ~$100M ARR at end-2024 (standalone)."
        retrieved_at: "2026-03-30"

  monthly_burn_rate_usd:
    value: null
    notes: >
      Burn rate in 2024 was very high due to Colossus build-out, but the $1B/month figure
      cited by The Information is a 2025/2026 figure. 2024 burn rate is not separately disclosed.
      Given $12B in funding as of Dec 2024 with no significant revenue, the implied cumulative
      burn is in the billions.
