sources:
  - url: https://sacra.com/c/xai/
    kind: ir_html
    description: >
      Tier 2 (Sacra research): xAI ~$100M ARR at end-2024 (standalone, before X merger). This is
      the primary anchor for FY2024 revenue discussion. Sacra estimates xAI exited 2025 at ~$3.8B ARR
      on a combined basis after the March 2025 X acquisition, and that on a standalone basis
      xAI's own API/SuperGrok revenue was ~$500M annualized at end-2025.
    covers: []
    retrieved_at: "2026-03-30"

  - url: https://www.theinformation.com/briefings/musks-xai-burning-1-billion-month
    kind: ir_html
    description: >
      Tier 2 (The Information): xAI burn rate approximately $1B/month. Management targeting
      profitability by 2027. This burn rate is the highest of any private AI lab as of early 2026.
    covers: []
    retrieved_at: "2026-03-30"

  - url: null
    kind: documentation
    description: >
      revenue: No credible single-point FY2024 full-year recognized revenue figure available.
      Working context: xAI launched commercially mid-2024 (Grok 2 in August 2024; API opened
      in late 2024). The company was pre-revenue for much of H1 2024. End-of-year ARR of ~$100M
      (Sacra Tier 2) implies full-year 2024 recognized revenue was significantly below $100M —
      likely in the $20M–$80M range given ramp timing. Standard field null per protocol.
    covers: [revenue]
    retrieved_at: "2026-03-30"

  - url: null
    kind: documentation
    description: >
      All P&L, cash flow, and balance sheet fields: not disclosed by company; no Tier 1 or
      credible Tier 2 source provides these for FY2024. Fields null. Notable exception: capital
      expenditures are known to have been very large in 2024 — the Colossus Phase 1 supercluster
      (100K H100 GPUs built in 122 days, online September 2024) required massive capex; the
      Series B ($6B, May 2024) and Series C ($6B, December 2024) were primarily directed at
      compute procurement. Exact capex figure not publicly disclosed.
    covers: [cost_of_revenue, gross_profit, research_and_development, selling_general_administrative,
             depreciation_and_amortization, operating_income, interest_expense, interest_income,
             other_income_expense_net, income_tax_expense_benefit, net_income, operating_cash_flow,
             stock_based_compensation, capital_expenditures_cash, investing_cash_flow_net,
             financing_cash_flow_net, cash_and_equivalents, current_assets, current_liabilities,
             property_plant_equipment_net, total_assets, total_liabilities, long_term_debt,
             current_portion_of_long_term_debt, total_debt, stockholders_equity]
    retrieved_at: "2026-03-30"

